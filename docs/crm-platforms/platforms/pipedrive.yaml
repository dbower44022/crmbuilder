# Pipedrive CRM Platform Profile
name: Pipedrive
slug: pipedrive
type: Cloud CRM (SaaS)
deployment: Pipedrive-hosted only
last_reviewed: 2026-03-30

pricing:
  free_tier: "14-day trial"
  min_paid_per_user_month: 14
  full_admin_api_per_user_month: 14
  enterprise_per_user_month: 99
  currency: USD

api:
  protocol: [REST]
  format: [JSON]
  version: v1/v2
  auth_methods: ["OAuth 2.0", "API tokens"]
  rate_limit: "80 req/2sec (120 Enterprise)"

# ─── Standard Entities ──────────────────────────────────────────────
standard_entities:
  deal: {name: Deals, api_name: deals}
  person: {name: Persons, api_name: persons}
  organization: {name: Organizations, api_name: organizations}
  product: {name: Products, api_name: products}
  activity: {name: Activities, api_name: activities}
  lead: {name: Leads, api_name: leads}
  project: {name: Projects, api_name: projects, notes: "Pro+ only"}
  note: {name: Notes, api_name: notes}
  pipeline: {name: Pipelines, api_name: pipelines}
  stage: {name: Stages, api_name: stages}
  label_renamable_via_api: false

# ─── Entity Management ─────────────────────────────────────────────
entity_management:
  create_entity:
    rating: none
    method: "Fixed data model — no custom entity creation"
  delete_entity:
    rating: na
  check_existence:
    rating: na

# ─── Field Management ──────────────────────────────────────────────
field_management:
  create_field:
    rating: full
    min_edition: essential
    method: "POST /v1/{entity}Fields"

  update_field:
    rating: full
    method: "PUT /v1/{entity}Fields/{id}"

  read_metadata:
    rating: full
    method: "GET /v1/{entity}Fields"

  field_types:
    varchar: {equivalent: varchar, creatable: true}
    text: {equivalent: text, creatable: true}
    int: {equivalent: int, creatable: true}
    float: {equivalent: double, creatable: true}
    currency: {equivalent: monetary, creatable: true}
    date: {equivalent: date, creatable: true}
    daterange: {equivalent: daterange, creatable: true}
    time: {equivalent: time, creatable: true}
    timerange: {equivalent: timerange, creatable: true}
    enum: {equivalent: enum, creatable: true}
    multiEnum: {equivalent: set, creatable: true}
    phone: {equivalent: phone, creatable: true}
    address: {equivalent: address, creatable: true}
    varchar_auto: {equivalent: varchar_auto, creatable: true}
  additional_types:
    - {name: people, creatable: true, notes: "Link to Persons"}
    - {name: org, creatable: true, notes: "Link to Organizations"}
    - {name: user, creatable: true, notes: "Link to Users"}

  field_properties:
    name: {supported: true, api_key: name}
    field_type: {supported: true, api_key: field_type}
    options: {supported: true, api_key: options}
    add_visible_flag: {supported: true, api_key: add_visible_flag}
    important_flag: {supported: true, api_key: important_flag}
    bulk_edit_allowed: {supported: true, api_key: bulk_edit_allowed}
    searchable_flag: {supported: true, api_key: searchable_flag}
    filtering_allowed: {supported: true, api_key: filtering_allowed}
    sortable_flag: {supported: true, api_key: sortable_flag}
    group_id: {supported: true, api_key: group_id}
    required: {supported: false}
    audited: {supported: false}
    default: {supported: false}

# ─── Layout Management ─────────────────────────────────────────────
layout_management:
  read_layouts:
    rating: none
    method: "No API support"
  write_layouts:
    rating: none
    method: "No API support"

# ─── Relationship Management ───────────────────────────────────────
relationship_management:
  create_relationship:
    rating: none
    method: "Built-in relationships only (Deal↔Person, Deal↔Org, Person↔Org, Deal↔Product)"
  notes: "No custom relationship creation via API"

# ─── Data Operations ───────────────────────────────────────────────
data_operations:
  create_record: {rating: full, method: "POST /v1/{entity}"}
  read_record: {rating: full, method: "GET /v1/{entity}/{id}"}
  update_record: {rating: full, method: "PUT /v1/{entity}/{id}"}
  delete_record: {rating: full, method: "DELETE /v1/{entity}/{id}"}
  search_by_field: {rating: full, method: "GET /v1/{entity}/search"}
  bulk_delete: {rating: full, method: "DELETE /v1/{entity} (multiple IDs)"}
  bulk_create: {rating: none, notes: "No bulk create endpoint"}

# ─── Future Capabilities ──────────────────────────────────────────
workflow_automation:
  create_rules: {rating: none, notes: "UI only (Pro+)"}
  create_flows: {rating: none, notes: "UI only"}

roles_permissions:
  create_roles: {rating: none}

dashboards_reports:
  create_dashboards: {rating: none}

email_templates:
  crud_templates: {rating: none}

webhooks_events:
  outbound_webhooks: {rating: full, method: "POST /v1/webhooks"}
  event_subscriptions: {rating: full, method: "POST /v1/webhooks — event subscription"}
  sync_async: async
