# Zoho CRM Platform Profile
name: Zoho CRM
slug: zoho
type: Cloud CRM (SaaS)
deployment: Zoho-hosted only
last_reviewed: 2026-03-30
open_source: false
license: Proprietary

pricing:
  free_tier: "Free (3 users, 5K API calls/day)"
  min_paid_per_user_month: 14
  full_admin_api_per_user_month: 40
  enterprise_per_user_month: 52
  currency: USD

api:
  protocol: [REST]
  format: [JSON]
  version: V7
  auth_methods: ["OAuth 2.0"]
  rate_limit: "10-30 req/min/user by edition; 5K-2.5M daily by edition"
  admin_auth: "Super Admin or Administrator profile"

# ─── Standard Entities ──────────────────────────────────────────────
standard_entities:
  contact: {name: Contacts, api_name: Contacts}
  account: {name: Accounts, api_name: Accounts}
  lead: {name: Leads, api_name: Leads}
  deal: {name: Deals, api_name: Deals}
  task: {name: Tasks, api_name: Tasks}
  meeting: {name: Meetings, api_name: Events}
  call: {name: Calls, api_name: Calls}
  product: {name: Products, api_name: Products}
  quote: {name: Quotes, api_name: Quotes}
  sales_order: {name: Sales Orders, api_name: Sales_Orders}
  purchase_order: {name: Purchase Orders, api_name: Purchase_Orders}
  invoice: {name: Invoices, api_name: Invoices}
  campaign: {name: Campaigns, api_name: Campaigns}
  vendor: {name: Vendors, api_name: Vendors}
  case: {name: Cases, api_name: Cases}
  solution: {name: Solutions, api_name: Solutions}
  note: {name: Notes, api_name: Notes}
  user: {name: Users, api_name: users}
  label_renamable_via_api: false
  label_rename_method: "UI only — Modules and Fields settings"

# ─── Entity Management ─────────────────────────────────────────────
entity_management:
  create_entity:
    rating: none
    min_edition: null
    method: "UI only — no API support for custom module creation"
    max_entities:
      free: 0
      standard: 5
      professional: 10
      enterprise: 25
      ultimate: 100
    naming_convention: "User-defined"
    notes: "Custom modules can only be created through the Zoho CRM UI. No API endpoint exists for module creation."
  delete_entity:
    rating: none
    method: "UI only"
  check_existence:
    rating: full
    method: "GET /settings/modules"
  entity_types:
    available: ["N/A — UI-only creation"]
  cache_rebuild:
    rating: none
    required: false

# ─── Field Management ──────────────────────────────────────────────
field_management:
  create_field:
    rating: full
    min_edition: enterprise
    method: "POST /settings/fields?module={module}"
    max_fields_per_module: 300
    naming_convention: "User-defined"

  update_field:
    rating: full
    method: "PATCH /settings/fields/{field_id}?module={module}"

  read_metadata:
    rating: full
    method: "GET /settings/fields?module={module}"

  field_types:
    varchar: {equivalent: text, creatable: true}
    text: {equivalent: textarea, creatable: true}
    wysiwyg: {equivalent: richtextarea, creatable: true}
    enum: {equivalent: picklist, creatable: true}
    multiEnum: {equivalent: multiselectpicklist, creatable: true}
    bool: {equivalent: boolean, creatable: true}
    int: {equivalent: integer, creatable: true}
    float: {equivalent: decimal, creatable: true}
    date: {equivalent: date, creatable: true}
    datetime: {equivalent: datetime, creatable: true}
    currency: {equivalent: currency, creatable: true}
    url: {equivalent: website, creatable: true}
    email: {equivalent: email, creatable: true}
    phone: {equivalent: phone, creatable: true}
  all_current_types_supported: true
  additional_types:
    - {name: autonumber, creatable: true}
    - {name: formula, creatable: true, notes: "Limited formula support"}
    - {name: lookup, creatable: true}
    - {name: multiselectlookup, creatable: true, notes: "Enterprise+ only"}
    - {name: imageupload, creatable: true}
    - {name: fileupload, creatable: true}
    - {name: percent, creatable: true}

  field_properties:
    label: {supported: true, api_key: field_label}
    required: {supported: true, api_key: required}
    default: {supported: true, api_key: default_value}
    unique: {supported: true, api_key: unique}
    tooltip: {supported: true, api_key: tooltip}
    readOnly: {supported: true, api_key: read_only}
    visible: {supported: true, api_key: visible}
    maxLength: {supported: true, api_key: length}
    options: {supported: true, api_key: pick_list_values}
    decimal_place: {supported: true, api_key: decimal_place}
    sequence_number: {supported: true, api_key: sequence_number}
    audited: {supported: false, notes: "UI only"}
    translatedOptions: {supported: false}
    optionDescriptions: {supported: false}
    style: {supported: false}
    isSorted: {supported: false}
    displayAsLabel: {supported: false}
    copyToClipboard: {supported: false}
    category: {supported: false}

# ─── Layout Management ─────────────────────────────────────────────
layout_management:
  read_layouts:
    rating: read_only
    method: "GET /settings/layouts?module={module}"
  write_layouts:
    rating: none
    method: "No API support for layout modification"
    notes: "Layouts are read-only via the API. All layout changes must be made through the UI."
  detail_view: {supported: false, notes: "Read-only via API"}
  edit_view: {supported: false, notes: "Read-only via API"}
  list_view: {supported: false, notes: "Read-only via API"}
  panels: {supported: false, notes: "No API write support"}
  tabs: {supported: false, notes: "No API write support"}
  conditional_visibility: {supported: false, notes: "No API support"}
  multiple_list_views: {supported: true, api_creatable: false, notes: "Custom views configurable in UI with filters/columns; API can use cvid param to apply saved views but cannot create them"}

# ─── Relationship Management ───────────────────────────────────────
relationship_management:
  create_relationship:
    rating: partial
    method: "Via lookup field creation — POST /settings/fields?module={module}"
    notes: "Relationships are created indirectly by creating lookup or multiselectlookup fields."
  one_to_many: {supported: true, method: "Lookup field type"}
  many_to_one: {supported: true, method: "Lookup field (reverse side)"}
  many_to_many: {supported: true, method: "Multiselectlookup field (Enterprise+)"}
  link_labels: {supported: false}
  audit_both_sides: {supported: false, notes: "UI only"}
  check_existence: {supported: true, method: "GET /settings/related_lists?module={module}"}
  cascade_delete: {supported: false, notes: "No cascade delete options via API"}
  self_referential: {supported: true, notes: "Lookup to same module"}

# ─── Data Operations ───────────────────────────────────────────────
data_operations:
  create_record: {rating: full, method: "POST /v7/{module}"}
  read_record: {rating: full, method: "GET /v7/{module}/{id}"}
  update_record: {rating: full, method: "PUT /v7/{module}/{id}"}
  delete_record: {rating: full, method: "DELETE /v7/{module}/{id}"}
  search_by_field: {rating: full, method: "GET /v7/{module}/search or COQL"}
  search_by_email: {rating: full, method: "COQL query on Email field"}
  upsert: {rating: full, method: "POST /v7/{module}/upsert", notes: "Duplicate check fields configurable"}
  batch_create: {rating: full, method: "POST /v7/{module} — 100 records/call"}
  bulk_import: {rating: full, method: "Bulk Read/Write API — async"}
  query_language: {name: COQL, notes: "CRM Object Query Language — SQL-like syntax for Zoho CRM data"}
  max_results_per_page: 200

# ─── Future Capabilities ──────────────────────────────────────────
workflow_automation:
  create_rules: {rating: read_only, method: "GET /settings/workflow_rules"}
  create_flows: {rating: none, notes: "No API support — UI only (Zoho Flow / Blueprint)"}
  approval_processes: {rating: partial, method: "Read + execute only", notes: "Cannot create approval rules via API"}
  validation_rules: {rating: none, notes: "UI only"}
  scheduled_actions: {rating: none, notes: "UI only"}
  trigger_types: ["Record change (UI only)", "Schedule (UI only)"]

roles_permissions:
  create_roles: {rating: read_only, method: "GET /settings/roles"}
  module_permissions: {rating: read_only, method: "GET /settings/profiles"}
  field_level_security: {rating: none, notes: "UI only"}
  record_level_rules: {rating: none, notes: "UI only"}
  user_management: {rating: full, method: "GET/POST /users"}

dashboards_reports:
  create_dashboards: {rating: none, notes: "No API support"}
  create_reports: {rating: partial, method: "Read + execute only", notes: "Cannot create reports via API"}
  saved_views: {rating: none, notes: "No API support"}

email_templates:
  crud_templates: {rating: read_only, method: "GET /settings/email_templates"}
  send_using_template: {supported: true, method: "POST /v7/{module}/{id}/actions/send_mail"}
  merge_fields: {supported: true}
  html_body: {supported: true}

webhooks_events:
  outbound_webhooks: {rating: none, notes: "Configured via UI workflow rules only"}
  event_subscriptions: {rating: partial, method: "POST /v7/actions/watch", notes: "Notification API — async event watching"}
  sync_async: async
  retry_on_failure: {supported: false}
