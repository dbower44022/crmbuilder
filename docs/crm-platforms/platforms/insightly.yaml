# Insightly CRM Platform Profile
name: Insightly
slug: insightly
type: Cloud CRM (SaaS)
deployment: Insightly-hosted only
last_reviewed: 2026-03-30
open_source: false
license: Proprietary

pricing:
  free_tier: "None (removed Oct 2024)"
  min_paid_per_user_month: 29
  full_admin_api_per_user_month: na
  enterprise_per_user_month: 99
  currency: USD
  notes: "Annual billing only"

api:
  protocol: [REST]
  format: [JSON]
  version: v3.1
  auth_methods: ["Basic auth (API key)"]

# ─── Standard Entities ──────────────────────────────────────────────
standard_entities:
  contact: {name: Contacts, api_name: Contacts}
  organisation: {name: Organisations, api_name: Organisations}
  lead: {name: Leads, api_name: Leads}
  opportunity: {name: Opportunities, api_name: Opportunities}
  project: {name: Projects, api_name: Projects}
  task: {name: Tasks, api_name: Tasks}
  event: {name: Events, api_name: Events}
  email: {name: Emails, api_name: Emails}
  note: {name: Notes, api_name: Notes}
  label_renamable_via_api: false

# ─── Entity Management ─────────────────────────────────────────────
entity_management:
  create_entity:
    rating: none
    method: "UI only"
  delete_entity:
    rating: none
    method: "UI only"

# ─── Field Management ──────────────────────────────────────────────
field_management:
  create_field:
    rating: none
    method: "UI only — no API for field creation"
  read_metadata:
    rating: partial
    method: "GET /v3.1/CustomFields/{objectName} — read-only"

# ─── Layout Management ─────────────────────────────────────────────
layout_management:
  read_layouts:
    rating: none
  write_layouts:
    rating: none
  multiple_list_views:
    supported: true
    api_creatable: false
    notes: "Custom views in UI; not API-manageable"

# ─── Relationship Management ───────────────────────────────────────
relationship_management:
  create_relationship:
    rating: none
    method: "Link records only — no custom relationship definition via API"

# ─── Data Operations ───────────────────────────────────────────────
data_operations:
  create_record: {rating: full, method: "POST /v3.1/{entity}"}
  read_record: {rating: full, method: "GET /v3.1/{entity}/{id}"}
  update_record: {rating: full, method: "PUT /v3.1/{entity}"}
  delete_record: {rating: full, method: "DELETE /v3.1/{entity}/{id}"}
  search_by_field: {rating: full, method: "OData-style $filter parameters"}

# ─── Future Capabilities ──────────────────────────────────────────
workflow_automation:
  create_rules: {rating: none}

roles_permissions:
  create_roles: {rating: none}

dashboards_reports:
  create_dashboards: {rating: none}

email_templates:
  crud_templates: {rating: none}

webhooks_events:
  outbound_webhooks: {rating: none}
