# ActiveCampaign CRM Platform Profile
name: ActiveCampaign
slug: activecampaign
type: Marketing Automation + CRM (SaaS)
deployment: ActiveCampaign-hosted only
last_reviewed: 2026-03-30
open_source: false
license: Proprietary

pricing:
  free_tier: "Developer sandbox (100 contacts, 2-year expiry)"
  min_paid_per_user_month: 19
  full_admin_api_per_user_month: 159
  enterprise_per_user_month: 159
  currency: USD
  notes: "CRM/Deals requires separate add-on ($49-179/mo). Custom objects Enterprise only. Base prices are for 1K contacts."

api:
  protocol: [REST]
  format: [JSON]
  version: v3
  auth_methods: ["API key (Api-Token header)"]
  rate_limit: "5 req/sec per account (all plans)"
  admin_auth: "Account API key"
  legacy: "v1 API still supported (JSON/XML/PHP), same rate limit"

# ─── Standard Entities ──────────────────────────────────────────────
standard_entities:
  contact: {name: Contacts, api_name: contacts, notes: "Core entity — email required"}
  account: {name: Accounts, api_name: accounts, notes: "Organizations/companies"}
  deal: {name: Deals, api_name: deals, notes: "Requires CRM add-on"}
  pipeline: {name: Pipelines, api_name: dealGroups, notes: "Deal stages container"}
  stage: {name: Stages, api_name: dealStages}
  task: {name: Tasks, api_name: dealTasks}
  note: {name: Notes, api_name: notes}
  tag: {name: Tags, api_name: tags, notes: "Contact segmentation"}
  list: {name: Lists, api_name: lists, notes: "Email subscription lists"}
  automation: {name: Automations, api_name: automations, notes: "Read-only via API"}
  label_renamable_via_api: false

# ─── Entity Management ─────────────────────────────────────────────
entity_management:
  create_entity:
    rating: partial
    min_edition: enterprise
    method: "POST /api/3/customObjects/schemas"
    notes: "Custom objects must relate to exactly one standard object (Contact, Account, or Deal). 1:many only. Enterprise plan required."
    naming_convention: "UUID + slug"
  delete_entity:
    rating: full
    method: "DELETE /api/3/customObjects/schemas/{id}"
    notes: "Deletes all associated records"
  check_existence:
    rating: full
    method: "GET /api/3/customObjects/schemas"
  entity_types:
    available: ["Custom objects — constrained to parent Contact, Account, or Deal"]
  cache_rebuild:
    rating: na
  activity_stream:
    supported: false

# ─── Field Management ──────────────────────────────────────────────
field_management:
  create_field:
    rating: full
    min_edition: starter
    method: "POST /api/3/fields (contacts), POST /api/3/dealCustomFieldMeta (deals), POST /api/3/accountCustomFieldMeta (accounts)"

  update_field:
    rating: full
    method: "PUT /api/3/fields/{id}"

  read_metadata:
    rating: full
    method: "GET /api/3/fields"

  field_types:
    varchar: {equivalent: text, creatable: true}
    text: {equivalent: textarea, creatable: true}
    wysiwyg: {equivalent: na, creatable: false, notes: "No rich text field type"}
    enum: {equivalent: dropdown, creatable: true}
    multiEnum: {equivalent: multiselect, creatable: true}
    bool: {equivalent: checkbox, creatable: true}
    int: {equivalent: number, creatable: true}
    float: {equivalent: number, creatable: true}
    date: {equivalent: date, creatable: true}
    datetime: {equivalent: datetime, creatable: true}
    currency: {equivalent: currency, creatable: true}
    url: {equivalent: na, creatable: false, notes: "No dedicated URL field type"}
    email: {equivalent: na, creatable: false, notes: "Email is a standard contact field, not a custom field type"}
    phone: {equivalent: na, creatable: false, notes: "Phone is a standard contact field"}
  all_current_types_supported: false
  missing_types: [wysiwyg, url, email, phone]
  additional_types:
    - {name: radio, creatable: true}
    - {name: hidden, creatable: true}
    - {name: listbox, creatable: true, notes: "Contacts only"}

  field_properties:
    label: {supported: true, api_key: fieldLabel}
    required: {supported: false, notes: "No required-field enforcement via API"}
    default: {supported: true, api_key: fieldDefault}
    readOnly: {supported: false}
    audited: {supported: false}
    description: {supported: true, api_key: descript, notes: "Contact fields only"}
    tooltip: {supported: false}
    min: {supported: false}
    max: {supported: false}
    maxLength: {supported: false}
    options: {supported: true, api_key: fieldOptions}
    translatedOptions: {supported: false}
    optionDescriptions: {supported: false}
    style: {supported: false}
    isSorted: {supported: true, api_key: displayOrder}
    displayAsLabel: {supported: false}
    copyToClipboard: {supported: false}
    category: {supported: true, api_key: group, notes: "Field group ID"}

# ─── Layout Management ─────────────────────────────────────────────
layout_management:
  read_layouts:
    rating: none
  write_layouts:
    rating: none
    notes: "No API control over record page layouts"
  detail_view: {supported: false}
  edit_view: {supported: false}
  list_view: {supported: false}
  panels: {supported: false}
  tabs: {supported: false}
  conditional_visibility: {supported: false}
  multiple_list_views: {supported: true, api_creatable: false, notes: "Saved segments and views in UI; not API-manageable"}

# ─── Relationship Management ───────────────────────────────────────
relationship_management:
  create_relationship:
    rating: none
    notes: "Fixed relationship model between standard entities. Custom objects provide the only extension mechanism."
  one_to_many: {supported: false, notes: "Fixed model only — Contact→Deals, Account→Contacts"}
  many_to_one: {supported: false}
  many_to_many: {supported: false, notes: "Contact↔Account is M:N but not configurable"}
  link_labels: {supported: false}
  audit_both_sides: {supported: false}
  check_existence: {supported: true, method: "Check via entity relationship endpoints"}
  cascade_delete: {supported: false}
  polymorphic: {supported: false}

# ─── Data Operations ───────────────────────────────────────────────
data_operations:
  create_record: {rating: full, method: "POST /api/3/contacts (or deals, accounts)"}
  read_record: {rating: full, method: "GET /api/3/contacts/{id}"}
  update_record: {rating: full, method: "PUT /api/3/contacts/{id}"}
  delete_record: {rating: full, method: "DELETE /api/3/contacts/{id}"}
  search_by_field: {rating: full, method: "GET /api/3/contacts with filter params"}
  search_by_email: {rating: full, method: "GET /api/3/contacts?email={email}"}
  upsert: {rating: none, notes: "No native upsert — must search then create/update"}
  batch_create: {rating: partial, method: "POST /api/3/import/bulk_import — 250 contacts/request, contacts only"}
  bulk_import: {rating: partial, method: "Bulk import API with async status tracking and callback URL"}
  query_language: {name: "Filter parameters on GET endpoints", notes: "Limited compared to SQL-like query languages"}
  max_results_per_query: 100

# ─── Future Capabilities ──────────────────────────────────────────
workflow_automation:
  create_rules: {rating: read_only, method: "GET /api/3/automations — list/read only"}
  create_flows: {rating: none, notes: "Automation design is UI-only (visual builder)"}
  approval_processes: {rating: none}
  validation_rules: {rating: none}
  scheduled_actions: {rating: none}
  email_from_template: {rating: partial, notes: "Can trigger automations that send emails via contactAutomations endpoint"}

roles_permissions:
  create_roles: {rating: none, notes: "User groups configured in UI only"}
  module_permissions: {rating: none}
  field_level_security: {rating: none}
  record_level_rules: {rating: none}
  user_management: {rating: partial, notes: "Limited — can create list-group permissions"}

dashboards_reports:
  create_dashboards: {rating: none}
  create_reports: {rating: none}
  saved_views: {rating: none}

email_templates:
  crud_templates: {rating: none}
  merge_fields: {supported: false}
  html_body: {supported: false}

webhooks_events:
  outbound_webhooks: {rating: full, method: "POST /api/3/webhooks — contact, deal, campaign, SMS events"}
  event_subscriptions: {rating: full, notes: "Filter by initiation source (user, system, API)"}
  sync_async: async
  retry_on_failure: {supported: false, notes: "Webhooks are never retried on failure; auto-deactivated on HTTP 410"}
