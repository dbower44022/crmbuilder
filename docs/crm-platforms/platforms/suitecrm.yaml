# SuiteCRM Platform Profile
name: SuiteCRM
slug: suitecrm
type: Open-source CRM (AGPL v3)
deployment: Self-hosted only
last_reviewed: 2026-03-30

pricing:
  free_tier: "Fully free and open-source"
  min_paid_per_user_month: 0
  full_admin_api_per_user_month: na
  managed_hosting_per_month: "£100-600"
  currency: GBP
  notes: "Code-level access for all schema operations; REST API is data-oriented only"

api:
  protocol: [REST, SOAP]
  format: ["JSON:API (v8)", "JSON/XML (legacy v4.1)"]
  auth_methods: ["OAuth 2.0"]
  notes: "REST v8 is JSON:API spec; legacy SOAP/REST v4.1 still available"

# ─── Standard Entities ──────────────────────────────────────────────
standard_entities:
  account: {name: Accounts, api_name: Accounts}
  contact: {name: Contacts, api_name: Contacts}
  lead: {name: Leads, api_name: Leads}
  opportunity: {name: Opportunities, api_name: Opportunities}
  case: {name: Cases, api_name: Cases}
  task: {name: Tasks, api_name: Tasks}
  meeting: {name: Meetings, api_name: Meetings}
  call: {name: Calls, api_name: Calls}
  email: {name: Emails, api_name: Emails}
  campaign: {name: Campaigns, api_name: Campaigns}
  document: {name: Documents, api_name: Documents}
  product: {name: Products, api_name: AOS_Products}
  quote: {name: Quotes, api_name: AOS_Quotes}
  note: {name: Notes, api_name: Notes}
  user: {name: Users, api_name: Users}
  team: {name: Teams, api_name: Teams}
  label_renamable_via_api: false
  notes: "Same entity model as SugarCRM Community Edition"

# ─── Entity Management ─────────────────────────────────────────────
entity_management:
  create_entity:
    rating: none
    method: "Module Builder UI or code packages — no REST API support"
  delete_entity:
    rating: none
    method: "Module Builder UI or code packages"

# ─── Field Management ──────────────────────────────────────────────
field_management:
  create_field:
    rating: none
    method: "Studio UI or vardef code — no REST API support"
  read_metadata:
    rating: partial
    method: "Module fields endpoint (read-only)"

# ─── Layout Management ─────────────────────────────────────────────
layout_management:
  read_layouts:
    rating: none
  write_layouts:
    rating: none
    notes: "Studio UI or viewdef code manipulation required"

# ─── Relationship Management ───────────────────────────────────────
relationship_management:
  create_relationship:
    rating: none
    method: "Studio UI or code only — API can traverse but not create definitions"
  traverse_relationships:
    rating: partial
    method: "JSON:API relationship endpoints"

# ─── Data Operations ───────────────────────────────────────────────
data_operations:
  create_record: {rating: full, method: "POST /api/v8/modules/{module}"}
  read_record: {rating: full, method: "GET /api/v8/modules/{module}/{id}"}
  update_record: {rating: full, method: "PATCH /api/v8/modules/{module}/{id}"}
  delete_record: {rating: full, method: "DELETE /api/v8/modules/{module}/{id}"}
  search_by_field: {rating: full, method: "JSON:API filter parameters"}

# ─── Future Capabilities ──────────────────────────────────────────
workflow_automation:
  create_rules: {rating: none, notes: "Workflow module is UI only"}

roles_permissions:
  create_roles: {rating: none}

dashboards_reports:
  create_dashboards: {rating: none}

email_templates:
  crud_templates: {rating: none}

webhooks_events:
  outbound_webhooks: {rating: none}
  notes: "Open source with full code access, but REST API is data-oriented only. All schema operations require Studio UI or direct code manipulation."
