# EspoCRM Platform Profile — Reference Platform
name: EspoCRM
slug: espocrm
type: Open-source CRM (GPL v3)
deployment: Self-hosted (Docker)
last_reviewed: 2026-03-30

pricing:
  free_tier: "Free (self-hosted, unlimited)"
  min_paid_per_user_month: 15
  full_admin_api_per_user_month: 0
  enterprise_per_user_month: 0
  currency: USD
  notes: "Hosted plans from $15/user; self-hosted is fully free with complete API access"

api:
  protocol: [REST]
  format: [JSON]
  version: /api/v1/
  auth_methods: ["API Key", "HMAC", "Basic Auth"]
  rate_limit: "Self-hosted (unlimited)"
  admin_auth: "Admin user with API Key"

# ─── Standard Entities ──────────────────────────────────────────────
standard_entities:
  contact: {name: Contact, api_name: Contact}
  account: {name: Account, api_name: Account}
  lead: {name: Lead, api_name: Lead}
  opportunity: {name: Opportunity, api_name: Opportunity}
  case: {name: Case, api_name: Case}
  task: {name: Task, api_name: Task}
  meeting: {name: Meeting, api_name: Meeting}
  call: {name: Call, api_name: Call}
  email: {name: Email, api_name: Email}
  document: {name: Document, api_name: Document}
  campaign: {name: Campaign, api_name: Campaign}
  target_list: {name: TargetList, api_name: TargetList}
  user: {name: User, api_name: User}
  team: {name: Team, api_name: Team}
  label_renamable_via_api: true
  label_rename_method: "PUT /api/v1/I18n — custom label overrides"

# ─── Entity Management ─────────────────────────────────────────────
entity_management:
  create_entity:
    rating: full
    min_edition: free
    method: "POST /api/v1/EntityManager/action/createEntity"
    max_entities: unlimited
    naming_convention: "C-prefix for custom entities (e.g., CMyEntity)"
  delete_entity:
    rating: full
    method: "POST /api/v1/EntityManager/action/deleteEntity"
  check_existence:
    rating: full
    method: "GET /api/v1/Metadata"
  entity_types:
    available: [Base, Person, Company, Event]
    notes: "Person and Company types include built-in name/address fields"
  cache_rebuild:
    rating: full
    required: true
    method: "POST /api/v1/Admin/rebuild"

# ─── Field Management ──────────────────────────────────────────────
field_management:
  create_field:
    rating: full
    min_edition: free
    method: "POST /api/v1/EntityManager/action/createField"

  update_field:
    rating: full
    method: "PUT /api/v1/EntityManager/action/updateField"

  read_metadata:
    rating: full
    method: "GET /api/v1/Metadata"

  field_types:
    varchar: {equivalent: varchar, creatable: true}
    text: {equivalent: text, creatable: true}
    wysiwyg: {equivalent: wysiwyg, creatable: true}
    enum: {equivalent: enum, creatable: true}
    multiEnum: {equivalent: multiEnum, creatable: true}
    bool: {equivalent: bool, creatable: true}
    int: {equivalent: int, creatable: true}
    float: {equivalent: float, creatable: true}
    date: {equivalent: date, creatable: true}
    datetime: {equivalent: datetime, creatable: true}
    currency: {equivalent: currency, creatable: true}
    url: {equivalent: url, creatable: true}
    email: {equivalent: email, creatable: true}
    phone: {equivalent: phone, creatable: true}
  all_current_types_supported: true

  field_properties:
    label: {supported: true, api_key: label}
    required: {supported: true, api_key: required}
    default: {supported: true, api_key: default}
    readOnly: {supported: true, api_key: readOnly}
    audited: {supported: true, api_key: audited}
    description: {supported: true, api_key: description}
    tooltip: {supported: true, api_key: tooltipText}
    min: {supported: true, api_key: min}
    max: {supported: true, api_key: max}
    maxLength: {supported: true, api_key: maxLength}
    options: {supported: true, api_key: options}
    translatedOptions: {supported: true, api_key: translatedOptions}
    optionDescriptions: {supported: true, api_key: optionDescriptions}
    style: {supported: true, api_key: style}
    isSorted: {supported: true, api_key: isSorted}
    displayAsLabel: {supported: true, api_key: displayAsLabel}
    copyToClipboard: {supported: true, api_key: copyToClipboard}
    category: {supported: true, api_key: category}
    unique: {supported: true, api_key: isUnique}

# ─── Layout Management ─────────────────────────────────────────────
layout_management:
  read_layouts:
    rating: full
    method: "GET /api/v1/Layout/{entity}/{layoutType}"
  write_layouts:
    rating: full
    method: "PUT /api/v1/Layout/{entity}/{layoutType}"
  detail_view: {supported: true}
  edit_view: {supported: true}
  list_view: {supported: true}
  panels: {supported: true}
  tabs: {supported: true}
  conditional_visibility: {supported: true, notes: "conditionalVisible property on fields and panels"}
  field_width_control: {supported: true, notes: "2-column grid layout"}
  empty_cell_handling: {supported: true, notes: "false placeholder for empty cells"}

# ─── Relationship Management ───────────────────────────────────────
relationship_management:
  create_relationship:
    rating: full
    method: "POST /api/v1/EntityManager/action/createLink"
  one_to_many: {supported: true}
  many_to_one: {supported: true}
  many_to_many: {supported: true}
  link_labels: {supported: true}
  audit_both_sides: {supported: true}
  check_existence: {supported: true, method: "GET /api/v1/Metadata"}

# ─── Data Operations ───────────────────────────────────────────────
data_operations:
  create_record: {rating: full, method: "POST /api/v1/{entity}"}
  read_record: {rating: full, method: "GET /api/v1/{entity}/{id}"}
  update_record: {rating: full, method: "PUT /api/v1/{entity}/{id}"}
  delete_record: {rating: full, method: "DELETE /api/v1/{entity}/{id}"}
  search_by_field: {rating: full, method: "GET /api/v1/{entity} with where filters"}
  search_by_email: {rating: full, method: "GET /api/v1/{entity} with emailAddress filter"}

# ─── Future Capabilities ──────────────────────────────────────────
workflow_automation:
  create_rules: {rating: unknown, notes: "Not yet researched"}
  create_flows: {rating: unknown, notes: "Not yet researched"}

roles_permissions:
  create_roles: {rating: unknown, notes: "Not yet researched"}
  module_permissions: {rating: unknown, notes: "Not yet researched"}
  field_level_security: {rating: unknown, notes: "Not yet researched"}

dashboards_reports:
  create_dashboards: {rating: unknown, notes: "Not yet researched"}
  create_reports: {rating: unknown, notes: "Not yet researched"}

email_templates:
  crud_templates: {rating: unknown, notes: "Not yet researched"}

webhooks_events:
  outbound_webhooks: {rating: unknown, notes: "Not yet researched"}
  event_subscriptions: {rating: unknown, notes: "Not yet researched"}
