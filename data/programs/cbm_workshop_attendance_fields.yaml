version: "1.0"
description: "CBM EspoCRM Configuration — Workshop Attendance Fields"

# Source of truth: CBM-PRD-CRM-Implementation.docx Section 2.10
# Custom entity — uses delete_and_create for clean deployment.
# WARNING: Contains a delete_and_create operation — confirmation required.
#
# Fields NOT included here (handled separately):
#   - Link fields: Workshop, Contact, Engagement (relationships)

entities:
  WorkshopAttendance:
    action: delete_and_create
    type: Base
    labelSingular: "Workshop Attendance"
    labelPlural: "Workshop Attendance"
    stream: false
    fields:

      - name: attendanceDate
        type: date
        label: "Attendance Date"
        readOnly: true

      - name: attended
        type: bool
        label: "Attended"
        required: true
        default: true
