      # ---------------------------------------------------------------
      # Mentoring Context — category: Mentoring Context
      # ---------------------------------------------------------------

      - name: mentoringFocusAreas
        type: multiEnum
        label: "Mentoring Focus Areas"
        required: true
        category: "Mentoring Context"
        description: "The specific business areas where the client is seeking
                      mentoring support. Multi-select because clients often need
                      help across multiple domains. Used for mentor matching —
                      mentors specify which focus areas they cover. TBD: values
                      to be confirmed with CBM leadership before go-live.
                      Requirement: CBM-PRD-CRM-Client.docx Section 3.1"
        options:
          - "Business Planning & Strategy"
          - "Marketing & Sales"
          - "Financial Management & Accounting"
          - "Operations & Process Improvement"
          - "Human Resources & Team Building"
          - "Legal & Compliance"
          - "Technology & Digital Transformation"
          - "Access to Capital & Funding"
          - "E-Commerce & Online Business"
          - "Export & International Trade"
          - "Nonprofit Management"
          - "Social Entrepreneurship"
          - "Real Estate & Property Management"
          - "Retail & Consumer Goods"
          - "Food & Beverage"
          - "Healthcare & Wellness"
          - "Manufacturing & Supply Chain"
          - "Construction & Trades"

      - name: mentoringNeedsDescription
        type: wysiwyg
        label: "Mentoring Needs Description"
        required: true
        category: "Mentoring Context"
        description: "Free-form description of what the client is seeking from CBM
                      mentoring. Collected on the intake form and used by the admin
                      during mentor matching to understand context beyond the
                      structured focus area selections.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.1"

      # ---------------------------------------------------------------
      # Business Detail — category: Business Detail
      # ---------------------------------------------------------------

      - name: businessDescription
        type: wysiwyg
        label: "Business Description"
        category: "Business Detail"
        description: "Narrative overview of the client's business — what they do,
                      who they serve, and their business model. Populated
                      post-assignment by the assigned mentor during initial
                      discovery sessions.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

      - name: timeInOperation
        type: enum
        label: "Time in Operation"
        isSorted: false
        category: "Business Detail"
        description: "How long the business has been operating. Used alongside
                      Business Stage for funder reporting on client maturity.
                      Ranges are intentionally broad to reduce friction at intake.
                      Requirement: CBM-PRD-CRM-Client.docx Section 3.1"
        options:
          - "Not yet started"
          - "Less than 1 year"
          - "1 - 2 years"
          - "3 - 5 years"
          - "6 - 10 years"
          - "More than 10 years"
        translatedOptions:
          "Not yet started": "Not yet started"
          "Less than 1 year": "Less than 1 year"
          "1 - 2 years": "1 - 2 years"
          "3 - 5 years": "3 - 5 years"
          "6 - 10 years": "6 - 10 years"
          "More than 10 years": "More than 10 years"
        style:
          "Not yet started": null
          "Less than 1 year": null
          "1 - 2 years": null
          "3 - 5 years": null
          "6 - 10 years": null
          "More than 10 years": null

      - name: currentTeamSize
        type: int
        label: "Current Team Size"
        min: 0
        category: "Business Detail"
        description: "Total number of people currently working in the business
                      including owners, full-time, and part-time employees. Used
                      for funder reporting on job creation and retention impact.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

      - name: revenueRange
        type: enum
        label: "Revenue Range"
        isSorted: false
        category: "Business Detail"
        description: "Annual revenue bracket. Collected post-assignment as part of
                      the business profile. Used for funder reporting and for
                      segmenting clients by business maturity. Ranges rather than
                      exact figures reduce client sensitivity around disclosure.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"
        options:
          - "Pre-Revenue"
          - "Under $50K"
          - "$50K - $100K"
          - "$100K - $250K"
          - "$250K - $500K"
          - "$500K - $1M"
          - "Over $1M"
        translatedOptions:
          "Pre-Revenue": "Pre-Revenue"
          "Under $50K": "Under $50K"
          "$50K - $100K": "$50K - $100K"
          "$100K - $250K": "$100K - $250K"
          "$250K - $500K": "$250K - $500K"
          "$500K - $1M": "$500K - $1M"
          "Over $1M": "Over $1M"
        style:
          "Pre-Revenue": null
          "Under $50K": null
          "$50K - $100K": null
          "$100K - $250K": null
          "$250K - $500K": null
          "$500K - $1M": null
          "Over $1M": null

      - name: fundingSituation
        type: wysiwyg
        label: "Funding Situation"
        category: "Business Detail"
        description: "Description of the client's current funding sources, capital
                      needs, and financing history. Populated post-assignment.
                      Helps the mentor understand financial constraints and identify
                      appropriate capital access strategies.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

      - name: currentChallenges
        type: wysiwyg
        label: "Current Challenges"
        category: "Business Detail"
        description: "The primary obstacles the client is currently facing in their
                      business. Populated post-assignment during discovery. Guides
                      the mentor's focus areas and session planning.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

      - name: goalsAndObjectives
        type: wysiwyg
        label: "Goals and Objectives"
        category: "Business Detail"
        description: "The client's stated goals for their business over the next
                      1-3 years. Populated post-assignment. Used to define
                      engagement success criteria and measure outcomes at close.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

      - name: desiredOutcomes
        type: wysiwyg
        label: "Desired Outcomes (6-12 Months)"
        category: "Business Detail"
        description: "Specific outcomes the client hopes to achieve within the
                      near-term mentoring period. More concrete than Goals and
                      Objectives. Used to set engagement milestones and evaluate
                      progress at NPS survey points.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

      - name: previousMentoringExperience
        type: wysiwyg
        label: "Previous Mentoring/Advisory Experience"
        category: "Business Detail"
        description: "Summary of any prior mentoring, coaching, or advisory
                      relationships the client has had. Helps the mentor calibrate
                      their approach and avoid repeating work already done with
                      previous advisors.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

      # ---------------------------------------------------------------
      # Professional Advisors — category: Professional Advisors
      # ---------------------------------------------------------------

      - name: currentProfessionalAdvisors
        type: multiEnum
        label: "Current Professional Advisors"
        category: "Professional Advisors"
        description: "The professional advisors currently supporting the client's
                      business. Helps the mentor understand the client's existing
                      support network and coordinate rather than duplicate advice.
                      Multi-select because clients typically have several advisors.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"
        options:
          - "Banker / Financial Institution"
          - "Attorney / Legal Counsel"
          - "Accountant / CPA"
          - "IT Consultant"
          - "Insurance Agent"
          - "Marketing / PR Consultant"
          - "Business Coach"

      # ---------------------------------------------------------------
      # Business Registration — category: Business Registration
      # ---------------------------------------------------------------

      - name: registeredWithState
        type: bool
        label: "Registered with State"
        default: false
        category: "Business Registration"
        description: "Whether the business is formally registered with the state.
                      Gates the display of all registration detail fields via
                      Dynamic Logic. Pre-startup businesses may not yet be
                      registered. Required for funder compliance reporting.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

      - name: stateOfRegistration
        type: enum
        label: "State of Registration"
        isSorted: true
        category: "Business Registration"
        description: "The US state where the business is officially registered.
                      Visible only when Registered with State = Yes (Dynamic Logic).
                      Most CBM clients will be registered in Ohio.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"
        options:
          - "Alabama"
          - "Alaska"
          - "Arizona"
          - "Arkansas"
          - "California"
          - "Colorado"
          - "Connecticut"
          - "Delaware"
          - "Florida"
          - "Georgia"
          - "Hawaii"
