      # 2.4.1 Business Identity & Classification Fields
      # ---------------------------------------------------------------

      - name: organizationType
        type: enum
        label: "Organization Type"
        required: true
        isSorted: false
        options:
          - "For-Profit"
          - "Non-Profit"
        translatedOptions:
          "For-Profit": "For-Profit"
          "Non-Profit": "Non-Profit"
        style:
          "For-Profit": null
          "Non-Profit": null

      - name: companyRole
        type: enum
        label: "Company Role"
        required: true
        isSorted: false
        options:
          - "Client Company"
          - "Mentoring Company"
          - "Partner Company"
          - "Sponsor Company"
          - "Vendor Company"
        translatedOptions:
          "Client Company": "Client Company"
          "Mentoring Company": "Mentoring Company"
          "Partner Company": "Partner Company"
          "Sponsor Company": "Sponsor Company"
          "Vendor Company": "Vendor Company"
