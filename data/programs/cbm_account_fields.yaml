          - "Utah"
          - "Vermont"
          - "Virginia"
          - "Washington"
          - "West Virginia"
          - "Wisconsin"
          - "Wyoming"
          - "District of Columbia"

      - name: legalBusinessStructure
        type: enum
        label: "Legal Business Structure"
        isSorted: false
        category: "Business Registration"
        description: "The legal form of the business entity. Visible only when
                      Registered with State = Yes. Relevant for mentoring advice
                      on liability, taxation, and growth structure.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"
        options:
          - "Sole Proprietor"
          - "Partnership"
          - "LLC"
          - "S-Corp"
          - "C-Corp"
          - "Non-Profit 501(c)(3)"
          - "Other"
        translatedOptions:
          "Sole Proprietor": "Sole Proprietor"
          "Partnership": "Partnership"
          "LLC": "LLC"
          "S-Corp": "S-Corp"
          "C-Corp": "C-Corp"
          "Non-Profit 501(c)(3)": "Non-Profit 501(c)(3)"
          "Other": "Other"
        style:
          "Sole Proprietor": null
          "Partnership": null
          "LLC": null
          "S-Corp": null
          "C-Corp": null
          "Non-Profit 501(c)(3)": null
          "Other": null

      - name: einOnFile
        type: bool
        label: "EIN on File"
        default: false
        category: "Business Registration"
        description: "Whether CBM has the business's Employer Identification Number
                      on file. Visible only when Registered with State = Yes.
                      Required for certain grant programs and funder compliance.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

      - name: dateOfFormation
        type: date
        label: "Date of Formation"
        category: "Business Registration"
        description: "The official date the business was registered with the state.
                      Visible only when Registered with State = Yes. Used to
                      calculate time in operation and for funder reporting.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

      - name: registeredAgent
        type: bool
        label: "Registered Agent"
        default: false
        category: "Business Registration"
        description: "Whether the business has designated a registered agent for
                      state compliance purposes. Visible only when Registered
                      with State = Yes. Indicates compliance maturity.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

      - name: einNumber
        type: varchar
        label: "EIN Number"
        maxLength: 20
        category: "Business Registration"
        description: "The business's 9-digit Employer Identification Number
                      (format: XX-XXXXXXX). Restricted field — visible to Admin
                      and Primary Mentor roles only. Not collected on the intake
                      form; mentor-populated after engagement begins.
                      Requirement: CBM-PRD-CRM-Client.docx Section 4.2"

    layout:
      detail:
        panels:

          - label: "Business Identity"
            tabBreak: true
            tabLabel: "Overview"
            style: default
            description: "Core identifying information about the company,
                          visible and editable by all roles."
            rows:
              - [name, website]
              - [address, null]
              - [organizationType, accountType]
              - [businessStage, null]

          - label: "Business Classification"
            tabBreak: true
            tabLabel: "Classification"
            style: default
            description: "Industry classification fields used for mentor matching
                          and funder reporting."
            dynamicLogicVisible:
              attribute: accountType
              value: "Client Company"
            tabs:
              - label: "Classification"
                category: "Business Classification"

          - label: "Mentoring Context"
            tabBreak: true
            tabLabel: "Mentoring"
            style: default
            description: "Fields describing what the client needs from CBM mentoring.
                          Core input for the mentor matching process."
            dynamicLogicVisible:
              attribute: accountType
              value: "Client Company"
            tabs:
              - label: "Mentoring"
                category: "Mentoring Context"

          - label: "Business Detail"
            tabBreak: true
            tabLabel: "Detail"
            style: default
            description: "In-depth business profile populated post-assignment.
                          Provides the mentor with context for effective engagement."
            dynamicLogicVisible:
              attribute: accountType
              value: "Client Company"
            tabs:
              - label: "Detail"
                category: "Business Detail"

          - label: "Professional Advisors"
            tabBreak: true
            tabLabel: "Advisors"
            style: default
            description: "The client's existing professional support network.
                          Helps the mentor avoid duplicating advice already received."
            dynamicLogicVisible:
              attribute: accountType
              value: "Client Company"
            tabs:
              - label: "Advisors"
                category: "Professional Advisors"

          - label: "Business Registration"
            tabBreak: true
            tabLabel: "Registration"
            style: default
            description: "Legal and compliance registration details. Gated behind
                          Registered with State = Yes via Dynamic Logic. EIN Number
                          is restricted to Admin and Primary Mentor roles."
            dynamicLogicVisible:
              attribute: accountType
              value: "Client Company"
            tabs:
              - label: "Registration"
                category: "Business Registration"

      list:
        columns:
          - field: name
            width: 25
          - field: accountType
            width: 15
          - field: organizationType
            width: 15
          - field: businessStage
            width: 15
          - field: naicsSector
            width: 20
          - field: billingAddressCity
            width: 10
