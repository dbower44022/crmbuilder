version: "1.0"
description: "CBM EspoCRM Configuration — Account (Company) Fields and Layout"

# Source of truth: CBM-PRD-CRM-Implementation.docx Sections 2.4, Phase 2
#                  CBM-PRD-CRM-Partners.docx Section 15.2
#
# Native EspoCRM entity (Account, relabeled as Company) — no action required.
#
# DESIGN DECISION: companyRole (single-select) replaced by accountType
# (multi-select) to support accounts that hold multiple roles simultaneously
# (e.g. an organization that is both a Client Company and a Partner).
# accountType is the Dynamic Logic driver for all Client Company and Partner
# panel visibility. See CBM-PRD-CRM-Partners.docx Section 15.2.
#
# Fields NOT included here (handled separately):
#   - Link fields (relationships to other entities)
#   - Native EspoCRM fields (name/Company Name, website, address)

entities:
  Account:
    description: "Represents all organizations in CBM's ecosystem — client
                  businesses receiving mentoring, Partner organizations, CBM
                  itself, sponsors, and vendors. A single Account entity covers
                  all organization types, distinguished by the Account Type
                  multi-select field which drives Dynamic Logic panel visibility.
                  An account may hold multiple types simultaneously.
                  Requirement: CBM-PRD-CRM-Client.docx Section 2.1,
                  CBM-PRD-CRM-Partners.docx Section 15.1."

    fields:

      # ---------------------------------------------------------------
      # Business Identity — category: Business Identity
      # ---------------------------------------------------------------

      - name: organizationType
        type: enum
        label: "Organization Type"
        required: true
        isSorted: false
        category: "Business Identity"
        description: "Distinguishes for-profit businesses from nonprofits.
                      Drives reporting segmentation and determines which intake
                      fields are relevant. Required at intake.
                      Requirement: CBM-PRD-CRM-Client.docx Section 3.1"
        options:
          - "For-Profit"
          - "Non-Profit"
        translatedOptions:
          "For-Profit": "For-Profit"
          "Non-Profit": "Non-Profit"
        style:
          "For-Profit": null
          "Non-Profit": null

      - name: accountType
        type: multiEnum
        label: "Account Type"
        required: true
        category: "Business Identity"
        description: >
          Multi-select classification of the account's role in CBM's ecosystem.
          An account may hold more than one type simultaneously — for example,
          a Partner organization that is also a mentoring client would be both
          Client Company and Partner. Drives Dynamic Logic panel visibility:
          Client Company panels shown only when Account Type includes Client
          Company; Partner panels only when it includes Partner.
          Replaces the previous single-select companyRole field, which could
          not support multi-type accounts.
          Requirement: CBM-PRD-CRM-Client.docx Section 3.1,
          CBM-PRD-CRM-Partners.docx Section 15.2.
        options:
          - "Client Company"
          - "Partner"
          - "Mentoring Company"
          - "Sponsor"
          - "Vendor"

      - name: businessStage
        type: enum
        label: "Business Stage"
        required: true
        isSorted: false
        category: "Business Identity"
        description: "Indicates the maturity stage of the client's business at the
                      time of intake. Used for mentor matching — some mentors
                      specialize in early-stage businesses — and for funder
                      reporting on client demographics.
                      Requirement: CBM-PRD-CRM-Client.docx Section 3.1"
        options:
          - "Pre-Startup"
          - "Startup"
          - "Early Stage"
          - "Growth Stage"
          - "Established"
        translatedOptions:
          "Pre-Startup": "Pre-Startup"
          "Startup": "Startup"
          "Early Stage": "Early Stage"
          "Growth Stage": "Growth Stage"
          "Established": "Established"
        style:
          "Pre-Startup": null
          "Startup": null
          "Early Stage": null
          "Growth Stage": null
          "Established": null

      # ---------------------------------------------------------------
      # Business Classification — category: Business Classification
      # ---------------------------------------------------------------

      - name: naicsSector
        type: enum
        label: "NAICS Sector"
        required: true
        isSorted: false
        category: "Business Classification"
        description: "Top-level federal industry classification (20 sectors).
                      Used for mentor-client matching — mentors specify which
                      sectors they serve. Also used for funder reporting on
                      industry distribution of clients served.
                      Requirement: CBM-PRD-CRM-Client.docx Section 3.1"
        options:
          - "11 - Agriculture, Forestry, Fishing"
          - "21 - Mining, Quarrying, Oil & Gas"
          - "22 - Utilities"
          - "23 - Construction"
          - "31-33 - Manufacturing"
          - "42 - Wholesale Trade"
          - "44-45 - Retail Trade"
          - "48-49 - Transportation & Warehousing"
