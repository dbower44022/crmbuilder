      - name: companyRole
        type: enum
        label: "Company Role"
        required: false
        default: "Client Company"
        isSorted: false
        options:
          - "Client Company"
          - "Partner"
          - "Funder"
          - "Other"
        translatedOptions:
          "Client Company": "Client Company"
          "Partner": "Partner"
          "Funder": "Funder"
          "Other": "Other"
        style:
          "Client Company": null
          "Partner": null
          "Funder": null
          "Other": null

      - name: businessDescription
        type: wysiwyg
        label: "Business Description"

      - name: timeInOperation
        type: varchar
        label: "Time in Operation"
        maxLength: 100

      - name: currentTeamSize
        type: int
