version: "1.0"
description: "CBM EspoCRM Configuration — Contact Fields"

# Source of truth: CBM-PRD-CRM-Implementation.docx Section 2.5
# Native EspoCRM entity — no action required.
# Fields are organized by contact type: All Contacts, Mentor-Specific, Client-Specific.
#
# Fields NOT included here (handled separately):
#   - Link fields (relationships to other entities)
#   - Native EspoCRM fields (firstName, lastName, email, phone, address)

entities:
  Contact:
    fields:

      # ---------------------------------------------------------------
      # All Contacts
      # ---------------------------------------------------------------

      - name: middleName
        type: varchar
        label: "Middle Name"
        maxLength: 100

      - name: preferredName
        type: varchar
        label: "Preferred Name"
        maxLength: 150

      - name: linkedInProfile
        type: url
        label: "LinkedIn Profile"

      - name: contactType
        type: enum
        label: "Contact Type"
        required: true
        isSorted: false
        options:
          - "Mentor"
          - "Client"
        translatedOptions:
          "Mentor": "Mentor"
          "Client": "Client"
        style:
          "Mentor": null
          "Client": null

      # ---------------------------------------------------------------
      # Mentor-Specific Fields
      # ---------------------------------------------------------------

      - name: personalEmail
        type: email
        label: "Personal Email"

      - name: cbmGmailAddress
        type: email
        label: "CBM Gmail Address"
        readOnly: true

      - name: professionalTitle
        type: varchar
        label: "Professional Title"
        maxLength: 150

      - name: currentEmployer
        type: varchar
        label: "Current Employer"
        maxLength: 255

      - name: currentlyEmployed
        type: bool
        label: "Currently Employed"
        default: false

      - name: yearsOfBusinessExperience
        type: int
        label: "Years of Business Experience"
        min: 0

      - name: professionalBio
        type: wysiwyg
        label: "Professional Bio / Work Experience"

      - name: naicsSectors
        type: multiEnum
        label: "NAICS Sectors"
        required: true
        options:
          - "11 - Agriculture, Forestry, Fishing"
          - "21 - Mining, Quarrying, Oil & Gas"
          - "22 - Utilities"
          - "23 - Construction"
          - "31-33 - Manufacturing"
          - "42 - Wholesale Trade"
          - "44-45 - Retail Trade"
          - "48-49 - Transportation & Warehousing"
          - "51 - Information"
          - "52 - Finance & Insurance"
          - "53 - Real Estate"
          - "54 - Professional, Scientific & Technical"
          - "55 - Management of Companies"
          - "56 - Administrative & Support Services"
          - "61 - Educational Services"
          - "62 - Health Care & Social Assistance"
          - "71 - Arts, Entertainment & Recreation"
          - "72 - Accommodation & Food Services"
          - "81 - Other Services"
          - "92 - Public Administration"

      - name: mentoringFocusAreas
        type: multiEnum
        label: "Mentoring Focus Areas"
        required: true
        options:
          - "Business Planning & Strategy"
          - "Marketing & Sales"
          - "Financial Management & Accounting"
          - "Operations & Process Improvement"
          - "Human Resources & Team Building"
          - "Legal & Compliance"
          - "Technology & Digital Transformation"
          - "Access to Capital & Funding"
          - "E-Commerce & Online Business"
          - "Export & International Trade"
          - "Nonprofit Management"
          - "Social Entrepreneurship"
          - "Real Estate & Property Management"
          - "Retail & Consumer Goods"
          - "Food & Beverage"
          - "Healthcare & Wellness"
          - "Manufacturing & Supply Chain"
          - "Construction & Trades"

      - name: skillsAndExpertiseTags
        type: multiEnum
        label: "Skills & Expertise Tags"
        options:
          - "Startup Formation"
          - "Business Plan Writing"
          - "Pitch Deck Development"
          - "Financial Modeling"
          - "QuickBooks / Bookkeeping"
          - "Grant Writing"
          - "SBA Loans"
          - "Angel & Venture Capital"
          - "Crowdfunding"
          - "SEO & Digital Marketing"
          - "Social Media Strategy"
          - "Brand Development"
          - "Contract Negotiation"
          - "Intellectual Property"
          - "HR Policies & Procedures"
          - "Hiring & Recruiting"
          - "Leadership Coaching"
          - "Franchise Development"
          - "Exit Planning & Business Sale"
          - "Import / Export Compliance"
          - "Website Development"
          - "CRM & Sales Automation"
          - "Data Analytics"
          - "Cybersecurity Basics"

      - name: fluentLanguages
        type: multiEnum
        label: "Fluent Languages"
        options:
          - "English"
          - "Spanish"
          - "Arabic"
          - "Chinese (Mandarin)"
          - "Chinese (Cantonese)"
          - "French"
          - "German"
          - "Hindi"
          - "Italian"
          - "Japanese"
          - "Korean"
          - "Polish"
          - "Portuguese"
          - "Russian"
          - "Somali"
          - "Tagalog"
          - "Ukrainian"
          - "Vietnamese"
          - "Other"

      - name: whyInterestedInMentoring
        type: wysiwyg
        label: "Why Interested in Mentoring"

      - name: howDidYouHearAboutCbm
        type: enum
        label: "How Did You Hear About CBM"
        isSorted: false
        options:
          - "CBM Website"
          - "Google Search"
          - "Social Media"
          - "Referred by a Mentor"
          - "Referred by a Client"
          - "Chamber of Commerce"
          - "SBDC / SCORE"
          - "Community Organization"
          - "University / College"
          - "Event or Workshop"
          - "News / Media"
          - "Other"
        translatedOptions:
          "CBM Website": "CBM Website"
          "Google Search": "Google Search"
          "Social Media": "Social Media"
          "Referred by a Mentor": "Referred by a Mentor"
          "Referred by a Client": "Referred by a Client"
          "Chamber of Commerce": "Chamber of Commerce"
          "SBDC / SCORE": "SBDC / SCORE"
          "Community Organization": "Community Organization"
          "University / College": "University / College"
          "Event or Workshop": "Event or Workshop"
          "News / Media": "News / Media"
          "Other": "Other"
        style:
          "CBM Website": null
          "Google Search": null
          "Social Media": null
          "Referred by a Mentor": null
          "Referred by a Client": null
          "Chamber of Commerce": null
          "SBDC / SCORE": null
          "Community Organization": null
          "University / College": null
          "Event or Workshop": null
          "News / Media": null
          "Other": null

      - name: isMentor
        type: bool
        label: "Is Mentor"
        default: false

      - name: isCoMentor
        type: bool
        label: "Is Co-Mentor"
        default: false

      - name: isSme
        type: bool
        label: "Is SME"
        default: false

      - name: mentorStatus
        type: enum
        label: "Mentor Status"
        required: true
        isSorted: false
        options:
          - "Submitted"
          - "Provisional"
          - "Declined"
          - "Active"
          - "Inactive"
          - "Departed"
        translatedOptions:
          "Submitted": "Submitted"
          "Provisional": "Provisional"
          "Declined": "Declined"
          "Active": "Active"
          "Inactive": "Inactive"
          "Departed": "Departed"
        style:
          "Submitted": "info"
          "Provisional": "warning"
          "Declined": "danger"
          "Active": "success"
          "Inactive": "default"
          "Departed": "default"

      - name: acceptingNewClients
        type: bool
        label: "Accepting New Clients"
        default: true

      - name: maximumClientCapacity
        type: int
        label: "Maximum Client Capacity"
        required: true
        min: 0

      - name: currentActiveClients
        type: int
        label: "Current Active Clients"
        readOnly: true
        min: 0

      - name: availableCapacity
        type: int
        label: "Available Capacity"
        readOnly: true
        min: 0

      - name: ethicsAgreementAccepted
        type: bool
        label: "Ethics Agreement Accepted"
        default: false
        readOnly: true

      - name: ethicsAgreementAcceptanceDateTime
        type: datetime
        label: "Ethics Agreement Acceptance Date/Time"
        readOnly: true

      - name: termsAndConditionsAccepted
        type: bool
        label: "Terms & Conditions Accepted"
        default: false
        readOnly: true

      - name: termsAndConditionsAcceptanceDateTime
        type: datetime
        label: "Terms & Conditions Acceptance Date/Time"
        readOnly: true

      - name: backgroundCheckCompleted
        type: bool
        label: "Background Check Completed"
        default: false

      - name: backgroundCheckDate
        type: date
        label: "Background Check Date"

      - name: felonyConviction
        type: bool
        label: "Felony Conviction"
        default: false

      - name: moodleTrainingCompleted
        type: bool
        label: "Moodle Training Completed"
        default: false
        readOnly: true

      - name: moodleCompletionDate
        type: date
        label: "Moodle Completion Date"
        readOnly: true

      - name: duesStatus
        type: enum
        label: "Dues Status"
        isSorted: false
        options:
          - "Unpaid"
          - "Paid"
          - "Waived"
        translatedOptions:
          "Unpaid": "Unpaid"
          "Paid": "Paid"
          "Waived": "Waived"
        style:
          "Unpaid": "danger"
          "Paid": "success"
          "Waived": "default"

      - name: duesPaymentDate
        type: date
        label: "Dues Payment Date"

      - name: departureReason
        type: enum
        label: "Departure Reason"
        isSorted: false
        options:
          - "Relocated"
          - "Career Change"
          - "Time Constraints"
          - "Personal"
          - "Other"
        translatedOptions:
          "Relocated": "Relocated"
          "Career Change": "Career Change"
          "Time Constraints": "Time Constraints"
          "Personal": "Personal"
          "Other": "Other"
        style:
          "Relocated": null
          "Career Change": null
          "Time Constraints": null
          "Personal": null
          "Other": null

      - name: departureDate
        type: date
        label: "Departure Date"

      # ---------------------------------------------------------------
      # Client-Specific Fields
      # ---------------------------------------------------------------

      - name: roleAtBusiness
        type: varchar
        label: "Role at Business"
        maxLength: 150

      - name: isPrimaryContact
        type: bool
        label: "Primary Contact"
        default: true

      - name: zipCode
        type: varchar
        label: "Zip Code"
        maxLength: 20
