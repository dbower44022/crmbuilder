# Catalog metadata
# =============================================================================
catalog_id: lead
catalog_version: "0.1"
last_updated: "05-08-26 05:30"
tier: 2
entry_kind: universal

# =============================================================================
# Entity-level definition
# =============================================================================
name: Lead
display_name: Lead
purpose: >
  An unqualified prospect — a person or organization who has shown interest
  but has not yet been confirmed as a qualified sales target. Distinct from
  Contact because Leads are typically not yet associated with an Account
  and may turn out to be unfit (disqualified) rather than progressing into
  an Opportunity.

business_context: >
  Lead records are pre-Contact, pre-Account holding cells for prospects who
  have signaled interest but haven't been qualified yet — a webform fill,
  a tradeshow scan, a list-purchased name, a cold-outreach response. The
  Lead-vs-Contact split is one of the most architecturally divergent
  decisions in CRM modeling. Three patterns exist: (1) explicit Lead
  entity with conversion (Salesforce, EspoCRM, NPSP) — Lead has its own
  table, lifecycle, and a one-way conversion process that creates
  Account+Contact+Opportunity records when the Lead qualifies; (2)
  unified Contact with status (HubSpot) — no separate Lead table; the
  pre-qualification state is just `lifecyclestage=lead` on the Contact;
  (3) no lead concept at all (Attio, CiviCRM, Bloomerang) — every person
  is a Contact / Person / Constituent from day one, with no
  pre-qualification entity. The choice has significant operational
  consequences: separate-Lead deployments suffer from "lead vs contact"
  duplicate confusion, conversion-loss data complexity, and reporting
  complexity that spans both objects; unified-Contact deployments avoid
  these but lose the disposable, qualification-gating semantics that some
  sales teams want. When interviewing clients, surface "Lead" by asking
  whether they need a separate workflow for unqualified prospects that's
  distinct from how they handle confirmed contacts: do unqualified
  prospects need to be handled by a different team (SDR) than qualified
  ones (AE)? do they want a clean separation between "real" relationships
  and inbound-list noise? if yes, they need a backend that supports a
  Lead entity natively. Nonprofit deployments rarely use Leads since
  donors and volunteers are typically Contacts from initial entry.

data_model_role: anchor
typically_required: false
common_synonyms:
  - Prospect
  - Inquiry
  - MQL (Marketing-Qualified Lead)
  - SQL (Sales-Qualified Lead)
  - Suspect

# =============================================================================
# Cross-system equivalents
# =============================================================================
systems:
  - system: salesforce
    name: Lead
    api_name: Lead
    is_standard: true
    notes: >
      Standard object with an explicit Convert lifecycle. A Lead is created
      with name and company; when qualified, the Convert action creates
      Account + Contact + Opportunity records and marks the Lead as
      converted (IsConverted=true, ConvertedAccountId / ConvertedContactId /
      ConvertedOpportunityId populated). The Lead record persists for
      audit but is functionally retired.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_lead.htm

  - system: hubspot
    name: "Contact (with lifecyclestage=lead)"
    api_name: contacts
    is_standard: false
    notes: >
      MAJOR DIVERGENCE. HubSpot has no separate Lead entity. Pre-
      qualification state is captured by the `lifecyclestage` property on
      Contact (values: subscriber, lead, marketingqualifiedlead,
      salesqualifiedlead, opportunity, customer, evangelist, other).
      Conversion is just a property update; no separate object swap.
      HubSpot Sales Hub Enterprise added a separate Leads object in 2024
      but it's behind a subscription tier and the Contact-with-lifecyclestage
      pattern remains the dominant model.
    docs_url: https://knowledge.hubspot.com/contacts/use-lifecycle-stages

  - system: attio
    name: "Person (no Lead entity)"
    api_name: not_applicable
    is_standard: false
    notes: >
      MAJOR DIVERGENCE. Attio has no Lead concept. Every prospect is a
      Person record from initial entry. Pre-qualification status is
      typically tracked via a custom Status attribute on the Person object
      or via list membership ("Inbound Leads" list).
    docs_url: https://attio.com/help/reference/managing-your-data/objects/manage-standard-objects

  - system: espocrm
    name: Lead
    api_name: Lead
    is_standard: true
    notes: >
      Standard CRM-module entity. Leads convert into Account + Contact +
      Opportunity (configurable). Original lead is preserved with status
      values like New, Assigned, In Process, Converted, Recycled, Dead.
      The Account.originalLead linkOne field on the converted Account
      points back to the source Lead.
    docs_url: https://github.com/espocrm/espocrm/blob/master/application/Espo/Modules/Crm/Resources/metadata/entityDefs/Lead.json

  - system: civicrm
    name: "Contact (no Lead entity)"
    api_name: not_applicable
    is_standard: false
    notes: >
      MAJOR DIVERGENCE. CiviCRM has no Lead concept. Every prospect is a
      Contact from the start. Qualification status, if tracked, is a
      custom field or Group membership.
    docs_url: https://docs.civicrm.org/user/en/latest/organising-your-data/contacts/

  - system: salesforce_npsp
    name: Lead
    api_name: Lead
    is_standard: true
    notes: >
      Same as Salesforce. NPSP rarely uses Leads in nonprofit deployments —
      donor onboarding typically goes directly to Contact. Leads do appear
      in nonprofit deployments that have a sales-like motion (corporate
      partnerships, sponsorship sales) where prospects get qualified
      before becoming partner relationships.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_lead.htm

  - system: bloomerang
    name: "Constituent (no Lead entity)"
    api_name: not_applicable
    is_standard: false
    notes: >
      MAJOR DIVERGENCE. Bloomerang has no Lead concept. Every prospective
      donor is a Constituent from initial entry. Cultivation status, if
      tracked, is via the Generosity Score, custom fields, or Group
      membership.
    docs_url: https://bloomerang.com/api/rest-api-v1/

# =============================================================================
# Attributes
# =============================================================================
attributes:
  - name: firstName
    display_name: First Name
    type: string
    required: false
    max_length: 100
    description: >
      Given name of the lead.
    usage: >
      Used for personalization in outreach, lead-scoring rules, and
      duplicate detection during conversion. Same role as Contact.firstName.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: lastName
    display_name: Last Name
    type: string
    required: true
    max_length: 100
    description: >
      Family name of the lead.
    usage: >
      Required field on Salesforce and EspoCRM Leads. Anchors duplicate-
      detection rules during the Convert action — when a Lead converts,
      the system checks for existing Contacts with the same last name +
      email or last name + company.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: company
    display_name: Company
    type: string
    required: true
    max_length: 255
    description: >
      Name of the organization the lead represents.
    usage: >
      The company string lives directly on the Lead before any Account
      record is created. Required on Salesforce Lead. On conversion, this
      string drives Account creation: if a matching Account exists, the
      Lead links to it; if not, a new Account is created with this name.
      For B2C leads, conventional values are "(Individual)" or the lead's
      personal name.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: emailAddress
    display_name: Email Address
    type: email
    required: false
    description: >
      Primary email address of the lead.
    usage: >
      Anchors marketing automation, lead-scoring, and duplicate detection.
      During conversion, often used as the matching key against existing
      Contacts.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: phone
    display_name: Phone
    type: phone
    required: false
    description: >
      Primary phone number of the lead.
    usage: >
      Used by SDR teams for cold-call outreach and lead-routing rules
      (territory-based assignment by area code).
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: title
    display_name: Title
    type: string
    required: false
    max_length: 255
    description: >
      Job title of the lead at their company.
    usage: >
      Critical for ICP scoring — drives Lead Status routing (Director-level
      and above goes to AE; below goes to SDR). Often the differentiator
      between MQL and SQL classification.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: leadSource
    display_name: Lead Source
    type: enum
    required: false
    enum_values:
      - Web
      - Phone Inquiry
      - Partner Referral
      - Purchased List
      - Tradeshow
      - Email Campaign
      - Other
    description: >
      Channel through which the lead was acquired.
    usage: >
      Drives marketing-attribution reporting (which channels produce the
      best leads), conversion-rate analysis by source, and routing rules
      (web leads to inside sales, tradeshow leads to field sales). Often
      the single most analyzed attribute on Lead records.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: leadStatus
    display_name: Lead Status
    type: enum
    required: true
    enum_values:
      - New
      - Working
      - Nurturing
      - Qualified
      - Unqualified
    description: >
      Lifecycle state of the lead.
    usage: >
      Drives the qualification workflow. New = not yet contacted; Working =
      in active outreach; Nurturing = long-term cadence (not ready yet);
      Qualified = ready for conversion; Unqualified = will not convert.
      Rules and SLAs typically attach to status transitions (e.g., New
      Leads must move to Working within 1 business day).
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: rating
    display_name: Rating
    type: enum
    required: false
    enum_values:
      - Hot
      - Warm
      - Cold
    description: >
      Subjective qualification temperature.
    usage: >
      Used by SDRs to flag highest-priority leads for accelerated
      follow-up. Less rigorous than a numeric lead score but quicker to
      apply. Often replaced by an AI-calculated lead score in modern
      deployments.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: custom
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: industry
    display_name: Industry
    type: enum
    required: false
    description: >
      Industry classification of the lead's company.
    usage: >
      Used in territory routing, ICP scoring, and segmentation reports.
      Vocabulary matches Account.industry so that conversion preserves
      the value cleanly.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: numberOfEmployees
    display_name: Number of Employees
    type: integer
    required: false
    description: >
      Estimated headcount of the lead's company.
    usage: >
      ICP-scoring and territory-routing input. Same role as
      Account.numberOfEmployees, captured at the lead stage so the value
      is available before conversion.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: annualRevenue
    display_name: Annual Revenue
    type: currency
    required: false
    description: >
      Estimated annual revenue of the lead's company.
    usage: >
      ICP-scoring input — sales orgs often segment leads by company size
      using revenue and employee count combined.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: assignedUser
    display_name: Owner
    type: reference
    required: false
    reference_target: user
    description: >
      The user who owns the lead (typically an SDR).
    usage: >
      Drives SLA routing, "my leads" filtering, and lead-pool round-robin
      assignment. Lead ownership often follows different rules than
      Account/Contact ownership (territory-based or round-robin rather
      than relationship-based).
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: isConverted
    display_name: Converted
    type: boolean
    required: true
    description: >
      Flag indicating the lead has been converted into Account + Contact +
      Opportunity records.
    usage: >
      Once true, the Lead is functionally retired — locked from edits,
      hidden from active-lead views, but preserved for audit and
      attribution. Salesforce sets this automatically via the Convert
      action; EspoCRM uses status=Converted instead. Drives "open leads"
      versus "converted leads" reporting.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: custom
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: convertedDate
    display_name: Converted Date
    type: datetime
    required: false
    description: >
      Date and time the lead was converted.
    usage: >
      Drives time-to-conversion reporting (lifetime value of leads acquired
      from each source / channel / SDR). Read-only and system-set on
      conversion.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: custom
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: >
      System-generated timestamp of when the lead was created.
    usage: >
      Drives "leads created this week" reports, SLA tracking (time from
      creation to first touch), and integration sync filters.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

# =============================================================================
# Relationships to other entities
# =============================================================================
relationships:
  - target: account
    cardinality: one-to-one
    role: peer
    description: >
      Upon conversion, a lead generates an account record (or links to an
      existing one). Pre-conversion, the company name lives on the lead
      itself.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: contact
    cardinality: one-to-one
    role: peer
    description: >
      Upon conversion, a lead generates a contact record (or links to an
      existing one).
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: opportunity
    cardinality: one-to-one
    role: peer
    description: >
      Upon conversion, a lead optionally generates an opportunity record.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: user
    cardinality: many-to-one
    role: child
    description: >
      A lead is owned by a user (typically an SDR).
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

