# =============================================================================
# Entity-level definition
# =============================================================================
name: Payment
display_name: Payment
purpose: >
  A record of money received from a customer (or constituent), applied
  against an invoice (in commerce contexts) or against a donation /
  pledge (in nonprofit contexts). Has amount, payment method, payment
  date, reference number, and the parent record being paid.

business_context: >
  Payment records track money received. Each payment has an amount and
  a method (credit card, ACH, check, cash, wire, in-kind), a date, and
  some target it's being applied against — typically an Invoice (in
  commerce contexts), a Donation / Contribution (in nonprofit donation
  contexts), or a Pledge (in nonprofit pledge-payment contexts).
  Payment-to-target modeling is the most divergent aspect: a single
  payment may apply to a single invoice, to multiple invoices
  (split-payment), or to a single donation. Payments connect the CRM
  to the financial system — most CRM Payment objects are reflections of
  records that live authoritatively in the payment processor (Stripe,
  Authorize.net, Braintree) or accounting system. NPSP separates
  Donation (Opportunity) from Payment via the npe01__OppPayment__c
  custom object — a Donation can be paid via multiple Payment records
  representing pledge installments. Bloomerang has Transaction (which is
  often used for already-received payments) plus separate Pledge entities
  for pledged-but-unpaid commitments. CiviCRM has Contribution (the
  donation/transaction) plus separate Payment records that apply against
  Contributions to handle partial payments. When interviewing clients,
  surface "Payment" by asking how they receive money: one-time donations,
  recurring billing, pledges paid in installments, sales orders paid on
  invoice. Different patterns require different Payment modeling depth.

data_model_role: event
typically_required: false
common_synonyms:
  - Payment Transaction
  - Receipt
  - Remittance
  - Cash Receipt

# =============================================================================
# Cross-system equivalents
# =============================================================================
systems:
  - system: salesforce
    name: "Payment (via Salesforce Billing) / npe01__OppPayment__c (NPSP)"
    api_name: Payment
    is_standard: false
    notes: >
      Native Payment object available in Salesforce Billing. Standard
      Salesforce CRM doesn't include Payment. Most B2B deployments rely
      on ERP integration. NPSP introduces npe01__OppPayment__c
      (Opportunity Payment) for donation-pledge-payment tracking
      separately.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.industries_reference.meta/industries_reference/sforce_api_objects_payment.htm

  - system: hubspot
    name: Payment
    api_name: payments
    is_standard: true
    notes: >
      HubSpot Payments (introduced 2022) integrates with Stripe to
      record payments received via HubSpot's payment processing.
      Includes amount, status, method, customer.
    docs_url: https://developers.hubspot.com/docs/api-reference/crm-commerce-payments-v3

  - system: attio
    name: "(no native Payment; use custom object)"
    api_name: not_applicable
    is_standard: false
    notes: >
      Attio has no native Payment entity.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects

  - system: espocrm
    name: "Receipt / Payment (Sales Pack module)"
    api_name: Receipt
    is_standard: true
    notes: >
      EspoCRM Sales Pack includes Receipt records that apply against
      Invoices. Includes payment method, amount, date, account.
    docs_url: https://docs.espocrm.com/

  - system: civicrm
    name: Payment
    api_name: Payment
    is_standard: true
    notes: >
      CiviCRM has a separate Payment entity that applies against
      Contributions. Supports partial payments (multiple Payment records
      against one Contribution to track pledge-installment payments).
    docs_url: https://docs.civicrm.org/user/en/latest/contributions/payments/

  - system: salesforce_npsp
    name: "OppPayment (npe01__OppPayment__c)"
    api_name: npe01__OppPayment__c
    is_standard: true
    notes: >
      NPSP-specific. Each Donation Opportunity has one or more
      OppPayment records representing actual payments received. For
      one-time donations, one Payment per Donation. For multi-year
      pledges, multiple Payments per Donation.
    docs_url: https://help.salesforce.com/s/articleView?id=sfdo.NPSP_Payments_overview.htm

  - system: bloomerang
    name: "(Transaction serves payment role; Pledge separate)"
    api_name: Transaction
    is_standard: true
    notes: >
      Bloomerang doesn't separate Donation from Payment — Transaction
      serves both roles. For pledged-but-not-paid commitments, separate
      Pledge entity tracks the obligation; PledgePayment Transactions
      apply against the Pledge.
    docs_url: https://bloomerang.com/api/rest-api-v1/

# =============================================================================
# Attributes
# =============================================================================
attributes:
  - name: paymentNumber
    display_name: Payment Number
    type: autonumber
    required: false
    description: >
      System-generated identifier for the payment.
    usage: >
      Internal cross-reference; sometimes appears on receipts.
    presence:
      salesforce:
        status: standard
        api_name: PaymentNumber
      hubspot:
        status: standard
        api_name: paymentnumber
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: paymentNumber
      civicrm:
        status: standard
        api_name: payment_number
      salesforce_npsp:
        status: standard
        api_name: PaymentNumber
      bloomerang:
        status: standard
        api_name: PaymentNumber
  - name: paymentAmount
    display_name: Payment Amount
    type: currency
    required: true
    description: >
      Amount of the payment.
    usage: >
      Headline figure. Drives revenue-recognition and AR-application.
    presence:
      salesforce:
        status: standard
        api_name: Amount
      hubspot:
        status: standard
        api_name: amount
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: amount
      civicrm:
        status: standard
        api_name: amount
      salesforce_npsp:
        status: standard
        api_name: Amount
      bloomerang:
        status: standard
        api_name: Amount
  - name: paymentDate
    display_name: Payment Date
    type: date
    required: true
    description: >
      Date the payment was received.
    usage: >
      Drives revenue recognition timing and AR aging updates.
    presence:
      salesforce:
        status: standard
        api_name: PaymentDate
      hubspot:
        status: standard
        api_name: paymentdate
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: paymentDate
      civicrm:
        status: standard
        api_name: payment_date
      salesforce_npsp:
        status: standard
        api_name: PaymentDate
      bloomerang:
        status: standard
        api_name: PaymentDate
  - name: paymentMethod
    display_name: Payment Method
    type: enum
    required: false
    enum_values:
      - Credit Card
      - ACH
      - Check
      - Cash
      - Wire Transfer
      - In-Kind
      - Stock
      - Other
    description: >
      How the payment was made.
    usage: >
      Drives accounting categorization and reconciliation. In nonprofit
      contexts also drives acknowledgment-letter language (different
      language for stock gifts vs cash).
    presence:
      salesforce:
        status: standard
        api_name: PaymentMethod
      hubspot:
        status: standard
        api_name: paymentmethod
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: paymentMethod
      civicrm:
        status: standard
        api_name: payment_method
      salesforce_npsp:
        status: standard
        api_name: PaymentMethod
      bloomerang:
        status: standard
        api_name: PaymentMethod
  - name: paymentStatus
    display_name: Payment Status
    type: enum
    required: true
    enum_values:
      - Pending
      - Authorized
      - Completed
      - Failed
      - Refunded
      - Voided
    description: >
      Payment processing status.
    usage: >
      Drives reconciliation logic — only Completed payments count
      against invoices/donations. Failed and Voided payments require
      retry or write-off.
    presence:
      salesforce:
        status: standard
        api_name: Status
      hubspot:
        status: standard
        api_name: status
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: status
      civicrm:
        status: standard
        api_name: status
      salesforce_npsp:
        status: standard
        api_name: Status
      bloomerang:
        status: standard
        api_name: Status
  - name: invoice
    display_name: Invoice
    type: reference
    required: false
    reference_target: invoice
    description: >
      Reference to the invoice this payment applies against.
    usage: >
      For commerce contexts — Payment-to-Invoice application is the
      core of accounts-receivable. For nonprofit contexts, payments
      typically reference Donation/Contribution rather than Invoice.
    presence:
      salesforce:
        status: standard
        api_name: Invoice
      hubspot:
        status: standard
        api_name: invoice
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: invoice
      civicrm:
        status: standard
        api_name: invoice
      salesforce_npsp:
        status: absent
      bloomerang:
        status: absent
  - name: account
    display_name: Account
    type: reference
    required: true
    reference_target: account
    description: >
      The customer / constituent making the payment.
    usage: >
      Drives lifetime-value calculations and donor / customer-history
      reporting.
    presence:
      salesforce:
        status: standard
        api_name: Account
      hubspot:
        status: standard
        api_name: account
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: account
      civicrm:
        status: standard
        api_name: account
      salesforce_npsp:
        status: standard
        api_name: Account
      bloomerang:
        status: standard
        api_name: Account
  - name: referenceNumber
    display_name: Reference Number
    type: string
    required: false
    max_length: 255
    description: >
      External identifier from the payment processor or check number.
    usage: >
      Drives reconciliation — match payment processor reports to CRM
      records by reference number.
    presence:
      salesforce:
        status: standard
        api_name: ReferenceNumber
      hubspot:
        status: standard
        api_name: referencenumber
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: referenceNumber
      civicrm:
        status: standard
        api_name: reference_number
      salesforce_npsp:
        status: standard
        api_name: ReferenceNumber
      bloomerang:
        status: standard
        api_name: ReferenceNumber
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: >
      System-generated timestamp of payment record creation.
    usage: >
      Audit field; can differ from paymentDate in retroactive entry.
    presence:
      salesforce:
        status: standard
        api_name: CreatedDate
      hubspot:
        status: standard
        api_name: createdate
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: createdAt
      civicrm:
        status: standard
        api_name: created_date
      salesforce_npsp:
        status: standard
        api_name: CreatedDate
      bloomerang:
        status: standard
