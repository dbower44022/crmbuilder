relationships:
  - target: invoice
    cardinality: many-to-one
    role: child
    description: >
      A payment applies against one invoice (in commerce contexts).
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: standard
      salesforce_npsp: absent
      bloomerang: absent

  - target: opportunity
    cardinality: many-to-one
    role: child
    description: >
      A payment may apply against an opportunity (NPSP donation context
      where Opportunity = Donation).
    presence:
      salesforce: custom
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: standard

  - target: account
    cardinality: many-to-one
    role: child
    description: >
      A payment is made by one account.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

