catalog_id: membership
catalog_version: "0.1"
last_updated: "05-09-26 10:00"
tier: 4
entry_kind: universal

name: Membership
display_name: Membership
purpose: >
  A time-bound enrolled status that grants a contact (or organization)
  benefits, voting rights, access, or recognition in exchange for dues,
  contributions, or qualifying activities. Common in professional
  associations, civic organizations, museums, public broadcasting,
  advocacy groups, and member-supported nonprofits.

business_context: >
  Membership records track who is currently a member, at what level, since
  when, and through when. They drive member-only access (newsletters,
  events, content), renewal workflows (membership-expiring notices), and
  member-engagement reporting (retention rate, lapse rate, lifetime
  membership value). Modeling varies significantly across systems: CiviCRM
  has a first-class Membership entity with rich support for membership
  types, levels, statuses (New / Current / Grace / Expired / Pending /
  Cancelled / Deceased), and renewal rules. NPSP supports Memberships via
  Opportunity Record Types (with auto-renewal logic), plus a Level object
  for member-level definitions. Bloomerang doesn't have native Membership
  but allows it via Custom Fields on Constituent. The B2B systems
  generally don't have it. Dues payments are typically tracked as
  Donations linked to the Membership record. When interviewing clients,
  surface "Membership" by asking whether they have members (in any sense),
  whether membership is time-bound (does it expire), and whether dues
  drive renewal cycles. Different from a "donor" — donors give without
  expecting transactional benefits; members give in exchange for an
  enrolled status that confers rights or benefits.

data_model_role: anchor
typically_required: false
common_synonyms:
  - Member
  - Subscriber
  - Enrolled
  - Patron

systems:
  - system: salesforce
    name: "(no native Membership)"
    api_name: not_applicable
    is_standard: false
    notes: Vanilla Salesforce has no Membership entity.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_opportunity.htm
  - system: hubspot
    name: "(custom property or custom object)"
    api_name: not_applicable
    is_standard: false
    notes: HubSpot has no Membership entity.
    docs_url: https://developers.hubspot.com/docs/api-reference/crm-deals-v3/guide
  - system: attio
    name: "(custom object)"
    api_name: not_applicable
    is_standard: false
    notes: Attio has no Membership entity.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects
  - system: espocrm
    name: "(no Membership entity)"
    api_name: not_applicable
    is_standard: false
    notes: EspoCRM has no Membership entity.
    docs_url: https://docs.espocrm.com/
  - system: civicrm
    name: Membership
    api_name: Membership
    is_standard: true
    notes: First-class entity. Includes membership_type_id, status_id, join_date, start_date, end_date, source, contact_id, owner_membership_id (for organization memberships).
    docs_url: https://docs.civicrm.org/user/en/latest/membership/
  - system: salesforce_npsp
    name: "Opportunity (Membership Record Type) + Level"
    api_name: Opportunity
    is_standard: true
    notes: NPSP ships a Membership Record Type on Opportunity. Plus a Level object for member-level definitions. Renewal logic is supported but less rigorous than CiviCRM's purpose-built framework.
    docs_url: https://developer.salesforce.com/docs/platform/data-models/guide/nonprofit-success-pack.html
  - system: bloomerang
    name: "Constituent custom fields"
    api_name: not_applicable
    is_standard: false
    notes: Bloomerang has no first-class Membership. Tracked via Custom Fields on Constituent and Membership Type tags.
    docs_url: https://bloomerang.com/api/rest-api-v1/

attributes:
  - name: contact
    display_name: Member (Contact)
    type: reference
    required: true
    reference_target: contact
    description: The contact who holds the membership.
    usage: Anchors the membership to the member's record. Drives "active members" filtering.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: contact_id
      salesforce_npsp:
        status: standard
        api_name: ContactId
      bloomerang:
        status: custom
  - name: membershipType
    display_name: Membership Type
    type: enum
    required: true
    description: Category or level of membership.
    usage: Distinguishes Individual / Family / Student / Senior / Lifetime / Corporate / Patron. Drives benefits, dues amount, and term length. CiviCRM has a separate MembershipType entity for 
      managing these definitions.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: membership_type_id
      salesforce_npsp:
        status: standard
        api_name: npe01__Membership_Origin__c
      bloomerang:
        status: custom
    common_synonyms:
      - member type
      - level
      - tier
      - membership level
  - name: status
    display_name: Status
    type: enum
    required: true
    enum_values:
      - New
      - Current
      - Grace Period
      - Expired
      - Pending
      - Cancelled
      - Lifetime
    description: Current state of the membership.
    usage: Drives renewal workflows. Grace Period is a window post-expiration during which the member is still treated as active for renewal-reminder purposes.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: status_id
      salesforce_npsp:
        status: standard
        api_name: npe01__Membership_Status__c
      bloomerang:
        status: custom
  - name: joinDate
    display_name: Join Date
    type: date
    required: false
    description: Date the contact first became a member.
    usage: Distinct from start date — join date stays constant across renewals; start date refreshes each term.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: join_date
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
  - name: startDate
    display_name: Start Date (Current Term)
    type: date
    required: true
    description: Start date of the current membership term.
    usage: Updates with each renewal. Drives current-term reporting.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: start_date
      salesforce_npsp:
        status: standard
        api_name: npe01__Membership_Start_Date__c
      bloomerang:
        status: custom
  - name: endDate
    display_name: End Date (Current Term)
    type: date
    required: true
    description: End date of the current membership term.
    usage: Drives renewal reminders, expiring-soon reports, and grace-period transitions. Often calculated as startDate + term length but stored explicitly for audit.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: end_date
      salesforce_npsp:
        status: standard
        api_name: npe01__Membership_End_Date__c
      bloomerang:
        status: custom
  - name: amount
    display_name: Dues Amount
    type: currency
    required: false
    description: Amount of membership dues for the current term.
    usage: Recorded for audit. Actual payment tracking happens on linked Donation records.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: fee
      salesforce_npsp:
        status: standard
        api_name: Amount
      bloomerang:
        status: custom
  - name: source
    display_name: Source
    type: enum
    required: false
    description: Channel through which the membership was acquired.
    usage: Drives acquisition-channel reporting (which channels produce best-retained members).
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: source
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: System timestamp.
    usage: Audit field.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: created_date
      salesforce_npsp:
        status: standard
        api_name: CreatedDate
      bloomerang:
        status: standard
        api_name: CreatedDate
relationships:
  - target: contact
    cardinality: many-to-one
    role: child
    description: A membership belongs to one member contact.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: custom
  - target: donation
    cardinality: one-to-many
    role: parent
    description: A membership has dues payments tracked as donations.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: custom

