catalog_id: volunteer-hour
catalog_version: "0.1"
last_updated: "05-09-26 10:05"
tier: 4
entry_kind: universal

name: Volunteer Hour
display_name: Volunteer Hour
purpose: >
  A logged record of volunteer time contributed by an individual to the
  organization or to a specific event, program, or cause. Captures who
  volunteered, when, for how many hours, and against what activity.

business_context: >
  Volunteer Hour records track the unpaid labor that powers most
  nonprofits. They drive volunteer-recognition workflows (milestones for
  100, 500, 1000 lifetime hours), grant-application reporting (many
  funders require evidence of volunteer engagement), tax documentation
  (the IRS doesn't allow valuation of volunteer time as a charitable
  deduction, but in-kind professional services can be tracked
  separately), and program-impact reporting (X volunteers contributed Y
  hours to deliver Z programs). Modeling varies considerably: NPSP has a
  Volunteer Hours object via the Volunteers for Salesforce extension
  (V4S — a separately-installed managed package); CiviCRM has a
  CiviVolunteer extension; Bloomerang has Volunteer hours as a built-in
  Interaction subtype with hours and project tracking; standard
  Salesforce, HubSpot, Attio, and EspoCRM have no native concept and
  require custom build-out. Hours are typically logged against a Project
  / Program / Event / Activity, with a contact (the volunteer), a date,
  hours count, and optional descriptive notes. When interviewing clients,
  surface "Volunteer Hour" by asking whether they engage volunteers,
  whether they need to track contributed hours for reporting or
  recognition, and whether volunteer hours roll up into program impact
  metrics.

data_model_role: event
typically_required: false
common_synonyms:
  - Volunteer Time
  - Service Hour
  - Pro Bono Hour
  - Contribution of Service

systems:
  - system: salesforce
    name: "(no native — V4S extension required)"
    api_name: not_applicable
    is_standard: false
    notes: Vanilla Salesforce has no Volunteer Hour entity. The Volunteers for Salesforce (V4S) managed package adds Volunteer Hours, Jobs, and Shifts.
    docs_url: https://help.salesforce.com/s/articleView?id=000384741&type=1
  - system: hubspot
    name: "(custom required)"
    api_name: not_applicable
    is_standard: false
    notes: HubSpot has no Volunteer Hour entity.
    docs_url: https://developers.hubspot.com/docs/api-reference/crm-deals-v3/guide
  - system: attio
    name: "(custom object)"
    api_name: not_applicable
    is_standard: false
    notes: Attio has no Volunteer Hour entity.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects
  - system: espocrm
    name: "(no Volunteer Hour entity)"
    api_name: not_applicable
    is_standard: false
    notes: EspoCRM has no Volunteer Hour entity.
    docs_url: https://docs.espocrm.com/
  - system: civicrm
    name: "Volunteer Assignment (CiviVolunteer extension)"
    api_name: VolunteerAssignment
    is_standard: false
    notes: Available via the CiviVolunteer extension. Tracks volunteer assignments with hours, role, project, and assignment status.
    docs_url: https://docs.civicrm.org/volunteer/en/latest/
  - system: salesforce_npsp
    name: "Volunteer Hours (V4S managed package)"
    api_name: GW_Volunteers__Volunteer_Hours__c
    is_standard: false
    notes: Available via the Volunteers for Salesforce (V4S) managed package, separate from NPSP itself. Tracks Hours, related Job, related Shift, related Contact, and Status.
    docs_url: https://github.com/SalesforceFoundation/Volunteers-for-Salesforce
  - system: bloomerang
    name: "Volunteer Interaction (Interaction subtype)"
    api_name: Interaction
    is_standard: true
    notes: Bloomerang treats volunteer hours as an Interaction subtype with Hours and Project tracking. Built-in to the Constituent timeline.
    docs_url: https://bloomerang.com/api/rest-api-v1/

attributes:
  - name: contact
    display_name: Volunteer (Contact)
    type: reference
    required: true
    reference_target: contact
    description: The individual who volunteered.
    usage: Anchors hours to the volunteer's record. Drives lifetime-volunteer-hours rollups and recognition milestones.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: standard
        api_name: AccountId
  - name: hours
    display_name: Hours
    type: decimal
    required: true
    description: Number of hours volunteered (typically supports decimals for partial hours).
    usage: The headline number. Aggregates across volunteers, programs, and time periods for impact reporting and grant applications.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: standard
        api_name: Hours
    common_synonyms:
      - time
      - service hours
      - volunteer time
  - name: serviceDate
    display_name: Service Date
    type: date
    required: true
    description: Date the volunteer service was performed.
    usage: Drives time-period reporting (this month, this quarter, this year). Distinct from createdAt (record-creation time).
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: standard
        api_name: Date
  - name: project
    display_name: Project / Program
    type: reference
    required: false
    reference_target: campaign
    description: The project, program, or event the hours were contributed to.
    usage: Drives program-impact reports (X hours of volunteer time delivered Y program). V4S models this as Volunteer Job; Bloomerang uses Project; CiviCRM uses Project.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: standard
        api_name: ProjectId
  - name: role
    display_name: Role
    type: enum
    required: false
    description: Role or function the volunteer performed.
    usage: Categorizes hours by role type (Tutor, Driver, Event Setup, Phone Bank, etc). Drives skill-based-volunteer-pool reporting.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
  - name: status
    display_name: Status
    type: enum
    required: false
    enum_values:
      - Pledged
      - Confirmed
      - Completed
      - Cancelled
      - No Show
    description: Lifecycle state of the volunteer assignment.
    usage: Distinguishes scheduled (Pledged) from completed. Drives no-show reporting and reliability metrics.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
  - name: description
    display_name: Description
    type: text
    required: false
    description: Free-form notes on what was done.
    usage: Captures specifics of the service for context — useful for performance reviews and personalized acknowledgments.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: standard
        api_name: Note
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: System timestamp of record creation.
    usage: Distinct from serviceDate. Drives data-entry-velocity reporting.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: standard
        api_name: CreatedDate
relationships:
  - target: contact
    cardinality: many-to-one
    role: child
    description: A volunteer-hour record belongs to one volunteer.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: custom
      salesforce_npsp: custom
      bloomerang: standard
  - target: campaign
    cardinality: many-to-one
    role: child
    description: A volunteer-hour record may be associated with a project, program, or event.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: custom
      salesforce_npsp: custom
      bloomerang: standard

