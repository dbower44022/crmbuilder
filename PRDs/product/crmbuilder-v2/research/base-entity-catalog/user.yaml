catalog_id: user
catalog_version: "0.1"
last_updated: "05-08-26 04:50"
tier: 1
entry_kind: universal

# =============================================================================
# Entity-level definition
# =============================================================================
name: User
display_name: User
purpose: >
  An authenticated user of the CRM system: a staff member, contractor, or
  authorized individual who logs in and operates the CRM. Distinct from
  Contact (a person the CRM tracks data about) — though in some
  deployments the same human may be both.

business_context: >
  User records are the CRM's authentication and authorization anchors:
  every record in the system has Created By, Last Modified By, and usually
  Owner / Assigned User references that point at User records. User records
  drive permissions (which records a person can see and edit), task and
  account assignment ("Sarah owns this account"), reporting filters ("show
  me my open opportunities"), and audit trails ("who changed this field
  yesterday"). Users typically have license tiers (Standard, Read-Only,
  Portal, etc.) that determine cost and capability. The User vs Contact
  distinction is sharp in most B2B systems but blurry in nonprofits: a
  staff member might also be a donor (so their record exists as both a
  User and a Contact); a board member might be a Contact who occasionally
  needs limited User access; a volunteer coordinator might be a User who
  is also tracked as a Contact for emergency contact purposes. When
  interviewing clients, surface "User" by asking who actually logs into
  the CRM (which is different from who appears in it) and what permission
  tiers they need: full access for staff, limited access for volunteers,
  read-only for executives, portal access for partners or board members.
  Bloomerang notably handles this differently — it doesn't expose User as
  an API entity at all because user management is administrative-only.

data_model_role: anchor
typically_required: true
common_synonyms:
  - Staff
  - Operator
  - Login
  - Member (when distinguishing from Constituent)

# =============================================================================
# Cross-system equivalents
# =============================================================================
systems:
  - system: salesforce
    name: User
    api_name: User
    is_standard: true
    notes: >
      Standard object. Salesforce has multiple User-adjacent records:
      User (full-license users), UserLicense (license tier), Profile and
      PermissionSet (permission containers), Group (role groupings).
      Distinct from Contact entirely.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_user.htm

  - system: hubspot
    name: Owner / User
    api_name: "owners (users have a separate users API)"
    is_standard: true
    notes: >
      HubSpot distinguishes "Owners" (the assignable-to entity referenced
      by hubspot_owner_id properties) from "Users" (the authentication
      identity). Owners are typically a subset of Users — only Users with
      certain seats can be assigned as Owners. Users API is separate.
    docs_url: https://developers.hubspot.com/docs/reference/api/crm/owners

  - system: attio
    name: Workspace member
    api_name: workspace_members
    is_standard: true
    notes: >
      Attio uses "Workspace members" as the operator concept. Distinct from
      the Users standard object (which is for tracking product users in
      PLG contexts). Workspace members have access tiers (Admin, Member,
      Guest).
    docs_url: https://attio.com/help/reference/workspace-settings-billing

  - system: espocrm
    name: User
    api_name: User
    is_standard: true
    notes: >
      Standard entity. EspoCRM ships User with type values: regular, admin,
      portal, api, system, super-admin. Portal users are a special type
      that allows external access (typical for customer/partner portals)
      with restricted record visibility. API users are non-interactive
      identities for integrations.
    docs_url: https://github.com/espocrm/espocrm/blob/master/application/Espo/Resources/metadata/entityDefs/User.json

  - system: civicrm
    name: User (via Drupal/Joomla/WordPress UF)
    api_name: User
    is_standard: true
    notes: >
      MAJOR DIVERGENCE. CiviCRM doesn't manage User records itself — it
      delegates to the host CMS's user system (Drupal, Joomla, or WordPress).
      User records exist in the CMS's user tables, with a UFMatch table
      linking CMS users to CiviCRM Contact records. Permissions are
      configured via the CMS's role/permission system.
    docs_url: https://docs.civicrm.org/sysadmin/en/latest/setup/users/

  - system: salesforce_npsp
    name: User
    api_name: User
    is_standard: true
    notes: >
      Same as Salesforce. NPSP doesn't add User customizations but commonly
      uses Profile customization to create role-specific layouts (Donor
      Services profile, Major Gifts profile, Program Staff profile) with
      different visible fields.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_user.htm

  - system: bloomerang
    name: User (admin-only, no API)
    api_name: not_in_api
    is_standard: true
    notes: >
      MAJOR DIVERGENCE. Bloomerang has User records but they are
      administrative-only — User management is exclusively via the admin
      UI, with no public REST API endpoint for User CRUD. As a result,
      Constituent ownership is not modeled the way other CRMs do it; user
      identity tracks only via API key holder. This affects assignment
      modeling significantly when integrating with Bloomerang.
    docs_url: https://support.bloomerang.co/s/article/13000076351

# =============================================================================
# Attributes
# =============================================================================
attributes:
  - name: username
    display_name: Username
    type: string
    required: true
    max_length: 255
    description: >
      Unique login identifier for the user.
    usage: >
      Authentication identifier. In Salesforce required to be a globally
      unique email-formatted string. In EspoCRM a free-text identifier.
      In HubSpot the email is the identifier; there is no separate
      username field.
    presence:
      salesforce:
        status: standard
        api_name: Username
      hubspot:
        status: absent
      attio:
        status: standard
        api_name: email_address
      espocrm:
        status: standard
        api_name: userName
      civicrm:
        status: standard
        api_name: name
      salesforce_npsp:
        status: standard
        api_name: Username
      bloomerang:
        status: standard
        api_name: Username
  - name: emailAddress
    display_name: Email Address
    type: email
    required: true
    description: >
      Email address of the user.
    usage: >
      Used for login (in many systems also serves as the username), password
      reset notifications, and outbound email "From" addresses when the
      user sends mail through the CRM. Required and typically unique
      per organization.
    presence:
      salesforce:
        status: standard
        api_name: Email
      hubspot:
        status: standard
        api_name: email
      attio:
        status: standard
        api_name: email_address
      espocrm:
        status: standard
        api_name: emailAddress
      civicrm:
        status: standard
        api_name: mail
      salesforce_npsp:
        status: standard
        api_name: Email
      bloomerang:
        status: standard
        api_name: EmailAddress
  - name: firstName
    display_name: First Name
    type: string
    required: false
    max_length: 100
    description: >
      Given name of the user.
    usage: >
      Used in displays ("Owner: Sarah Johnson"), email signatures, and
      personalized in-app messaging. Required varies by system.
    presence:
      salesforce:
        status: standard
        api_name: FirstName
      hubspot:
        status: standard
        api_name: first_name
      attio:
        status: standard
        api_name: first_name
      espocrm:
        status: standard
        api_name: firstName
      civicrm:
        status: standard
        api_name: first_name
      salesforce_npsp:
        status: standard
        api_name: FirstName
      bloomerang:
        status: standard
        api_name: FirstName
  - name: lastName
    display_name: Last Name
    type: string
    required: true
    max_length: 100
    description: >
      Family name (surname) of the user.
    usage: >
      Same uses as Contact.lastName but for the operator. Salesforce
      requires last name on User records.
    presence:
      salesforce:
        status: standard
        api_name: LastName
      hubspot:
        status: standard
        api_name: last_name
      attio:
        status: standard
        api_name: last_name
      espocrm:
        status: standard
        api_name: lastName
      civicrm:
        status: standard
        api_name: last_name
      salesforce_npsp:
        status: standard
        api_name: LastName
      bloomerang:
        status: standard
        api_name: LastName
  - name: title
    display_name: Title
    type: string
    required: false
    max_length: 255
    description: >
      Job title of the user within the organization that owns the CRM.
    usage: >
      Display field for organization charts, email signatures, and assignee
      identification. Often populated from HR system integration.
    presence:
      salesforce:
        status: standard
        api_name: Title
      hubspot:
        status: standard
        api_name: job_title
      attio:
        status: standard
        api_name: title
      espocrm:
        status: standard
        api_name: title
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: Title
      bloomerang:
        status: custom
  - name: role
    display_name: Role
    type: reference
    required: false
    reference_target: tag
    description: >
      Role assignment that determines permission scope (which records the
      user can access).
    usage: >
      Drives sharing rules and record visibility. Salesforce uses a Role
      hierarchy (UserRoleId) for sharing-based access; EspoCRM uses Roles
      and Teams; Attio uses Access Levels per object. Different from
      "Title" (display label) — Role is functional and machine-readable.
    presence:
      salesforce:
        status: standard
        api_name: UserRoleId
      hubspot:
        status: standard
        api_name: role_id
      attio:
        status: standard
        api_name: access_level
      espocrm:
        status: standard
        api_name: rolesIds
      civicrm:
        status: standard
        api_name: role
      salesforce_npsp:
        status: standard
        api_name: UserRoleId
      bloomerang:
        status: standard
        api_name: Role
    common_synonyms:
      - permission set
      - access level
      - security role
  - name: isActive
    display_name: Active
    type: boolean
    required: true
    description: >
      Flag indicating whether the user can currently log in.
    usage: >
      Inactive users cannot log in but their User record persists so that
      historical Created By and Owner references remain intact. Setting
      isActive=false is the standard "deactivate user" operation;
      deletion is rarely supported because of audit-trail integrity.
    presence:
      salesforce:
        status: standard
        api_name: IsActive
      hubspot:
        status: standard
        api_name: archived
      attio:
        status: standard
        api_name: is_active
      espocrm:
        status: standard
        api_name: isActive
      civicrm:
        status: standard
        api_name: is_active
      salesforce_npsp:
        status: standard
        api_name: IsActive
      bloomerang:
        status: standard
        api_name: IsActive
    common_synonyms:
      - active
      - enabled
      - login enabled
  - name: type
    display_name: User Type
    type: enum
    required: true
    enum_values:
      - Regular
      - Admin
      - Portal
      - API
    description: >
      Classification of what kind of user this is.
    usage: >
      Distinguishes interactive operators (Regular, Admin) from external
      access roles (Portal users for customer/partner portals) and
      programmatic identities (API users for integrations). EspoCRM ships
      with type values: regular, admin, portal, api, system, super-admin.
      Salesforce uses UserType field with values like Standard, PowerCustomerSuccess,
      CustomerSuccess, Guest, Partner. License tier is a separate
      consideration in most systems.
    presence:
      salesforce:
        status: standard
        api_name: UserType
      hubspot:
        status: standard
        api_name: type
      attio:
        status: standard
        api_name: type
      espocrm:
        status: standard
        api_name: type
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: UserType
      bloomerang:
        status: custom
  - name: phone
    display_name: Phone
    type: phone
    required: false
    description: >
      Phone number of the user.
    usage: >
      Optional contact info for the user — used in displays and signatures.
      Less universally populated than email. Sometimes used for two-factor
      authentication SMS.
    presence:
      salesforce:
        status: standard
        api_name: Phone
      hubspot:
        status: standard
        api_name: phone
      attio:
        status: standard
        api_name: phone
      espocrm:
        status: standard
        api_name: phoneNumber
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: Phone
      bloomerang:
        status: custom
  - name: timezone
    display_name: Time Zone
    type: enum
    required: false
    description: >
      User's preferred time zone for displaying dates and times.
    usage: >
      Drives display localization — meeting times, due dates, and
      timestamps shown in the user's local zone. Important for distributed
      teams. IANA time zone identifier in modern systems (America/New_York,
      Europe/London).
    presence:
      salesforce:
        status: standard
        api_name: TimeZoneSidKey
      hubspot:
        status: standard
        api_name: timezone
      attio:
        status: standard
        api_name: timezone
      espocrm:
        status: standard
        api_name: timeZone
      civicrm:
        status: standard
        api_name: timezone
      salesforce_npsp:
        status: standard
        api_name: TimeZoneSidKey
      bloomerang:
        status: custom
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: >
      System-generated timestamp of when the user was created.
    usage: >
      Audit field; rarely used in workflows but useful for license-cohort
      reporting and seat utilization analysis.
    presence:
      salesforce:
        status: standard
        api_name: CreatedDate
      hubspot:
        status: standard
        api_name: createdate
      attio:
        status: standard
        api_name: created_at
      espocrm:
        status: standard
        api_name: createdAt
      civicrm:
        status: standard
        api_name: created_date
      salesforce_npsp:
        status: standard
        api_name: CreatedDate
      bloomerang:
        status: standard
        api_name: CreatedDate
relationships:
  - target: account
    cardinality: one-to-many
    role: parent
    description: >
      A user owns many accounts (the assignedUser/owner relationship from
      the Account side).
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: custom
      salesforce_npsp: standard
      bloomerang: absent

  - target: contact
    cardinality: one-to-many
    role: parent
    description: >
      A user owns many contacts.
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: custom
      salesforce_npsp: standard
      bloomerang: absent

  - target: activity
    cardinality: one-to-many
    role: parent
    description: >
      A user has many activities assigned to them.
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

