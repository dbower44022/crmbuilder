        api_name: CreatedDate
relationships:
  - target: contact
    cardinality: many-to-many
    role: peer
    description: >
      A campaign targets many contacts; a contact can be in many campaigns.
      Modeled via Campaign Member (separate entity).
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - target: opportunity
    cardinality: one-to-many
    role: parent
    description: >
      A campaign drives many opportunities (in B2B) or donations (in
      nonprofit) attributed to it.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - target: campaign
    cardinality: many-to-one
    role: child
    description: >
      Campaign hierarchy via parent-campaign self-reference.
    presence:
      salesforce: standard
      hubspot: custom
      attio: absent
      espocrm: custom
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: custom

