# =============================================================================
# Catalog metadata
# =============================================================================
catalog_id: asset
catalog_version: "0.1"
last_updated: "05-08-26 06:08"
tier: 3
entry_kind: universal

# =============================================================================
# Entity-level definition
# =============================================================================
name: Asset
display_name: Asset
purpose: >
  An instance of a product owned by a specific customer — a physical
  device installed at a customer site, a software license assigned to an
  account, a subscription seat, a piece of equipment under maintenance
  contract. Distinct from Product (the catalog entry) which describes
  what's offered; Asset describes what a specific customer has.

business_context: >
  Asset records track per-customer instances of products. The Product
  catalog says "we sell Model X1000 Solar Panels"; Asset records say
  "Acme Corp owns 47 Model X1000 Solar Panels installed at their Cleveland
  facility on January 15, 2025, with serial numbers 4471-4517." Assets
  are essential for: warranty tracking (when does this specific device's
  warranty expire?), maintenance scheduling (when is the next preventive
  maintenance visit due?), case-context resolution (which device is the
  customer reporting an issue with?), upgrade-eligibility checks (which
  customers are running out-of-date firmware versions?), and renewal
  forecasting (what subscriptions expire next quarter?). Asset is
  primarily a B2B / field-service concept and rarely appears in nonprofit
  CRMs. When interviewing clients, surface "Asset" by asking whether they
  need to track instances of products at customer locations: physical
  equipment, installed software, subscription seats, leased machinery.
  If yes — they need Asset; if their model is purely transactional
  (sell a thing, ship it, done) without ongoing per-instance tracking,
  they don't.

data_model_role: anchor
typically_required: false
common_synonyms:
  - Installed Product
  - Subscription Instance
  - Equipment
  - Customer Asset

# =============================================================================
# Cross-system equivalents
# =============================================================================
systems:
  - system: salesforce
    name: Asset
    api_name: Asset
    is_standard: true
    notes: >
      Standard object. Asset has fields for Name, Account, Contact,
      Product2 (the catalog entry), SerialNumber, InstallDate,
      PurchaseDate, UsageEndDate (warranty end), Status, Quantity, Price.
      Salesforce Field Service Lightning extends Asset with hierarchy
      support (parent-asset / child-asset relationships).
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_asset.htm

  - system: hubspot
    name: "(no native Asset; use custom object or line items on Deals)"
    api_name: not_applicable
    is_standard: false
    notes: >
      HubSpot has no first-class Asset object. Customers needing
      installed-product tracking either use line items on closed Deals
      (which preserve which products were sold but not the per-instance
      data) or build a custom object.
    docs_url: https://knowledge.hubspot.com/crm-setup/custom-objects

  - system: attio
    name: "(no native Asset; use custom object)"
    api_name: not_applicable
    is_standard: false
    notes: >
      Attio has no native Asset entity. Customers create a custom object.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects

  - system: espocrm
    name: "(no standard Asset module; available in some commercial extensions)"
    api_name: not_applicable
    is_standard: false
    notes: >
      EspoCRM core does not include Asset. Some commercial extensions
      (Customer Service Pack, custom modules) add it. Most deployments
      build a custom entity if needed.
    docs_url: https://docs.espocrm.com/

  - system: civicrm
    name: "(no Asset concept)"
    api_name: not_applicable
    is_standard: false
    notes: >
      CiviCRM has no native Asset entity. Not a typical nonprofit modeling
      need.
    docs_url: https://docs.civicrm.org/

  - system: salesforce_npsp
    name: Asset
    api_name: Asset
    is_standard: true
    notes: >
      Same as Salesforce. Rare in nonprofit deployments — appears
      occasionally for nonprofits that lend equipment (libraries, tool
      libraries, technology lending programs).
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_asset.htm

  - system: bloomerang
    name: "(no Asset concept)"
    api_name: not_applicable
    is_standard: false
    notes: >
      Bloomerang has no native Asset entity.
    docs_url: https://bloomerang.com/api/rest-api-v1/

# =============================================================================
# Attributes
# =============================================================================
attributes:
  - name: assetName
    display_name: Asset Name
    type: string
    required: true
    max_length: 255
    description: >
      Display name of the asset.
    usage: >
      Often follows a template like "{Product Name} - {Serial Number}"
      or "{Customer Name} - {Product Name}." Drives list-view legibility
      and search.
    presence:
      salesforce:
        status: standard
        api_name: Name
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Name
      bloomerang:
        status: absent
  - name: account
    display_name: Account
    type: reference
    required: true
    reference_target: account
    description: >
      The customer account that owns or has the asset.
    usage: >
      Anchors the asset to its owner. Required because every asset
      represents one customer's instance of a product.
    presence:
      salesforce:
        status: standard
        api_name: Account
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Account
      bloomerang:
        status: absent
  - name: contact
    display_name: Contact
    type: reference
    required: false
    reference_target: contact
    description: >
      Optional specific contact at the customer who is the primary user
      or owner of the asset.
    usage: >
      Used for personal-asset scenarios (a specific person is the seat
      holder for a software license, the technician assigned to a
      device).
    presence:
      salesforce:
        status: standard
        api_name: Contact
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Contact
      bloomerang:
        status: absent
  - name: product
    display_name: Product
    type: reference
    required: false
    reference_target: product
    description: >
      The catalog product this asset is an instance of.
    usage: >
      Anchors asset back to the product catalog. Drives "all customers
      who own Product X" reports and product-recall workflows.
    presence:
      salesforce:
        status: standard
        api_name: Product
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Product
      bloomerang:
        status: absent
  - name: serialNumber
    display_name: Serial Number
    type: string
    required: false
    max_length: 255
    description: >
      Unique identifier for this specific asset instance.
    usage: >
      Critical for warranty validation, recall management, and case-
      to-asset matching when customers report issues. Often the unique
      key for asset records.
    presence:
      salesforce:
        status: standard
        api_name: SerialNumber
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: SerialNumber
      bloomerang:
        status: absent
  - name: installDate
    display_name: Install Date
    type: date
    required: false
    description: >
      Date the asset was installed at the customer location.
    usage: >
      Drives warranty-period calculation and maintenance-schedule
      anchoring.
    presence:
      salesforce:
        status: standard
        api_name: InstallDate
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: InstallDate
      bloomerang:
        status: absent
  - name: purchaseDate
    display_name: Purchase Date
    type: date
    required: false
    description: >
      Date the customer purchased the asset (may differ from install date).
    usage: >
      Used in warranty calculations when warranty starts at purchase
      rather than install.
    presence:
      salesforce:
        status: standard
        api_name: PurchaseDate
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: PurchaseDate
      bloomerang:
        status: absent
  - name: usageEndDate
    display_name: Usage End Date / Warranty End Date
    type: date
    required: false
    description: >
      Date when the asset's warranty or subscription term ends.
    usage: >
      Drives renewal workflows, expiring-warranty alerts, and out-of-
      warranty case-routing rules.
    presence:
      salesforce:
        status: standard
        api_name: UsageEndDate
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: UsageEndDate
      bloomerang:
        status: absent
  - name: assetStatus
    display_name: Asset Status
    type: enum
    required: false
    enum_values:
      - Purchased
      - Shipped
      - Installed
      - Active
      - Inactive
      - Returned
      - Decommissioned
    description: >
      Current lifecycle state of the asset.
    usage: >
      Drives asset-fleet reporting and maintenance scheduling. Inactive
      and Decommissioned assets are typically excluded from preventive
      maintenance schedules.
    presence:
      salesforce:
        status: standard
        api_name: Status
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Status
      bloomerang:
        status: absent
  - name: quantity
    display_name: Quantity
    type: decimal
    required: false
    description: >
      Number of units this asset record represents.
    usage: >
      For bulk-purchase scenarios where one Asset record represents
      multiple identical units. Used in seat-license tracking and
      consumable-product tracking.
    presence:
      salesforce:
        status: standard
        api_name: Quantity
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Quantity
      bloomerang:
        status: absent
  - name: price
    display_name: Price
    type: currency
    required: false
    description: >
      Per-unit price the customer paid for this asset.
    usage: >
      Captured at sale time. Drives lifetime-value reporting and renewal-
      pricing reference.
    presence:
      salesforce:
        status: standard
        api_name: Price
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Price
      bloomerang:
        status: absent
  - name: parentAsset
    display_name: Parent Asset
    type: reference
    required: false
    reference_target: asset
    description: >
      Self-referential lookup for hierarchical assets (e.g., a control
      panel asset has child assets for each connected sensor).
    usage: >
      Used in field-service modeling where complex equipment is composed
      of sub-assets, each independently serviced and tracked. Salesforce
      Field Service Lightning extension.
    presence:
      salesforce:
        status: standard
        api_name: ParentAsset
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: ParentAsset
      bloomerang:
        status: absent
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: >
      System-generated timestamp of asset record creation.
    usage: >
      Audit field; rarely used in workflows.
    presence:
      salesforce:
        status: standard
        api_name: CreatedDate
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: CreatedDate
      bloomerang:
        status: absent
relationships:
  - target: account
    cardinality: many-to-one
    role: child
    description: >
      An asset is owned by one account.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: product
    cardinality: many-to-one
    role: child
    description: >
      An asset is an instance of one product (catalog entry).
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: case
    cardinality: one-to-many
    role: parent
    description: >
      An asset can have many cases logged against it (issues with this
      specific instance).
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

