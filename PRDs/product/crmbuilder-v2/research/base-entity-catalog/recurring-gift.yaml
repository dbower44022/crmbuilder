catalog_id: recurring-gift
catalog_version: "0.1"
last_updated: "05-08-26 14:35"
tier: 4
entry_kind: universal

# =============================================================================
# Entity-level definition
# =============================================================================
name: Recurring Gift
display_name: Recurring Gift
purpose: >
  A schedule for repeating donations made on a regular cadence (monthly,
  quarterly, annually). Distinct from individual Donation records — the
  Recurring Gift defines the schedule; child Donation records track each
  installment.

business_context: >
  Recurring Gift records are the schedule and parent for donations that
  repeat on a cadence. They define the amount per installment, the
  frequency (monthly, quarterly, annually, custom), the start date, the
  end condition (open-ended versus fixed number of installments), and
  the payment method. Each scheduled installment generates a child
  Donation record at the appropriate date. Recurring giving is one of
  the most-watched metrics in modern fundraising — sustaining donors
  (those who give monthly or quarterly) typically have multi-year
  retention rates 5-10x higher than one-time donors, so growing the
  recurring base is a strategic priority for most organizations. Modeling
  varies: NPSP uses Recurring Donation (npe03__Recurring_Donation__c) as
  a separate object that auto-generates Opportunity installment records;
  CiviCRM uses ContributionRecur with the same parent-child pattern;
  Bloomerang uses RecurringDonation; B2B systems without nonprofit
  overlays don't have this concept and require custom build-out.
  When interviewing clients, surface "Recurring Gift" by asking whether
  they accept recurring donations, whether they need to track scheduled
  versus actual giving, whether they need failed-payment retry workflows,
  and whether they need cadence-change tracking (donor increases
  monthly amount; donor pauses; donor cancels).

data_model_role: anchor
typically_required: false
common_synonyms:
  - Recurring Donation
  - Sustaining Gift
  - Monthly Donor
  - Pledge Schedule
  - Subscription Donation

# =============================================================================
# Cross-system equivalents
# =============================================================================
systems:
  - system: salesforce
    name: "(no native Recurring Gift)"
    api_name: not_applicable
    is_standard: false
    notes: >
      Vanilla Salesforce has no Recurring Gift entity. Subscription Manager
      partially overlaps for SaaS deals but isn't suited to nonprofit
      recurring donations.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_opportunity.htm

  - system: hubspot
    name: "(custom or via Subscriptions in Commerce Hub)"
    api_name: not_applicable
    is_standard: false
    notes: >
      HubSpot has Subscriptions in Commerce Hub but for B2B subscriptions,
      not nonprofit recurring giving. Most nonprofits using HubSpot rely
      on payment-processor integrations (Stripe, Classy) rather than
      modeling recurring gifts in HubSpot directly.
    docs_url: https://developers.hubspot.com/docs/api-reference/crm-commerce-subscriptions

  - system: attio
    name: "(custom object required)"
    api_name: not_applicable
    is_standard: false
    notes: Attio has no native recurring-gift entity.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects

  - system: espocrm
    name: "(no native Recurring Gift)"
    api_name: not_applicable
    is_standard: false
    notes: EspoCRM has no recurring-gift entity. Custom build-out required.
    docs_url: https://docs.espocrm.com/

  - system: civicrm
    name: ContributionRecur
    api_name: ContributionRecur
    is_standard: true
    notes: >
      First-class entity. Includes amount, frequency_unit (day/week/month/
      year), frequency_interval, installments (null = open-ended), start_date,
      end_date, contribution_status_id, payment_processor_id. Each scheduled
      Contribution installment links back via contribution_recur_id.
    docs_url: https://docs.civicrm.org/user/en/latest/contributions/recurring-contributions/

  - system: salesforce_npsp
    name: Recurring Donation (npe03__Recurring_Donation__c)
    api_name: npe03__Recurring_Donation__c
    is_standard: true
    notes: >
      NPSP custom object that auto-generates Opportunity installments. NPSP
      Enhanced Recurring Donations (default since March 2021) supports both
      Open-Ended (no end date, generates Opportunities indefinitely) and
      Fixed-Length (specific number of installments) types. Includes
      RecurringType, InstallmentPeriod, Amount, PaymentMethod, StartDate,
      Status, plus a generated active Schedule record.
    docs_url: https://trailhead.salesforce.com/content/learn/modules/opportunity-settings-in-nonprofit-success-pack/manage-recurring-donations-npsp

  - system: bloomerang
    name: Recurring Donation
    api_name: RecurringDonation
    is_standard: true
    notes: >
      First-class entity. Includes amount, frequency, start date, payment
      method, fund/campaign/appeal designations. Generates child Transaction
      records at each scheduled date.
    docs_url: https://bloomerang.com/api/rest-api-v1/

# =============================================================================
# Attributes
# =============================================================================
attributes:
  - name: amount
    display_name: Installment Amount
    type: currency
    required: true
    description: Amount of each scheduled installment.
    usage: >
      The recurring gift amount per period. Drives projected-revenue
      reporting (count of active recurring × amount × annual frequency).
      Distinct from total commitment (which is amount × installments for
      fixed-length schedules) and lifetime giving (amount × actual
      installments received).
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - name: frequency
    display_name: Frequency
    type: enum
    required: true
    enum_values:
      - Weekly
      - Monthly
      - Quarterly
      - Semi-Annual
      - Annual
    description: How often the installment recurs.
    usage: >
      Drives the schedule-generation logic. Monthly is by far the most
      common (covers ~80% of recurring donors in typical deployments).
      Quarterly is common for corporate giving and major-donor pledge
      schedules. CiviCRM models this as frequency_unit + frequency_interval
      pair.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - name: startDate
    display_name: Start Date
    type: date
    required: true
    description: Date the recurring schedule begins.
    usage: >
      Drives the first-installment generation date. Often distinct from
      the "established date" (when the donor agreed to recur) because
      donors sometimes start their recurring gift at the beginning of
      the next month.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - name: endDate
    display_name: End Date
    type: date
    required: false
    description: Date the recurring schedule ends (null for open-ended).
    usage: >
      Required for Fixed-Length recurring schedules; null for Open-Ended.
      NPSP's RecurringType field distinguishes these explicitly. Drives
      sustainer-retention reporting (cancelled-vs-completed).
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - name: installments
    display_name: Number of Installments
    type: integer
    required: false
    description: Total installments for fixed-length schedules (null for open-ended).
    usage: >
      Drives total-commitment calculation (amount × installments) for
      fixed-length pledges. Important for capital campaigns where multi-
      year fixed pledges are common.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: custom

  - name: status
    display_name: Status
    type: enum
    required: true
    enum_values:
      - Active
      - Lapsed
      - Cancelled
      - Completed
      - Paused
    description: Lifecycle state of the recurring schedule.
    usage: >
      Drives sustainer cohort reporting. Active = currently giving;
      Lapsed = expected installment failed and not yet recovered;
      Cancelled = donor explicitly stopped; Completed = fixed-length
      schedule reached its end; Paused = temporary hold.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - name: paymentMethod
    display_name: Payment Method
    type: enum
    required: false
    enum_values:
      - Credit Card
      - ACH / Bank Transfer
      - Check
      - Other
    description: Default payment method for installments.
    usage: >
      Copied to each generated installment record. Credit card schedules
      are the most automated; check schedules require manual
      installment entry. NPSP copies this to each Payment record
      automatically.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - name: contact
    display_name: Donor (Contact)
    type: reference
    required: false
    reference_target: contact
    description: Individual donor making the recurring gift.
    usage: >
      Anchors the recurring schedule to the donor record. Drives "active
      sustainers" filtering on Contact records. Nullable for organization
      donors.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - name: account
    display_name: Donor (Account)
    type: reference
    required: false
    reference_target: account
    description: Organization or Household donor making the recurring gift.
    usage: >
      Used when the donor is an organization (corporate sponsor, family
      foundation) or a Household account.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - name: campaign
    display_name: Campaign
    type: reference
    required: false
    reference_target: campaign
    description: Campaign attribution for the recurring schedule.
    usage: >
      Drives recurring-revenue attribution by campaign. Particularly
      important for sustainer-acquisition campaigns where the goal is
      to convert one-time donors into recurring donors.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: System timestamp of when the recurring schedule was created.
    usage: >
      Distinct from startDate (when installments begin). Drives sustainer-
      acquisition cohort reporting.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

# =============================================================================
# Relationships to other entities
# =============================================================================
relationships:
  - target: donation
    cardinality: one-to-many
    role: parent
    description: A recurring schedule generates many donation installment records.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - target: contact
    cardinality: many-to-one
    role: child
    description: A recurring schedule is associated with one individual donor.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - target: account
    cardinality: many-to-one
    role: child
    description: A recurring schedule may be associated with an organization or household account.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

