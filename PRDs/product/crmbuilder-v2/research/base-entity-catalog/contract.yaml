catalog_id: contract
catalog_version: "0.1"
last_updated: "05-09-26 11:40"
tier: 5
entry_kind: universal

name: Contract
display_name: Contract
purpose: >
  A signed agreement between the organization and a customer, partner,
  vendor, or grantor that has its own lifecycle: drafted, in review,
  signed, active, renewable, expiring, terminated. Distinct from Quote
  (a pre-signature pricing proposal) and from Document (a generic file
  attachment) — Contract carries terms, dates, parties, and signature
  metadata as structured data.

business_context: >
  Contract records hold the legal-relationship layer of CRM data. Each
  contract has parties (the org and one or more counterparties), an
  effective date, a term length, an end date, a renewal disposition
  (auto-renewal vs manual), and signed signature artifacts. Contracts
  drive several distinct workflows: pre-signature (negotiation,
  redlining, approval routing); signature (e-sign integration with
  DocuSign, Adobe Sign, HelloSign); active-contract management
  (renewal-reminder cadence, anniversary milestones); and expiration /
  termination (renewal opportunities, churn signals). Modeling varies:
  Salesforce has Contract as a standard object that links to Account
  with ContractStatus, StartDate, ContractTerm (months), EndDate,
  ActivatedDate, OwnerExpirationNotice. HubSpot added Contracts as an
  Enterprise feature. EspoCRM has Contract in the Sales Pack module.
  Attio doesn't have a standard Contract entity. CiviCRM and Bloomerang
  don't have it natively — nonprofits typically use Documents for
  signed grant agreements and pledges. Contracts often have line items
  (specific services / products being contracted) similar to Quote line
  items. When interviewing clients, surface "Contract" by asking
  whether they need to track signed agreements with structured terms
  (effective dates, renewal logic, parties) separately from generic
  document attachments.

data_model_role: anchor
typically_required: false
common_synonyms:
  - Agreement
  - Signed Agreement
  - Service Contract
  - Master Services Agreement
  - Subscription Contract

systems:
  - system: salesforce
    name: Contract
    api_name: Contract
    is_standard: true
    notes: Foundational standard object. Includes ContractNumber, AccountId, Status (Draft / In Approval Process / Activated / Terminated / Expired), StartDate, ContractTerm (months), EndDate, ActivatedDate, OwnerExpirationNotice, BillingAddress, ShippingAddress, OwnerId.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_contract.htm
  - system: hubspot
    name: "Contracts (Enterprise)"
    api_name: contracts
    is_standard: true
    notes: HubSpot added Contracts as a CRM object available in Enterprise tiers. Includes contract terms, renewal tracking, and integration with HubSpot's e-sign workflows.
    docs_url: https://knowledge.hubspot.com/contracts/use-the-contract-object
  - system: attio
    name: "(custom object required)"
    api_name: not_applicable
    is_standard: false
    notes: Attio has no standard Contract entity. Customers create custom Contract objects when needed.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects
  - system: espocrm
    name: Contract
    api_name: Contract
    is_standard: true
    notes: Available in the Sales Pack module. Includes name, account, status (Draft / Sent / Signed / Active / Closed / Cancelled), dateStart, dateEnd, value, description.
    docs_url: https://github.com/espocrm/espocrm/blob/master/application/Espo/Modules/Sales/Resources/metadata/entityDefs/Contract.json
  - system: civicrm
    name: "(no native Contract — Document used for signed agreements)"
    api_name: not_applicable
    is_standard: false
    notes: CiviCRM has no Contract entity. Signed grant agreements and donor pledges typically attached as Documents to the Contact or Contribution.
    docs_url: https://docs.civicrm.org/user/en/latest/
  - system: salesforce_npsp
    name: Contract
    api_name: Contract
    is_standard: true
    notes: Same as Salesforce. Used for signed grant agreements, pledge agreements, sponsorship contracts, and corporate-partnership agreements.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_contract.htm
  - system: bloomerang
    name: "(no native Contract)"
    api_name: not_applicable
    is_standard: false
    notes: Bloomerang has no Contract entity. Signed pledges and agreements attached as Documents to Constituents.
    docs_url: https://bloomerang.com/api/rest-api-v1/

attributes:
  - name: contractNumber
    display_name: Contract Number
    type: autonumber
    required: true
    description: System-generated unique identifier for the contract.
    usage: Customer-facing identifier. Salesforce auto-numbers; EspoCRM uses sequential numbers.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - name: name
    display_name: Contract Name
    type: string
    required: true
    max_length: 255
    description: Display name of the contract.
    usage: Often follows naming conventions like "Acme - Annual MSA - 2026". Drives list-view legibility.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - name: account
    display_name: Account
    type: reference
    required: true
    reference_target: account
    description: The counterparty account on the contract.
    usage: Anchors the contract to the customer / partner / vendor account. Drives "show me all active contracts for this account" views.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - name: status
    display_name: Status
    type: enum
    required: true
    enum_values:
      - Draft
      - In Review
      - In Approval Process
      - Sent for Signature
      - Active
      - Expired
      - Renewed
      - Terminated
    description: Current state in the contract lifecycle.
    usage: Drives lifecycle workflow. Status transitions trigger automation (signed → activate; expiring soon → renewal-opportunity creation; terminated → churn-tracking).
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - name: startDate
    display_name: Start Date
    type: date
    required: true
    description: Effective date the contract begins.
    usage: Anchors contract-term reporting and active-contract filtering.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - name: endDate
    display_name: End Date
    type: date
    required: false
    description: Date the contract expires (calculated from StartDate + Term, or explicitly set).
    usage: Drives expiring-soon reports, renewal-pipeline generation, and end-of-life reminders. Salesforce auto-calculates from StartDate + ContractTerm.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - name: term
    display_name: Term (months)
    type: integer
    required: false
    description: Length of the contract in months.
    usage: Drives end-date calculation and renewal-cadence logic. 12, 24, and 36 are most common contract terms.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - name: contractValue
    display_name: Contract Value
    type: currency
    required: false
    description: Total monetary value of the contract over its full term.
    usage: Drives revenue-recognition reporting, account-tier classification, and renewal-opportunity sizing.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - name: signedDate
    display_name: Signed Date
    type: date
    required: false
    description: Date the contract was fully executed (all parties signed).
    usage: Anchors compliance reporting and time-to-close metrics (sent-for-signature → signed duration).
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - name: autoRenew
    display_name: Auto-Renew
    type: boolean
    required: false
    description: Whether the contract auto-renews at the end of the current term.
    usage: Drives renewal-vs-churn workflows. Auto-renew contracts may need cancellation-prevention outreach; non-auto-renew contracts trigger renewal opportunities.
    presence:
      salesforce: custom
      hubspot: standard
      attio: absent
      espocrm: custom
      civicrm: absent
      salesforce_npsp: custom
      bloomerang: absent
  - name: assignedUser
    display_name: Owner
    type: reference
    required: true
    reference_target: user
    description: User responsible for the contract.
    usage: Drives "my contracts" filtering and renewal-responsibility routing. Typically the account owner.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - name: opportunity
    display_name: Originating Opportunity
    type: reference
    required: false
    reference_target: opportunity
    description: The opportunity this contract closed from.
    usage: Links signed contracts back to the deals they came from. Drives contract-from-pipeline analytics.
    presence:
      salesforce: custom
      hubspot: standard
      attio: absent
      espocrm: custom
      civicrm: absent
      salesforce_npsp: custom
      bloomerang: absent
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: System timestamp.
    usage: Audit field.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

relationships:
  - target: account
    cardinality: many-to-one
    role: child
    description: A contract belongs to one account (the counterparty).
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - target: opportunity
    cardinality: many-to-one
    role: child
    description: A contract may originate from a closed-won opportunity.
    presence:
      salesforce: custom
      hubspot: standard
      attio: absent
      espocrm: custom
      civicrm: absent
      salesforce_npsp: custom
      bloomerang: absent
  - target: document
    cardinality: one-to-many
    role: parent
    description: A contract has signed-document files attached.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent
  - target: user
    cardinality: many-to-one
    role: child
    description: A contract is owned by a user.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

