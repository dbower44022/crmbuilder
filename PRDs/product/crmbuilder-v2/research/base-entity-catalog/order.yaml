    role: child
    description: >
      An order belongs to one account.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: quote
    cardinality: many-to-one
    role: child
    description: >
      An order may derive from one quote.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: opportunity
    cardinality: many-to-one
    role: child
    description: >
      An order may derive from one opportunity.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: invoice
    cardinality: one-to-many
    role: parent
    description: >
      An order can have one or more invoices generated from it.
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

