catalog_id: activity-sms
catalog_version: "0.1"
last_updated: "05-09-26 11:30"
tier: 5
entry_kind: subclass

parent_entity: activity
discriminator:
  attribute: activityType
  value: SMS

name: SMS (Activity subclass)
display_name: SMS / Text Message
purpose: >
  A text message (SMS or messaging-app message) sent or received as part
  of a relationship. A subclass of Activity that adds messaging-specific
  delta attributes: from / to phone numbers, body text, direction,
  delivery status, optional message-platform identifier (SMS, WhatsApp,
  iMessage, Signal).

business_context: >
  SMS records capture text-message touchpoints — a channel that has
  grown rapidly in CRM workflows for appointment reminders, payment
  confirmations, donor stewardship outreach, two-factor authentication
  flows, and increasingly for sales / fundraising conversations.
  Compared to email, text messages are short (typically 160-1600
  characters), have higher open rates (95%+ within minutes), and require
  explicit opt-in consent under TCPA in the US. Consent management is
  the most distinctive operational concern: sending a text to a contact
  who hasn't opted in carries legal liability. Modeling varies: HubSpot
  has Communication as a generic Engagement type that includes SMS
  (Communication subtypes include SMS, WhatsApp, LinkedIn); Bloomerang
  has Interaction subtype=Text Message; Salesforce has limited native
  SMS — Marketing Cloud's MobileConnect handles bulk SMS via separate
  data model, while Service Cloud's Messaging covers conversational SMS;
  EspoCRM and CiviCRM lack native SMS entities. Twilio integrations
  drive most SMS implementations across systems. When interviewing
  clients, surface "SMS" by asking whether they need to track text-
  message communication, whether they have TCPA-compliant opt-in
  workflows, and whether SMS interactions need to be threaded with other
  channels in a unified contact timeline.

data_model_role: log
typically_required: false
common_synonyms:
  - Text Message
  - Text
  - SMS Message
  - WhatsApp Message
  - Messaging

systems:
  - system: salesforce
    name: "MessagingSession (Service Cloud) or Marketing Cloud MobileConnect"
    api_name: MessagingSession
    is_standard: false
    mechanism: type_discriminator
    notes: Salesforce splits SMS across products. Service Cloud Messaging covers conversational SMS via MessagingSession and MessagingEnduser. Marketing Cloud MobileConnect handles bulk-marketing SMS 
      via separate data model. No unified SMS entity in core Sales Cloud.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_messagingsession.htm
  - system: hubspot
    name: "Communication (Engagement subtype)"
    api_name: communications
    is_standard: true
    mechanism: type_discriminator
    notes: HubSpot Communication engagement covers SMS, WhatsApp, LinkedIn messaging via subtypes. Includes channel, body, direction.
    docs_url: https://developers.hubspot.com/docs/reference/api/crm/engagements/communications
  - system: attio
    name: "(custom — typically via Twilio integration)"
    api_name: not_applicable
    is_standard: false
    mechanism: separate_object
    notes: Attio doesn't have a native SMS entity. Implementations typically log SMS via custom object linked to People, populated by Twilio integration.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects
  - system: espocrm
    name: "(no native SMS)"
    api_name: not_applicable
    is_standard: false
    mechanism: type_discriminator
    notes: EspoCRM has no native SMS entity. Custom build-out required.
    docs_url: https://docs.espocrm.com/
  - system: civicrm
    name: "Activity (activity_type=SMS)"
    api_name: Activity
    is_standard: true
    mechanism: type_discriminator
    notes: CiviCRM ships SMS as one of the Activity types. Built-in SMS providers (Twilio, ClickATell) integrate directly. Includes consent-tracking via Mobile communication preferences on Contact.
    docs_url: https://docs.civicrm.org/user/en/latest/sms/
  - system: salesforce_npsp
    name: "MessagingSession (Service Cloud)"
    api_name: MessagingSession
    is_standard: false
    mechanism: type_discriminator
    notes: NPSP has no SMS-specific additions. Nonprofit deployments typically use Service Cloud Messaging or Marketing Cloud MobileConnect.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_messagingsession.htm
  - system: bloomerang
    name: "Interaction (subtype=Text Message)"
    api_name: Interaction
    is_standard: true
    mechanism: type_discriminator
    notes: Bloomerang Interaction with Text Message type. Bloomerang has SMS / texting features integrated for donor cultivation.
    docs_url: https://bloomerang.com/api/rest-api-v1/

attributes:
  - name: fromNumber
    display_name: From Number
    type: phone
    required: true
    description: Phone number the message was sent from.
    usage: For sent messages, the org's outbound number (often a Twilio-provisioned number); for received, the contact's number.
    presence:
      salesforce:
        status: standard
        api_name: FromMessagingChannel
      hubspot:
        status: standard
        api_name: hs_communication_channel
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: standard
        api_name: phone_id
      salesforce_npsp:
        status: standard
        api_name: FromMessagingChannel
      bloomerang:
        status: custom
  - name: toNumber
    display_name: To Number
    type: phone
    required: true
    description: Phone number the message was sent to.
    usage: For sent messages, the contact's mobile; for received, the org's number. Must match a contact's mobile to auto-associate.
    presence:
      salesforce:
        status: standard
        api_name: EndUser
      hubspot:
        status: standard
        api_name: hs_communication_recipient
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: standard
        api_name: phone_id
      salesforce_npsp:
        status: standard
        api_name: EndUser
      bloomerang:
        status: custom
  - name: body
    display_name: SMS Body
    type: text
    required: true
    description: Message content.
    usage: The actual text. Subject to platform character limits (160 for single-segment SMS; 1600+ for concatenated; longer for messaging apps).
    presence:
      salesforce:
        status: standard
        api_name: Content
      hubspot:
        status: standard
        api_name: hs_communication_body
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: standard
        api_name: details
      salesforce_npsp:
        status: standard
        api_name: Content
      bloomerang:
        status: standard
        api_name: Body
    common_synonyms:
      - message
      - text
      - message body
      - sms text
  - name: direction
    display_name: Direction
    type: enum
    required: true
    enum_values:
      - Sent
      - Received
    description: Whether the message was outbound or inbound.
    usage: Drives reporting (sent-message volume per rep) and inbound-routing rules.
    presence:
      salesforce:
        status: standard
        api_name: IsInbound
      hubspot:
        status: standard
        api_name: hs_communication_direction
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: standard
        api_name: direction
      salesforce_npsp:
        status: standard
        api_name: IsInbound
      bloomerang:
        status: standard
        api_name: Direction
  - name: platform
    display_name: Platform
    type: enum
    required: false
    enum_values:
      - SMS
      - WhatsApp
      - iMessage
      - Signal
      - Other
    description: Messaging platform used.
    usage: Distinguishes SMS from over-the-top messaging apps. Drives platform-specific compliance and integration logic.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: standard
        api_name: hs_communication_channel_type
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
  - name: deliveryStatus
    display_name: Delivery Status
    type: enum
    required: false
    enum_values:
      - Queued
      - Sent
      - Delivered
      - Failed
      - Undeliverable
    description: Delivery state reported by the messaging provider.
    usage: Drives retry workflows, undeliverable-cleanup automation (auto-flag bad numbers), and compliance reporting.
    presence:
      salesforce:
        status: standard
        api_name: Status
      hubspot:
        status: standard
        api_name: hs_communication_delivery_status
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: standard
        api_name: delivery_status
      salesforce_npsp:
        status: standard
        api_name: Status
      bloomerang:
        status: custom
    common_synonyms:
      - delivery state
      - send status
  - name: messageId
    display_name: Provider Message ID
    type: string
    required: false
    description: Unique identifier from the messaging provider (Twilio SID, etc.).
    usage: Used for delivery-status webhooks, dedup, and correlation between provider logs and CRM records.
    presence:
      salesforce:
        status: standard
        api_name: MessageIdentifier
      hubspot:
        status: standard
        api_name: hs_communication_message_id
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: standard
        api_name: message_id
      salesforce_npsp:
        status: standard
        api_name: MessageIdentifier
      bloomerang:
        status: custom
