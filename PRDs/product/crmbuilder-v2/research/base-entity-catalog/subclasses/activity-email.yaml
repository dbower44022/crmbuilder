catalog_id: activity-email
catalog_version: "0.1"
last_updated: "05-09-26 11:10"
tier: 5
entry_kind: subclass

parent_entity: activity
discriminator:
  attribute: activityType
  value: Email

name: Email (Activity subclass)
display_name: Email Message
purpose: >
  An email message sent or received as part of a relationship — either
  outbound (sent from a user via the CRM or an integrated mail client)
  or inbound (logged via email-to-record auto-association). A subclass
  of Activity that adds channel-specific email metadata: addresses,
  body, message-id, direction.

business_context: >
  Email-message records hold the actual content and routing metadata of
  every email that touches the CRM. They differ from generic Activity
  entries in that they carry email-specific structured data: From / To /
  CC / BCC addresses, the HTML and plaintext body, RFC-822 Message-ID
  for thread reconciliation, In-Reply-To references, and a direction
  flag (Sent / Received). Modeling varies: Salesforce has EmailMessage as
  a separate object distinct from Task; HubSpot has Email as an
  Engagement subtype; EspoCRM has Email as its own first-class entity
  (with rich threading support); CiviCRM has Activity records with
  activity_type_id=Email and additional Email Activity Type fields;
  Bloomerang has Interaction subtype=Email; Attio syncs emails from
  Gmail / Outlook via OAuth and surfaces them on Person and Company
  timelines without a separate first-class Email entity. Email-to-record
  auto-association (BCC the CRM's catch-all address; the email is logged
  against any contact/account whose email matches a recipient) is the
  most common automation tied to email records. When interviewing
  clients, surface "Email" by asking how they currently log email
  correspondence with contacts: do they manually log it, do they BCC a
  catch-all CRM address, do they use an integrated mail client (Gmail /
  Outlook plugin), or does they rely on a marketing-platform integration?

data_model_role: log
typically_required: false
common_synonyms:
  - Email
  - Email Message
  - Mail
  - Sent Email
  - Logged Email

systems:
  - system: salesforce
    name: EmailMessage
    api_name: EmailMessage
    is_standard: true
    mechanism: separate_object
    notes: Salesforce has EmailMessage as a first-class object distinct from Task. Captures FromAddress, ToAddress, CcAddress, BccAddress, Subject, TextBody, HtmlBody, MessageDate, Status, Incoming. 
      Linked to Cases, Contacts, and other entities via EmailMessageRelation.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_emailmessage.htm
  - system: hubspot
    name: "Email (Engagement subtype)"
    api_name: emails
    is_standard: true
    mechanism: type_discriminator
    notes: HubSpot models Email as an Engagement type with subject, body, direction (INCOMING / FORWARDED / SENT), and email metadata.
    docs_url: https://developers.hubspot.com/docs/reference/api/crm/engagements/email
  - system: attio
    name: "(synced via Gmail / Outlook OAuth)"
    api_name: emails
    is_standard: true
    mechanism: separate_object
    notes: Attio syncs email correspondence via OAuth integrations and surfaces it on People / Company timelines. Limited per-email API surface compared to dedicated email entities.
    docs_url: https://attio.com/help/reference/managing-your-data/records/add-record-activities
  - system: espocrm
    name: Email
    api_name: Email
    is_standard: true
    mechanism: separate_object
    notes: First-class Email entity with rich threading (parent / repliedTo / replies links). Includes name (subject), from, to, cc, bcc, body, isHtml, messageId, status (Draft / Sending / Sent / 
      Archived).
    docs_url: https://github.com/espocrm/espocrm/blob/master/application/Espo/Resources/metadata/entityDefs/Email.json
  - system: civicrm
    name: "Activity (activity_type=Email)"
    api_name: Activity
    is_standard: true
    mechanism: type_discriminator
    notes: CiviCRM treats Email as an Activity type. Email-specific fields are added to the Activity record (subject, details, source contact). Less rich than purpose-built email entities.
    docs_url: https://docs.civicrm.org/user/en/latest/email/
  - system: salesforce_npsp
    name: EmailMessage
    api_name: EmailMessage
    is_standard: true
    mechanism: separate_object
    notes: Same as Salesforce. Donor-facing email correspondence is typically logged via EmailMessage with relationship to the Contact and the parent Opportunity (donation).
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_emailmessage.htm
  - system: bloomerang
    name: "Interaction (subtype=Email)"
    api_name: Interaction
    is_standard: true
    mechanism: type_discriminator
    notes: Bloomerang's Interaction entity has Email as one of its types. Includes Subject, Description, Date, From, To.
    docs_url: https://bloomerang.com/api/rest-api-v1/

attributes:
  - name: fromAddress
    display_name: From
    type: email
    required: true
    description: Sender's email address.
    usage: Anchors sender identification. For sent emails, the user's address; for received, the contact's. Drives email-thread reconciliation.
    presence:
      salesforce:
        status: standard
        api_name: FromAddress
      hubspot:
        status: standard
        api_name: hs_email_from_email
      attio:
        status: standard
        api_name: from_address
      espocrm:
        status: standard
        api_name: from
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: FromAddress
      bloomerang:
        status: standard
        api_name: FromAddress
    common_synonyms:
      - sender
      - from
  - name: toAddresses
    display_name: To
    type: text
    required: true
    description: Comma-separated recipient email addresses.
    usage: Drives recipient identification. Multiple recipients common; first recipient typically used for primary contact-association.
    presence:
      salesforce:
        status: standard
        api_name: ToAddress
      hubspot:
        status: standard
        api_name: hs_email_to_email
      attio:
        status: standard
        api_name: to_addresses
      espocrm:
        status: standard
        api_name: to
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: ToAddress
      bloomerang:
        status: standard
        api_name: ToAddresses
    common_synonyms:
      - recipients
      - to
      - sent to
  - name: ccAddresses
    display_name: CC
    type: text
    required: false
    description: Comma-separated CC recipient email addresses.
    usage: Identifies copied stakeholders. Useful for relationship-mapping (who's looped in on conversations with this contact).
    presence:
      salesforce:
        status: standard
        api_name: CcAddress
      hubspot:
        status: standard
        api_name: hs_email_cc_email
      attio:
        status: standard
        api_name: cc_addresses
      espocrm:
        status: standard
        api_name: cc
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: CcAddress
      bloomerang:
        status: custom
  - name: bccAddresses
    display_name: BCC
    type: text
    required: false
    description: Comma-separated BCC recipient email addresses.
    usage: Captures hidden recipients. The CRM's catch-all alias is often BCCed for auto-logging.
    presence:
      salesforce:
        status: standard
        api_name: BccAddress
      hubspot:
        status: standard
        api_name: hs_email_bcc_email
      attio:
        status: standard
        api_name: bcc_addresses
      espocrm:
        status: standard
        api_name: bcc
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: BccAddress
      bloomerang:
        status: custom
  - name: bodyHtml
    display_name: Body (HTML)
    type: richtext
    required: false
    description: Rich-text HTML body of the email.
    usage: The actual email content as rendered. Drives full-text search and content review. Storage size can be substantial for long email threads.
    presence:
      salesforce:
        status: standard
        api_name: HtmlBody
      hubspot:
        status: standard
        api_name: hs_email_html
      attio:
        status: standard
        api_name: body_html
      espocrm:
        status: standard
        api_name: body
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: HtmlBody
      bloomerang:
        status: standard
        api_name: BodyHtml
    common_synonyms:
      - body
      - content
      - message
      - email content
  - name: bodyText
    display_name: Body (Plaintext)
    type: text
    required: false
    description: Plaintext fallback body of the email.
    usage: Used for searching, plaintext-only display, and as a fallback when HTML rendering is suppressed.
    presence:
      salesforce:
        status: standard
        api_name: TextBody
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: standard
        api_name: bodyPlain
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: TextBody
      bloomerang:
        status: standard
        api_name: BodyText
  - name: direction
    display_name: Direction
    type: enum
    required: true
    enum_values:
      - Sent
      - Received
      - Draft
    description: Whether the email was sent by the org, received, or saved as draft.
    usage: Distinguishes outbound from inbound. Drives "my sent" filtering and incoming-email routing.
    presence:
      salesforce:
        status: standard
        api_name: Incoming
      hubspot:
        status: standard
        api_name: hs_email_direction
      attio:
        status: standard
        api_name: direction
      espocrm:
        status: standard
        api_name: isReplied
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: Incoming
      bloomerang:
        status: standard
        api_name: Direction
  - name: messageId
    display_name: Message-ID
    type: string
    required: false
    description: RFC-822 Message-ID header for the email.
    usage: Used for thread reconciliation across systems and to dedupe email logging when multiple recipients each BCC the CRM.
    presence:
      salesforce:
        status: standard
        api_name: MessageIdentifier
      hubspot:
        status: standard
        api_name: hs_email_message_id
      attio:
        status: standard
        api_name: message_id
      espocrm:
        status: standard
        api_name: messageId
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: MessageIdentifier
      bloomerang:
        status: custom
  - name: inReplyTo
    display_name: In-Reply-To
    type: string
    required: false
    description: RFC-822 In-Reply-To header pointing at the message this email replies to.
    usage: Drives email-threading. Lets the CRM display conversation threads rather than scattered individual emails.
    presence:
      salesforce:
        status: standard
        api_name: InReplyTo
      hubspot:
        status: standard
        api_name: inreplyto
      attio:
        status: standard
        api_name: in_reply_to
      espocrm:
        status: standard
        api_name: replied
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: InReplyTo
      bloomerang:
        status: absent
