catalog_id: donation-major-gift
catalog_version: "0.1"
last_updated: "05-09-26 10:40"
tier: 4
entry_kind: subclass

parent_entity: donation
discriminator:
  attribute: type
  value: Major Gift

name: Major Gift (Donation subclass)
display_name: Major Gift
purpose: >
  A subclass of Donation representing a high-value gift that
  warrants distinct cultivation, stewardship, and acknowledgment
  workflows. Threshold for "major gift" varies by organization (commonly
  $1,000 / $10,000 / $25,000 / $100,000) but the operational distinction
  is the same: major gifts justify dedicated cultivation officers,
  multi-touch stewardship plans, and personalized acknowledgment beyond
  the standard receipt.

business_context: >
  Major Gift records add cultivation and stewardship attributes on top of
  the standard Donation entity. The threshold definition is policy-driven
  per organization — some shops define major gifts as gifts $5,000+;
  others $25,000+; others $100,000+. Below the threshold, donations get
  standard processing; above, they trigger custom workflows: major-gift
  officer assignment, personal thank-you call within 48 hours, recognition
  in the annual report (with permission), invitation to donor events,
  and ongoing relationship management. NPSP ships a Major Gift Record
  Type on Opportunity. CiviCRM customers typically add a custom field on
  Contribution (financial_type=Major Gift, plus custom solicitor and
  stewardship-officer fields). Bloomerang uses Custom Fields on
  Transaction with Major Gift designation. The B2B systems would build
  this out as part of full nonprofit customization. The subclass
  matters because it formalizes the threshold-driven cultivation pattern
  rather than leaving it implicit in custom fields. When interviewing
  clients, surface "Major Gift" specifically (rather than just
  "Donation") when they have dedicated major-gift staff, when they need
  cultivation-stage tracking on top of donation status, or when major
  gifts trigger different acknowledgment workflows than standard gifts.

data_model_role: event
typically_required: false
common_synonyms:
  - Principal Gift
  - Leadership Gift
  - Top-Tier Donation
  - Transformational Gift

systems:
  - system: salesforce
    name: "Opportunity with custom Major Gift Record Type"
    api_name: Opportunity
    is_standard: false
    mechanism: record_type
    notes: Customers without NPSP add a custom Major Gift Record Type to Opportunity along with custom cultivation-stage and stewardship-officer fields.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_opportunity.htm
  - system: hubspot
    name: "Deal with custom Type=Major Gift"
    api_name: deals
    is_standard: false
    mechanism: custom_property
    notes: HubSpot has no Record Type concept. Implemented via custom Deal Type property and custom cultivation-stage properties.
    docs_url: https://developers.hubspot.com/docs/api-reference/crm-deals-v3/guide
  - system: attio
    name: "Custom Major Gift object or Type attribute on Deals"
    api_name: not_applicable
    is_standard: false
    mechanism: separate_object
    notes: Attio supports either a custom Major Gift object or a Type attribute on the Deals object.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects
  - system: espocrm
    name: "Opportunity with type=Major Gift (custom enum)"
    api_name: Opportunity
    is_standard: false
    mechanism: type_discriminator
    notes: Custom enum value on Opportunity.type plus custom cultivation fields.
    docs_url: https://docs.espocrm.com/administration/entity-manager/
  - system: civicrm
    name: "Contribution with custom financial_type=Major Gift"
    api_name: Contribution
    is_standard: false
    mechanism: type_discriminator
    notes: CiviCRM uses financial_type_id on Contribution as a discriminator. Major Gift is added as a custom financial_type with custom fields for cultivation stage and assigned solicitor.
    docs_url: https://docs.civicrm.org/user/en/latest/contributions/
  - system: salesforce_npsp
    name: "Opportunity with Major Gift Record Type"
    api_name: Opportunity
    is_standard: true
    mechanism: record_type
    notes: NPSP ships a Major Gift Record Type. Used by major-gift teams alongside the Donation Record Type. Major Gift typically has a higher amount threshold and triggers different cultivation 
      workflows.
    docs_url: https://developer.salesforce.com/docs/platform/data-models/guide/nonprofit-success-pack.html
  - system: bloomerang
    name: "Transaction with custom Type=Major Gift"
    api_name: Transaction
    is_standard: false
    mechanism: custom_property
    notes: Custom Field on Transaction marking it as a Major Gift, plus custom Solicitor and Stewardship Officer attributes.
    docs_url: https://bloomerang.com/api/rest-api-v1/

attributes:
  - name: cultivationStage
    display_name: Cultivation Stage
    type: enum
    required: false
    enum_values:
      - Identification
      - Qualification
      - Cultivation
      - Solicitation
      - Stewardship
      - Closed
    description: Stage in the major-gift cultivation cycle.
    usage: Drives major-gift pipeline reporting. Distinct from Opportunity stage (which tracks gift-level lifecycle); cultivation stage tracks the relationship-level cycle that may span multiple 
      gifts.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
  - name: solicitor
    display_name: Solicitor
    type: reference
    required: false
    reference_target: contact
    description: The contact (typically a board member or peer-influencer) who solicited the gift.
    usage: Drives peer-solicitor reporting and recognition. Distinct from the major-gift officer (a User / staff member) who manages the relationship.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
  - name: stewardshipOfficer
    display_name: Stewardship Officer
    type: reference
    required: false
    reference_target: user
    description: The staff member responsible for the donor relationship.
    usage: Drives major-gift staff workload reports and ensures every major donor has a dedicated relationship manager.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
  - name: tributeType
    display_name: Tribute Type
    type: enum
    required: false
    enum_values:
      - In Honor Of
      - In Memory Of
      - Tribute
      - None
    description: Whether this major gift was given in tribute to someone.
    usage: Triggers tribute-acknowledgment workflows where the honoree (or honoree's family) is notified of the gift. Common at funerals (memorial gifts) and milestone events (honor gifts).
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: TributeType
      bloomerang:
        status: standard
        api_name: TributeType
  - name: tributeName
    display_name: Tribute Name
    type: string
    required: false
    description: Name of the person being honored or memorialized.
    usage: Free-text field for the honoree's name. May or may not be a Contact in the system.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: TributeName
      bloomerang:
        status: standard
        api_name: TributeName
  - name: recognitionPreference
    display_name: Recognition Preference
    type: enum
    required: false
    enum_values:
      - Anonymous
      - Public Recognition
      - Internal Only
    description: Donor's preferred level of public recognition for this gift.
    usage: Drives annual-report listing logic, donor-event invitations, and major-gift announcement workflows. Anonymous gifts are excluded from public recognition lists.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: standard
        api_name: RecognitionPreference
relationships:
  - target: contact
    cardinality: many-to-one
    role: child
    description: A major gift has a solicitor (peer-influencer) contact distinct from the donor.
    presence:
      salesforce: custom
      hubspot: custom
      attio: custom
      espocrm: custom
      civicrm: custom
      salesforce_npsp: custom
      bloomerang: custom
  - target: user
    cardinality: many-to-one
    role: child
    description: A major gift has a stewardship officer (User / staff member).
    presence:
      salesforce: custom
      hubspot: custom
      attio: custom
      espocrm: custom
      civicrm: custom
      salesforce_npsp: custom
      bloomerang: custom

