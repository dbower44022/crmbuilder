catalog_id: activity-video-meeting
catalog_version: "0.1"
last_updated: "05-09-26 11:25"
tier: 5
entry_kind: subclass

parent_entity: activity
discriminator:
  attribute: activityType
  value: Video Meeting

name: Video Meeting (Activity subclass)
display_name: Video Meeting
purpose: >
  A scheduled video conference (Zoom, Microsoft Teams, Google Meet,
  Webex, etc.) with one or more contacts. A subclass of Activity that
  adds video-specific delta attributes: meeting URL, platform identifier,
  meeting ID, optional recording URL, optional transcript URL.

business_context: >
  Video Meeting records have emerged as a distinct subclass since the
  pandemic-driven shift to remote work made video calls the default
  rather than the exception for many sales, fundraising, and program
  conversations. They differ from in-person Meeting records in three
  ways: (1) location is a URL rather than a physical address; (2) a
  platform identifier (Zoom / Teams / Meet / Webex) drives integration
  behavior; (3) recording and transcript artifacts are routinely
  generated and need linkage to the meeting record. Most surveyed
  systems don't natively split video from in-person meetings — they use
  one Meeting / Event entity and accommodate video URLs via custom
  fields or platform integrations. The catalog separates them at the
  modeling level so the data shape is honest about the channel
  difference, even when the deploy-time implementation uses one shared
  Meeting / Event entity. AI-meeting-assistant tools (Otter, Fathom,
  Fireflies) and revenue-intelligence platforms (Gong, Chorus) all
  ingest video-meeting recordings as a primary signal source — making
  the recording-URL and transcript-URL attributes increasingly important.
  When interviewing clients, surface "Video Meeting" by asking whether
  they need to track meeting platform, recording URLs, or transcripts
  separately from in-person meetings.

data_model_role: event
typically_required: false
common_synonyms:
  - Video Call
  - Zoom Meeting
  - Teams Meeting
  - Online Meeting
  - Web Conference

systems:
  - system: salesforce
    name: "Event with custom video fields"
    api_name: Event
    is_standard: false
    mechanism: type_discriminator
    notes: No native split from in-person Event. Customers add custom fields for VideoMeetingUrl, Platform, RecordingUrl. Salesforce Einstein Conversation Insights surfaces video recordings on linked 
      Events.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_event.htm
  - system: hubspot
    name: "Meeting with platform integration"
    api_name: meetings
    is_standard: false
    mechanism: type_discriminator
    notes: HubSpot Meeting carries video-meeting URL via Zoom / Teams / Google Meet integrations. Distinct subclass not modeled natively but commonly added via custom property.
    docs_url: https://developers.hubspot.com/docs/reference/api/crm/engagements/meetings
  - system: attio
    name: "Meeting with auto-detected video link"
    api_name: meetings
    is_standard: false
    mechanism: type_discriminator
    notes: Attio recognizes video-meeting URLs in calendar events and surfaces platform metadata. No first-class Video Meeting entity.
    docs_url: https://attio.com/help/reference/managing-your-data/records/add-record-activities
  - system: espocrm
    name: "Meeting with custom video fields"
    api_name: Meeting
    is_standard: false
    mechanism: type_discriminator
    notes: EspoCRM Meeting entity with custom fields for video URL and platform. No native split.
    docs_url: https://github.com/espocrm/espocrm/blob/master/application/Espo/Modules/Crm/Resources/metadata/entityDefs/Meeting.json
  - system: civicrm
    name: "Activity (activity_type=Meeting) with custom fields"
    api_name: Activity
    is_standard: false
    mechanism: type_discriminator
    notes: CiviCRM Activity with custom fields for video-meeting URL and platform.
    docs_url: https://docs.civicrm.org/user/en/latest/the-user-interface/activities/
  - system: salesforce_npsp
    name: "Event with custom video fields"
    api_name: Event
    is_standard: false
    mechanism: type_discriminator
    notes: Same as Salesforce. Donor-cultivation video meetings tracked as Events with custom video-URL fields.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_event.htm
  - system: bloomerang
    name: "Interaction (subtype=Phone Call or custom Video)"
    api_name: Interaction
    is_standard: false
    mechanism: type_discriminator
    notes: Bloomerang doesn't have a Video Meeting subtype natively. Tracked as Phone Call or Other Interaction with custom field for video-meeting URL.
    docs_url: https://bloomerang.com/api/rest-api-v1/

attributes:
  - name: meetingUrl
    display_name: Meeting URL
    type: url
    required: true
    description: Full URL to join the video meeting (Zoom, Teams, Meet, etc. join link).
    usage: The link participants click to join. Typically generated by the video-platform integration when the meeting is created. Drives one-click join from CRM and calendar.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: standard
        api_name: meeting_url
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
    common_synonyms:
      - join link
      - video link
      - meeting link
  - name: platform
    display_name: Video Platform
    type: enum
    required: false
    enum_values:
      - Zoom
      - Microsoft Teams
      - Google Meet
      - Webex
      - GoToMeeting
      - Other
    description: The video conferencing platform used.
    usage: Drives integration routing (which platform's API to query for recordings) and reporting on platform mix.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: standard
        api_name: hs_meeting_source
      attio:
        status: standard
        api_name: meeting_provider
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
    common_synonyms:
      - video platform
      - conferencing tool
      - video tool
  - name: meetingId
    display_name: Platform Meeting ID
    type: string
    required: false
    description: Native meeting identifier in the video platform (Zoom Meeting ID, Teams ID, etc.).
    usage: Used by integrations to fetch recordings, transcripts, and attendance reports from the platform's API after the meeting.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: standard
        api_name: meeting_id
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
  - name: recordingUrl
    display_name: Recording URL
    type: url
    required: false
    description: URL to the video recording (when capture is enabled).
    usage: Drives meeting-recording review workflows and AI-coaching pipelines (Gong, Chorus, Fathom). Often populated post-meeting by an integration.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: standard
        api_name: hs_meeting_recording
      attio:
        status: standard
        api_name: recording_url
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
    common_synonyms:
      - recording
      - video recording
  - name: transcriptUrl
    display_name: Transcript URL
    type: url
    required: false
    description: URL to the meeting transcript (often AI-generated).
    usage: Drives full-text search across meeting content, AI summary generation, and compliance audit logs.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: standard
        api_name: transcript_url
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
    common_synonyms:
      - transcript
      - meeting transcript
  - name: attendees
    display_name: Attendees
    type: multireference
    required: false
    reference_target: contact
    description: Contacts who attended (or were invited to) the video meeting.
    usage: Multi-attendee list. Drives engagement-frequency calculations and post-meeting follow-up assignment.
    presence:
      salesforce:
        status: standard
        api_name: EventRelations
      hubspot:
        status: standard
        api_name: hs_attendee_owner_ids
      attio:
        status: standard
        api_name: attendees
      espocrm:
        status: standard
        api_name: usersIds
      civicrm:
        status: standard
        api_name: target_contact_id
      salesforce_npsp:
        status: standard
        api_name: EventRelations
      bloomerang:
        status: custom
