catalog_id: engagement
catalog_version: "0.1"
last_updated: "05-09-26 10:30"
tier: 4
entry_kind: universal

name: Engagement
display_name: Engagement
purpose: >
  A long-running, multi-touchpoint relationship tracked between a contact
  (or constituents) and the organization or another contact. Distinct
  from Activity (single touchpoint) — Engagement is the longitudinal
  arc that activities accumulate inside. Used in mentoring programs,
  cultivation pipelines, case management, advocacy relationships, and
  any context where the relationship itself has lifecycle and outcomes.

business_context: >
  Engagement records hold the structure of relationships that span
  multiple interactions over time. They differ from Activity (which
  captures a single call, meeting, or task) and from Case (which is more
  problem-oriented with a defined resolution): Engagement is about a
  sustained relationship that has goals, stages, and outcomes. The CBM
  pilot client uses Engagement as the central entity for mentor-mentee
  relationships, where a single engagement spans months of touchpoints
  across mentoring sessions, check-ins, and program milestones. Salesforce
  NPSP has the Engagement Plan / Engagement Plan Task / Engagement Plan
  Template trio, used for structured donor-cultivation tracks. CiviCRM
  has Cases that can serve a similar long-running role (Case management
  for human-services contexts). Bloomerang doesn't have a first-class
  Engagement entity — relationships are tracked via Interactions
  accumulated against a Constituent. The B2B systems generally don't
  have a long-running engagement concept beyond Opportunity (which is
  revenue-focused). When interviewing clients, surface "Engagement" by
  asking whether they need to track relationships that span many
  interactions over months or years (mentor-mentee, donor-cultivation,
  beneficiary-services, advocacy-coalition), and whether those
  relationships have their own lifecycle stages (recruited, matched,
  active, completed, paused).

data_model_role: anchor
typically_required: false
common_synonyms:
  - Relationship
  - Mentoring Engagement
  - Cultivation Track
  - Engagement Plan
  - Care Plan

systems:
  - system: salesforce
    name: "(no native — custom required)"
    api_name: not_applicable
    is_standard: false
    notes: Vanilla Salesforce has no Engagement concept. Custom build-out via custom object required.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_account.htm
  - system: hubspot
    name: "(no native long-running Engagement; HubSpot 'Engagement' is single-touchpoint)"
    api_name: not_applicable
    is_standard: false
    notes: HubSpot's Engagement entity is a single-touchpoint Activity (call, email, meeting, note). HubSpot has no long-running engagement concept analogous to NPSP Engagement Plan or CBM-style 
      mentor engagement.
    docs_url: https://developers.hubspot.com/docs/api-reference/crm-engagements
  - system: attio
    name: "(custom object)"
    api_name: not_applicable
    is_standard: false
    notes: Attio has no native Engagement entity. Custom object required.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects
  - system: espocrm
    name: "(no Engagement entity)"
    api_name: not_applicable
    is_standard: false
    notes: EspoCRM has no Engagement entity.
    docs_url: https://docs.espocrm.com/
  - system: civicrm
    name: "Case (used for case management with longitudinal arcs)"
    api_name: Case
    is_standard: true
    notes: CiviCRM Case serves the long-running engagement role for case-management contexts (legal aid, human services, advocacy coalitions). Has Case Roles, expected Activities, and Milestones.
    docs_url: https://docs.civicrm.org/user/en/latest/case-management/
  - system: salesforce_npsp
    name: "Engagement Plan / Engagement Plan Task / Engagement Plan Template"
    api_name: "npe5__Engagement_Plan__c, npe5__Engagement_Plan_Task__c"
    is_standard: true
    notes: NPSP's structured cultivation framework. Engagement Plan Templates define reusable cultivation tracks (e.g., "Major Gift Cultivation - 12 month"); Engagement Plans are instantiated per 
      donor; Engagement Plan Tasks are the steps. Tracks completion of structured donor-cultivation touchpoints over time.
    docs_url: https://developer.salesforce.com/docs/platform/data-models/guide/nonprofit-success-pack.html
  - system: bloomerang
    name: "(no first-class Engagement; tracked via Interactions)"
    api_name: not_applicable
    is_standard: false
    notes: Bloomerang has no first-class long-running Engagement entity. Long-running relationships are tracked via accumulated Interactions on a Constituent's timeline. Custom Fields on Constituent 
      can capture engagement stage.
    docs_url: https://bloomerang.com/api/rest-api-v1/

attributes:
  - name: name
    display_name: Engagement Name
    type: string
    required: true
    max_length: 255
    description: Display name of the engagement.
    usage: Identifies the engagement in lists. For mentoring contexts, often follows a pattern like "Smith-Jones Mentoring 2026"; for cultivation tracks, often "Acme Foundation Major Gift 
      Cultivation."
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: subject
      salesforce_npsp:
        status: standard
        api_name: Name
      bloomerang:
        status: absent
  - name: type
    display_name: Engagement Type
    type: enum
    required: true
    description: Category of engagement.
    usage: Distinguishes Mentoring / Cultivation / Case Management / Advocacy / Coaching / etc. Drives different lifecycle stage sets and reporting.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: case_type_id
      salesforce_npsp:
        status: standard
        api_name: npe5__Engagement_Plan_Template__c
      bloomerang:
        status: absent
  - name: status
    display_name: Status
    type: enum
    required: true
    enum_values:
      - Planning
      - Active
      - Paused
      - Completed
      - Cancelled
    description: Lifecycle state of the engagement.
    usage: Drives "active engagements" filtering and dashboards. Status transitions trigger workflow automation (engagement-completion surveys, case-closeout reporting).
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: status_id
      salesforce_npsp:
        status: standard
        api_name: npe5__Status__c
      bloomerang:
        status: absent
  - name: startDate
    display_name: Start Date
    type: date
    required: true
    description: Date the engagement began.
    usage: Anchors duration calculations and reporting cohorts (engagements started this quarter).
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: start_date
      salesforce_npsp:
        status: standard
        api_name: npe5__StartDate__c
      bloomerang:
        status: absent
  - name: endDate
    display_name: End Date (Actual or Expected)
    type: date
    required: false
    description: Date the engagement ended (or expected end date for active engagements).
    usage: Drives expected-completion reporting and planning for capacity (how many engagements ending this quarter).
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: end_date
      salesforce_npsp:
        status: standard
        api_name: npe5__EndDate__c
      bloomerang:
        status: absent
  - name: primaryContact
    display_name: Primary Contact
    type: reference
    required: true
    reference_target: contact
    description: The primary subject contact of the engagement (e.g., the mentee in a mentor-mentee engagement; the donor in a cultivation track).
    usage: Anchors the engagement to the contact whose journey it tracks. Drives "show me everything for this contact" views.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: contact_id
      salesforce_npsp:
        status: standard
        api_name: npe5__Contact__c
      bloomerang:
        status: absent
    common_synonyms:
      - mentee
      - subject
      - client
      - beneficiary
  - name: secondaryContact
    display_name: Secondary Contact / Partner
    type: reference
    required: false
    reference_target: contact
    description: The other party in a paired engagement (e.g., the mentor in a mentor-mentee pairing; the cultivation officer in a donor cultivation track).
    usage: For paired engagements (mentoring), models the other half of the dyad. For cultivation tracks, models the relationship-management officer.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: subject_id
      salesforce_npsp:
        status: standard
        api_name: npe5__Secondary_Contact__c
      bloomerang:
        status: absent
    common_synonyms:
      - mentor
      - partner
      - cultivation officer
  - name: assignedUser
    display_name: Assigned Staff
    type: reference
    required: false
    reference_target: user
    description: Staff member responsible for the engagement.
    usage: Drives staff workload reporting and case-load management. Distinct from secondaryContact when the staff member is a User rather than a Contact.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: manager_contact_id
      salesforce_npsp:
        status: standard
        api_name: OwnerId
      bloomerang:
        status: absent
  - name: description
    display_name: Description
    type: text
    required: false
    description: Free-form description of engagement goals and context.
    usage: Captures the why and the goals. Useful for new staff joining mid-engagement or for periodic engagement-review meetings.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: details
      salesforce_npsp:
        status: standard
        api_name: Description
      bloomerang:
        status: absent
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: System timestamp.
    usage: Audit field. Distinct from startDate.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: created_date
      salesforce_npsp:
        status: standard
        api_name: CreatedDate
      bloomerang:
        status: absent
relationships:
  - target: contact
    cardinality: many-to-many
    role: peer
    description: An engagement involves one or more contacts (subject and partner).
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: absent
  - target: activity
    cardinality: one-to-many
    role: parent
    description: An engagement accumulates many activities (sessions, check-ins, meetings) over its lifecycle.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: absent
  - target: user
    cardinality: many-to-one
    role: child
    description: An engagement is assigned to a staff user.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: absent

sources:
