    url: https://developer.salesforce.com/docs/platform/data-models/guide/nonprofit-success-pack.html
  - title: "CiviCRM: Case management user guide"
    url: https://docs.civicrm.org/user/en/latest/case-management/
  - title: "Bloomerang REST API: Interaction endpoint (used for engagement tracking)"
    url: https://bloomerang.com/api/rest-api-v1/
