        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: absent
      salesforce_npsp:
        status: absent
      bloomerang:
        status: standard
        api_name: GenerosityScore
  - name: createdAt
