catalog_id: constituent
catalog_version: "0.1"
last_updated: "05-09-26 10:25"
tier: 4
entry_kind: universal

name: Constituent
display_name: Constituent
purpose: >
  In nonprofit CRMs that unify the Person and Organization concepts under
  a single primary entity, the Constituent is the universal donor /
  member / volunteer record. Distinct from the Contact + Account split
  used by B2B CRMs. Captured as its own catalog entry to document this
  alternative modeling pattern.

business_context: >
  Constituent records reflect a deliberate modeling choice in nonprofit
  CRMs: rather than splitting Person (Contact) from Organization (Account)
  the way B2B CRMs do, treat both as variants of a single Constituent
  entity with a Type discriminator (Individual / Organization). The
  argument for this approach is that nonprofits track giving from both
  individuals and organizations using the same fundraising workflows and
  reporting — the differences are smaller than B2B sales relationships
  (where the Person and Organization roles are more distinct). Bloomerang
  is the strongest example of this pattern — its primary entity is
  Constituent, with Type=Individual or Type=Organization gating which
  attributes apply (FirstName/LastName for Individual; FullName for
  Organization). CiviCRM partially follows this pattern (Contact entity
  with subtypes Individual / Household / Organization) but retains a
  somewhat richer per-subtype structure. Salesforce NPSP, EspoCRM, and
  the B2B systems keep Contact and Account separate and don't have a
  Constituent entity. The presence of this catalog entry is mostly
  documentary — it captures the unified-entity pattern so V2 understands
  it when ingesting client modeling, and so cross-system mapping can
  translate cleanly between unified and split models. When interviewing
  clients on a Bloomerang or CiviCRM deployment, "Constituent" maps to
  the catalog entries Contact, Account, and Household combined; on
  NPSP/Salesforce/EspoCRM it doesn't exist as such.

data_model_role: anchor
typically_required: false
common_synonyms:
  - Person+Organization
  - Donor
  - Profile
  - Stakeholder

systems:
  - system: salesforce
    name: "(no native Constituent — split Contact / Account)"
    api_name: not_applicable
    is_standard: false
    notes: Salesforce uses a split Contact + Account model. No Constituent concept.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_contact.htm
  - system: hubspot
    name: "(no native Constituent — split Contact / Company)"
    api_name: not_applicable
    is_standard: false
    notes: HubSpot uses Contact + Company.
    docs_url: https://developers.hubspot.com/docs/reference/api/crm/objects/contacts
  - system: attio
    name: "(no native Constituent — split Person / Company)"
    api_name: not_applicable
    is_standard: false
    notes: Attio uses Person + Company.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/manage-standard-objects
  - system: espocrm
    name: "(no native Constituent — split Contact / Account)"
    api_name: not_applicable
    is_standard: false
    notes: EspoCRM uses split Contact + Account.
    docs_url: https://docs.espocrm.com/
  - system: civicrm
    name: "Contact (with contact_type = Individual / Household / Organization)"
    api_name: Contact
    is_standard: true
    notes: CiviCRM unifies under Contact entity with three contact_type values. Closest to Constituent pattern but retains type-specific schema differences.
    docs_url: https://docs.civicrm.org/user/en/latest/organising-your-data/contacts/
  - system: salesforce_npsp
    name: "(no native Constituent — split Contact / Account)"
    api_name: not_applicable
    is_standard: false
    notes: NPSP uses Salesforce's split Contact + Account model.
    docs_url: https://developer.salesforce.com/docs/platform/data-models/guide/nonprofit-success-pack.html
  - system: bloomerang
    name: Constituent
    api_name: Constituent
    is_standard: true
    notes: Bloomerang's primary entity. Type=Individual or Type=Organization gates which attributes apply. Constituents have shared attributes (Generosity Score, lifetime giving, communication 
      preferences) plus type-specific attributes (FirstName/LastName for Individual; FullName for Organization).
    docs_url: https://bloomerang.com/api/rest-api-v1/

attributes:
  - name: type
    display_name: Constituent Type
    type: enum
    required: true
    enum_values:
      - Individual
      - Organization
      - Household
    description: Discriminator that selects which attribute subset applies.
    usage: Drives form rendering, validation rules, and reporting filters. The most fundamental attribute on Constituent records.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: contact_type
      salesforce_npsp:
        status: absent
      bloomerang:
        status: standard
        api_name: Type
  - name: fullName
    display_name: Full Name / Display Name
    type: string
    required: true
    max_length: 255
    description: Display name shown in lists and reports.
    usage: For Individual, computed from FirstName + LastName; for Organization, the org name; for Household, family name. Bloomerang stores explicitly; CiviCRM uses display_name.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: display_name
      salesforce_npsp:
        status: absent
      bloomerang:
        status: standard
        api_name: FullName
  - name: emailAddress
    display_name: Primary Email
    type: email
    required: false
    description: Primary email address.
    usage: Universal communication anchor. May have multiple email records depending on system.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: email
      salesforce_npsp:
        status: absent
      bloomerang:
        status: standard
        api_name: PrimaryEmail
  - name: phone
    display_name: Primary Phone
    type: phone
    required: false
    description: Primary phone number.
    usage: Communication anchor. May have multiple phone records.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: phone
      salesforce_npsp:
        status: absent
      bloomerang:
        status: standard
        api_name: PrimaryPhone
  - name: address
    display_name: Primary Address
    type: address
    required: false
    description: Primary mailing address.
    usage: Anchors mail campaigns and direct-mail acknowledgments.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: street_address
      salesforce_npsp:
        status: absent
      bloomerang:
        status: standard
        api_name: PrimaryAddress
  - name: generosityScore
    display_name: Generosity Score
    type: integer
    required: false
    description: Bloomerang-specific calculated metric of donor engagement and giving health.
    usage: A 0-1000 calculated score combining recency, frequency, monetary value, and engagement. Drives at-a-glance donor segmentation and lapsed-donor identification. Unique to Bloomerang.
    presence:
