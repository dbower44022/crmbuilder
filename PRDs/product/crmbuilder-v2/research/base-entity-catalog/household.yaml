catalog_id: household
catalog_version: "0.1"
last_updated: "05-09-26 10:10"
tier: 4
entry_kind: universal

name: Household
display_name: Household
purpose: >
  A family or living unit that groups individuals together for purposes of
  joint giving acknowledgment, mailing, address management, and lifetime-
  giving rollup. Distinct from individual Contacts (which represent
  persons) and from Organization Accounts (which represent entities).

business_context: >
  Household records anchor family-unit donor management. The pattern
  emerged because a married couple who give jointly should be acknowledged
  jointly ("Dear Mr. and Mrs. Smith") and have their giving rolled up at
  the household level for major-donor recognition — but each spouse is
  still an individual Contact for personalization, communication
  preferences, and individual interactions. The Household is the bridge.
  Modeling diverges sharply: NPSP makes Household a Record Type on
  Account (every Contact gets auto-assigned to a Household Account by
  default); CiviCRM makes Household a contact_type alongside Individual
  and Organization (one entity, three subtypes); Bloomerang doesn't have
  Household as a first-class entity — uses Relationships between
  individual Constituents to build family connections; the B2B systems
  (Salesforce vanilla, HubSpot, Attio, EspoCRM) have no native Household
  concept and require custom build-out for nonprofit deployments.
  Household giving rollups (the family's lifetime giving across all
  member donations) are a defining feature of Household models — without
  them, you can't see "this family has given $50K over 10 years" without
  manual aggregation. When interviewing clients, surface "Household" by
  asking whether they need to track family-unit giving separately from
  individual giving, whether acknowledgments go to households or
  individuals, and how they handle joint donations from married couples.

data_model_role: anchor
typically_required: false
common_synonyms:
  - Family
  - Household Account
  - Family Unit
  - Joint Donor

systems:
  - system: salesforce
    name: "(no native — custom required)"
    api_name: not_applicable
    is_standard: false
    notes: Vanilla Salesforce has no Household concept. Customers without NPSP build it via custom Account record types or custom objects.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_account.htm
  - system: hubspot
    name: "(custom — typically Company)"
    api_name: not_applicable
    is_standard: false
    notes: HubSpot has no Household concept. Nonprofits sometimes repurpose Company records as Household equivalents but it's awkward.
    docs_url: https://developers.hubspot.com/docs/api-reference/crm-companies-v3/guide
  - system: attio
    name: "(custom object)"
    api_name: not_applicable
    is_standard: false
    notes: Attio has no native Household concept.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects
  - system: espocrm
    name: "(no native Household)"
    api_name: not_applicable
    is_standard: false
    notes: EspoCRM has no Household concept.
    docs_url: https://docs.espocrm.com/
  - system: civicrm
    name: "Household (Contact subtype)"
    api_name: "Contact (contact_type=Household)"
    is_standard: true
    notes: First-class Contact subtype. Members linked via Relationship records (Head of Household, Member of Household, Spouse, Child). Households can have addresses, phones, and emails as separate 
      records.
    docs_url: https://docs.civicrm.org/user/en/latest/organising-your-data/contacts/
  - system: salesforce_npsp
    name: "Account (Household Record Type)"
    api_name: Account
    is_standard: true
    notes: NPSP's default Account model. Every Contact is auto-assigned to a Household Account on creation (unless manually set to a different Account type). Household-level rollups (Total Gifts, Last
      Gift Amount, Largest Gift) are auto-populated.
    docs_url: https://trailhead.salesforce.com/content/learn/modules/constituent-data-management-with-nonprofit-success-pack/manage-household-accounts
  - system: bloomerang
    name: "(modeled via Relationships)"
    api_name: not_applicable
    is_standard: false
    notes: Bloomerang has no first-class Household entity. Family connections are modeled via Relationships between individual Constituents (Spouse, Parent, Child).
    docs_url: https://bloomerang.com/api/rest-api-v1/

attributes:
  - name: householdName
    display_name: Household Name
    type: string
    required: true
    max_length: 255
    description: Display name of the household, typically formatted "Smith Household" or "John and Jane Smith Household".
    usage: Anchors household-level addressing and reporting. NPSP auto-generates from member contact names; CiviCRM auto-generates from primary contact's last name.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: household_name
      salesforce_npsp:
        status: standard
        api_name: Name
      bloomerang:
        status: absent
  - name: formalGreeting
    display_name: Formal Greeting
    type: string
    required: false
    description: Formal salutation for written correspondence (e.g., "Dr. and Mrs. Smith").
    usage: Drives mail-merge in donor acknowledgment letters and major appeals. NPSP auto-generates as "Salutation FirstName and Salutation FirstName LastName"; manually editable.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: npo02__Formal_Greeting__c
      bloomerang:
        status: absent
  - name: informalGreeting
    display_name: Informal Greeting
    type: string
    required: false
    description: Informal salutation for casual correspondence (e.g., "John and Jane").
    usage: Drives less-formal communications. Distinct from formal for tone control.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: npo02__Informal_Greeting__c
      bloomerang:
        status: absent
  - name: address
    display_name: Mailing Address
    type: address
    required: false
    description: Primary mailing address of the household.
    usage: Anchors mail campaigns. Members of a household often share an address; storing it on the household lets all family members inherit a single mailing address rather than maintaining redundant
      copies.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: street_address
      salesforce_npsp:
        status: standard
        api_name: BillingAddress
      bloomerang:
        status: absent
  - name: phone
    display_name: Household Phone
    type: phone
    required: false
    description: Shared household landline (less common in 2026 but still tracked for older donors).
    usage: Distinct from individual mobile numbers. Mostly historical — most modern donors are reached via individual mobile.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: phone
      salesforce_npsp:
        status: standard
        api_name: Phone
      bloomerang:
        status: absent
  - name: totalLifetimeGiving
    display_name: Total Lifetime Giving (Household)
    type: currency
    required: false
    description: Sum of all donations attributed to the household across its history.
    usage: The marquee household-level rollup. Drives major-donor recognition tiers, board reporting, and capacity assessment for major-gift cultivation. Auto-calculated as sum of donations linked to 
      household members.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: npo02__TotalOppAmount__c
      bloomerang:
        status: absent
    common_synonyms:
      - lifetime giving
      - cumulative giving
      - household giving total
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: System timestamp.
    usage: Audit field.
    presence:
      salesforce:
        status: absent
      hubspot:
        status: absent
      attio:
        status: absent
      espocrm:
        status: absent
      civicrm:
        status: standard
        api_name: created_date
      salesforce_npsp:
        status: standard
        api_name: CreatedDate
      bloomerang:
        status: absent
relationships:
  - target: contact
    cardinality: one-to-many
    role: parent
    description: A household contains many member contacts (typically 2-5 individuals).
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: absent
  - target: donation
    cardinality: one-to-many
    role: parent
    description: A household has aggregate donations rolled up from member contacts' giving.
    presence:
      salesforce: absent
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: custom
      salesforce_npsp: standard
      bloomerang: absent

