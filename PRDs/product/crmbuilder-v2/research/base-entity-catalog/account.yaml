# =============================================================================
# Catalog metadata
# =============================================================================
catalog_id: account
catalog_version: "0.1"
last_updated: "05-08-26 04:30"
tier: 1
entry_kind: universal

# =============================================================================
# Entity-level definition
# =============================================================================
name: Account
display_name: Account
purpose: >
  An organizational unit the CRM tracks as a customer, prospect, supplier,
  partner, or — in nonprofit contexts — a household, foundation, or
  constituent organization. Together with Contact, one of two universal
  anchor entities in CRM data models.

business_context: >
  Account records anchor most relationship and revenue data in a CRM. They
  represent the parties the organization does business with: customers,
  prospects, vendors, partners, donors-as-organizations, foundations,
  schools, government bodies, and households. Most other CRM activity
  (opportunities, donations, cases, contracts, campaign memberships) hangs
  off an Account either directly or through a related Contact, so the way
  Accounts are modeled shapes nearly every downstream report, automation,
  and integration. In nonprofit deployments the Account model often diverges
  significantly from for-profit deployments — household accounts treat
  individual donors as members of a family unit, organization accounts
  represent foundations or corporate sponsors, and some systems (CiviCRM,
  Bloomerang) collapse the Account/Contact distinction entirely. When
  interviewing clients, surface "Account" by asking which organizational
  units they need to track distinctly from people: companies, families,
  schools, vendors, partner agencies, granting bodies. If the answer is
  "we only track individuals," the deployment may not need a separate
  Account entity at all (and the target backend's choice matters more —
  CiviCRM and Bloomerang accommodate this naturally; Salesforce and
  HubSpot still require Accounts as anchors).

data_model_role: anchor
typically_required: true
common_synonyms:
  - Company
  - Organization
  - Household
  - Constituent Organization

# =============================================================================
# Cross-system equivalents
# =============================================================================
systems:
  - system: salesforce
    name: Account
    api_name: Account
    is_standard: true
    notes: >
      Foundational standard object. Supports record types for differentiating
      Customer, Prospect, Partner. Person Account is an optional alternate
      model that combines Account + Contact into a single record for B2C use
      cases — opt-in feature, not enabled by default.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_account.htm

  - system: hubspot
    name: Company
    api_name: companies
    is_standard: true
    notes: >
      HubSpot uses the term "Company" rather than "Account." Companies are
      typically auto-created from email domain matching when contacts are
      added. Standard CRM object alongside Contacts, Deals, and Tickets.
    docs_url: https://developers.hubspot.com/blog/a-developers-guide-to-hubspot-crm-objects-company-object

  - system: attio
    name: Company
    api_name: companies
    is_standard: true
    notes: >
      Built-in standard object, enabled by default. Auto-populates from
      email-domain matching when People records are synced. Many attributes
      are enriched automatically by Attio (description, categories, location,
      social media handles, employee range, ARR estimates).
    docs_url: https://attio.com/help/reference/managing-your-data/objects/manage-standard-objects

  - system: espocrm
    name: Account
    api_name: Account
    is_standard: true
    notes: >
      Standard CRM-module entity. Includes built-in billingAddress and
      shippingAddress composite fields. Account.type enum ships with
      Customer / Investor / Partner / Reseller; can be extended.
    docs_url: https://github.com/espocrm/espocrm/blob/master/application/Espo/Modules/Crm/Resources/metadata/entityDefs/Account.json

  - system: civicrm
    name: Organization (Contact subtype)
    api_name: "Contact (contact_type=Organization)"
    is_standard: true
    notes: >
      MAJOR DIVERGENCE. CiviCRM unifies Person, Household, and Organization
      under a single Contact entity with a contact_type discriminator. There
      is no separate Account table. Organization-only fields (organization_name,
      legal_name, sic_code) only apply when contact_type=Organization.
      Household is also a contact_type, distinct from Organization, used for
      family/group records.
    docs_url: https://docs.civicrm.org/user/en/latest/organising-your-data/contacts/

  - system: salesforce_npsp
    name: Account (Household, 1x1, or Organization Record Type)
    api_name: Account
    is_standard: true
    notes: >
      NPSP adds three Account record types layered on Salesforce's standard
      Account object: Household Account (group of related individuals living
      together), 1-to-1 Account (auto-generated per individual contact),
      and Organization Account (foundations, corporate donors, schools).
      Default is Household Account when a contact is created without an
      account assignment. NPSP-specific rollup fields (lifetime giving,
      household giving) live on Household accounts.
    docs_url: https://trailhead.salesforce.com/content/learn/modules/nonprofit-success-pack-basics/organize-your-data-with-npsp

  - system: bloomerang
    name: Constituent (Organization Type)
    api_name: Constituent
    is_standard: true
    notes: >
      MAJOR DIVERGENCE. Bloomerang unifies individual donors and organization
      donors under a single Constituent entity with a Type discriminator
      (Individual vs Organization). There is no separate Account table.
      Organization-type constituents track FullName instead of FirstName/
      LastName. Households are not a first-class concept — managed via
      Relationships between individual constituents.
    docs_url: https://bloomerang.com/api/rest-api-v1/

# =============================================================================
# Attributes
# =============================================================================
attributes:
  - name: accountName
    display_name: Account Name
    type: string
    required: true
    max_length: 255
    description: >
      The legal or commonly-used name of the account.
    usage: >
      Primary identifier shown across nearly every CRM view, list, search
      result, and report. Drives duplicate-detection rules, search relevance,
      and merge decisions. Required because virtually no business process can
      proceed without a recognizable label for the organization. In CiviCRM
      this is `organization_name` (not `name`) when contact_type is
      Organization. In Bloomerang the equivalent is `FullName` for
      Organization-type constituents.
    presence:
      salesforce:
        status: standard
        api_name: Name
      hubspot:
        status: standard
        api_name: name
      attio:
        status: standard
        api_name: name
      espocrm:
        status: standard
        api_name: name
      civicrm:
        status: standard
        api_name: organization_name
      salesforce_npsp:
        status: standard
        api_name: Name
      bloomerang:
        status: standard
        api_name: FullName
  - name: accountType
    display_name: Account Type
    type: enum
    required: false
    enum_values:
      - Customer
      - Prospect
      - Partner
      - Vendor
      - Other
    description: >
      Categorizes the relationship the organization has with the user's business.
    usage: >
      Drives segmentation, reporting, and conditional UI behavior — for
      example, hiding sales-pipeline fields on vendor accounts. Enum values
      vary across systems (Salesforce ships Customer-Direct, Customer-Channel,
      Channel Partner, Reseller, Installation Partner, Technology Partner,
      Other; EspoCRM ships Customer, Investor, Partner, Reseller; HubSpot
      uses lifecyclestage which conflates type and pipeline stage). Often the
      first attribute customized after deployment. In nonprofit systems this
      is reframed as Constituent Type (donor / volunteer / foundation /
      corporate sponsor / etc.).
    presence:
      salesforce:
        status: standard
        api_name: Type
      hubspot:
        status: standard
        api_name: type
      attio:
        status: custom
      espocrm:
        status: standard
        api_name: type
      civicrm:
        status: standard
        api_name: contact_sub_type
      salesforce_npsp:
        status: standard
        api_name: Type
      bloomerang:
        status: standard
        api_name: Type
    notes: >
      In CiviCRM this maps to contact_sub_type rather than a separate Type
      attribute. In Bloomerang this is the Type discriminator that selects
      Individual vs Organization.

    common_synonyms:
      - account type
      - classification
      - category
  - name: industry
    display_name: Industry
    type: enum
    required: false
    enum_values:
      - Technology
      - Healthcare
      - Finance
      - Education
      - Manufacturing
      - Retail
      - Nonprofit
      - Government
      - Other
    description: >
      Industry classification for the account.
    usage: >
      Used for segmentation, pricing, sales territory assignment, regulatory
      compliance routing, and reporting. Long-tail vocabulary varies widely
      across systems — EspoCRM ships ~50 industry options including detailed
      sector breakdowns; Salesforce's standard list is ~40; HubSpot uses a
      slightly different vocabulary aligned to its persona templates. NTEE
      codes (National Taxonomy of Exempt Entities) often replace this for
      nonprofit accounts.
    presence:
      salesforce:
        status: standard
        api_name: Industry
      hubspot:
        status: standard
        api_name: industry
      attio:
        status: standard
        api_name: categories
      espocrm:
        status: standard
        api_name: industry
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: Industry
      bloomerang:
        status: custom
    common_synonyms:
      - sector
      - vertical
      - line of business
      - business type
  - name: website
    display_name: Website
    type: url
    required: false
    description: >
      Primary public website URL for the account.
    usage: >
      Anchors many automation flows: domain-based duplicate detection (HubSpot
      and Attio both use the website domain to auto-match new contacts to
      existing companies), enrichment lookups (LinkedIn, Crunchbase, ZoomInfo
      keys), grant-eligibility verification for nonprofits (verifying a
      foundation's claimed website matches their public-facing identity).
    presence:
      salesforce:
        status: standard
        api_name: Website
      hubspot:
        status: standard
        api_name: website
      attio:
        status: standard
        api_name: domains
      espocrm:
        status: standard
        api_name: website
      civicrm:
        status: standard
        api_name: url
      salesforce_npsp:
        status: standard
        api_name: Website
      bloomerang:
        status: standard
        api_name: Website
    common_synonyms:
      - url
      - web address
      - homepage
      - domain
  - name: phone
    display_name: Main Phone
    type: phone
    required: false
    description: >
      Main organizational phone number.
    usage: >
      Office or main line — distinct from individual contacts' direct phones.
      Used for routing inbound calls, reverse-lookup matching, and
      address-verification workflows. EspoCRM models this as a multi-type
      phoneNumber field with subtypes (Office, Mobile, Fax, Other).
    presence:
      salesforce:
        status: standard
        api_name: Phone
      hubspot:
        status: standard
        api_name: phone
      attio:
        status: custom
      espocrm:
        status: standard
        api_name: phoneNumber
      civicrm:
        status: standard
        api_name: phone
      salesforce_npsp:
        status: standard
        api_name: Phone
      bloomerang:
        status: standard
        api_name: PrimaryPhone
    common_synonyms:
      - main phone
      - office phone
      - switchboard
  - name: emailAddress
    display_name: Email Address
    type: email
    required: false
    description: >
      Main organizational email address (e.g. info@, contact@).
    usage: >
      Generic-recipient address (info@, contact@, hello@) distinct from
      personal addresses on Contact records. Used for catch-all communication,
      list-import targeting, and email-deliverability validation. Some
      systems (HubSpot, Attio) don't provide a first-class email attribute on
      Company/Account at all — assuming all email goes to individual Contacts.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: standard
        api_name: emailAddress
      civicrm:
        status: standard
        api_name: email
      salesforce_npsp:
        status: custom
      bloomerang:
        status: standard
        api_name: PrimaryEmail
  - name: billingAddress
    display_name: Billing Address
    type: address
    required: false
    description: >
      Composite address (street, city, state, country, postal code) used for
      billing and invoicing.
    usage: >
      Composite of street, city, state, postal code, country. Salesforce and
      EspoCRM treat this as a first-class composite field with sub-fields
      automatically generated. HubSpot and Attio model address as separate
      individual properties (street, city, state, etc.). Drives invoice
      generation, tax jurisdiction calculation, and shipping-versus-billing
      address differentiation.
    presence:
      salesforce:
        status: standard
        api_name: BillingAddress
      hubspot:
        status: standard
        api_name: address
      attio:
        status: standard
        api_name: primary_location
      espocrm:
        status: standard
        api_name: billingAddress
      civicrm:
        status: standard
        api_name: street_address
      salesforce_npsp:
        status: standard
        api_name: BillingAddress
      bloomerang:
        status: standard
        api_name: PrimaryAddress
    notes: >
      Address modeling varies dramatically. CiviCRM and Bloomerang model
      Address as a separate first-class entity allowing multiple addresses
      per record (Home, Billing, Mailing, etc.). Salesforce and EspoCRM use
      composite fields with billing/shipping doubles. HubSpot uses flat
      property fields.

  - name: shippingAddress
    display_name: Shipping Address
    type: address
    required: false
    description: >
      Composite address used for shipping or physical mail delivery.
    usage: >
      Distinct from billing address when an account ships goods to a different
      location than where invoices are sent. Less commonly populated; many
      deployments collapse this into billing address. In nonprofit deployments
      this often becomes "mailing address" for direct-mail solicitations.
    presence:
      salesforce:
        status: standard
        api_name: ShippingAddress
      hubspot:
        status: standard
        api_name: shippingaddress
      attio:
        status: custom
      espocrm:
        status: standard
        api_name: shippingAddress
      civicrm:
        status: standard
        api_name: shipping_address
      salesforce_npsp:
        status: standard
        api_name: ShippingAddress
      bloomerang:
        status: standard
        api_name: ShippingAddress
  - name: description
    display_name: Description
    type: text
    required: false
    description: >
      Free-form long-text description of the account.
    usage: >
      Catch-all narrative field for context that doesn't fit any structured
      attribute — relationship history, internal notes, account strategy,
      mission summary. Not typically used in automation or reporting; primarily
      a human-readable scratchpad. In Attio this attribute is enriched
      automatically with a brief AI-generated summary.
    presence:
      salesforce:
        status: standard
        api_name: Description
      hubspot:
        status: standard
        api_name: description
      attio:
        status: standard
        api_name: description
      espocrm:
        status: standard
        api_name: description
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: Description
      bloomerang:
        status: custom
  - name: numberOfEmployees
    display_name: Number of Employees
    type: integer
    required: false
    description: >
      Headcount of the organization.
    usage: >
      Used for company-size segmentation, sales-territory assignment, and
      pricing tiers. In Attio represented as an "Employee range" enriched
      attribute (1-10, 11-50, etc.) rather than a numeric value. Most useful
      for B2B sales motions; rarely populated for nonprofit donor management.
    presence:
      salesforce:
        status: standard
        api_name: NumberOfEmployees
      hubspot:
        status: standard
        api_name: numberofemployees
      attio:
        status: standard
        api_name: employee_range
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: NumberOfEmployees
      bloomerang:
        status: custom
    common_synonyms:
      - headcount
      - team size
      - employee count
      - staff size
  - name: annualRevenue
    display_name: Annual Revenue
    type: currency
    required: false
    description: >
      Estimated annual revenue of the organization.
    usage: >
      Drives sales-territory assignment, account scoring, and pricing tier
      selection. In Attio modeled as "Estimated ARR" with a range value
      (enriched). Frequently used in B2B sales motions for ICP scoring;
      typically irrelevant for nonprofit donor records.
    presence:
      salesforce:
        status: standard
        api_name: AnnualRevenue
      hubspot:
        status: standard
        api_name: annualrevenue
      attio:
        status: standard
        api_name: estimated_arr_usd
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: AnnualRevenue
      bloomerang:
        status: custom
    common_synonyms:
      - ARR
      - annual recurring revenue
      - turnover
      - top-line
      - sales
  - name: parentAccount
    display_name: Parent Account
    type: reference
    required: false
    reference_target: account
    description: >
      Self-referential lookup to a parent account in a corporate hierarchy.
    usage: >
      Models corporate hierarchies (subsidiary → parent), enabling rolled-up
      reporting (sum opportunities across all child accounts of a parent) and
      consolidated relationship views. Critical in enterprise B2B contexts
      with complex corporate structures. In Attio handled via custom
      relationship attributes rather than a built-in self-reference.
    presence:
      salesforce:
        status: standard
        api_name: ParentId
      hubspot:
        status: standard
        api_name: hs_parent_company_id
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: ParentId
      bloomerang:
        status: custom
    common_synonyms:
      - parent company
      - parent organization
      - parent
  - name: assignedUser
    display_name: Owner
    type: reference
    required: false
    reference_target: user
    description: >
      The user who owns or is responsible for the account.
    usage: >
      Drives sharing rules, sales-team assignment, escalation routing, and
      "my accounts" filtering. Almost universal across CRMs because every
      record needs an accountable user for permission and pipeline-management
      reasons. Salesforce calls this OwnerId; HubSpot calls it hubspot_owner_id;
      EspoCRM calls it assignedUserId. Bloomerang assigns ownership at the
      database level rather than per-record.
    presence:
      salesforce:
        status: standard
        api_name: OwnerId
      hubspot:
        status: standard
        api_name: hubspot_owner_id
      attio:
        status: standard
        api_name: workspace_member_owner
      espocrm:
        status: standard
        api_name: assignedUserId
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: OwnerId
      bloomerang:
        status: absent
    common_synonyms:
      - owner
      - account owner
      - account manager
      - AM
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: >
      System-generated timestamp of when the record was created.
    usage: >
      Audit and analytics field; almost always read-only and system-managed.
      Drives "new accounts this month" reports, vintage cohort analysis, and
      data-quality checks (records older than X without activity).
    presence:
      salesforce:
        status: standard
        api_name: CreatedDate
      hubspot:
        status: standard
        api_name: createdate
      attio:
        status: standard
        api_name: created_at
      espocrm:
        status: standard
        api_name: createdAt
      civicrm:
        status: standard
        api_name: created_date
      salesforce_npsp:
        status: standard
        api_name: CreatedDate
      bloomerang:
        status: standard
        api_name: CreatedDate
  - name: lastModifiedAt
    display_name: Last Modified Date
    type: datetime
    required: true
    description: >
      System-generated timestamp of when the record was last updated.
    usage: >
      Audit field; used in change-tracking workflows, integration sync
      filters (only pull records modified since last sync), and stale-data
      detection (records not touched in X months).
    presence:
      salesforce:
        status: standard
        api_name: LastModifiedDate
      hubspot:
        status: standard
        api_name: hs_lastmodifieddate
      attio:
        status: standard
        api_name: updated_at
      espocrm:
        status: standard
        api_name: modifiedAt
      civicrm:
        status: standard
        api_name: modified_date
      salesforce_npsp:
        status: standard
        api_name: LastModifiedDate
      bloomerang:
        status: standard
        api_name: LastModified
relationships:
  - target: contact
    cardinality: one-to-many
    role: parent
    description: >
      An account has many contacts; each contact typically belongs to one
      account (with multi-account exceptions in some systems).
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - target: activity
    cardinality: one-to-many
    role: parent
    description: >
      An account has many activities (calls, meetings, tasks, emails) logged
      against it.
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - target: note
    cardinality: one-to-many
    role: parent
    description: >
      An account has many notes attached to it.
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

  - target: account
    cardinality: many-to-one
    role: parent
    description: >
      Self-referential parent account relationship (subsidiary → parent).
    presence:
      salesforce: standard
      hubspot: standard
      attio: custom
      espocrm: custom
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

