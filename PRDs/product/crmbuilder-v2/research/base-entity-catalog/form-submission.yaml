# Catalog metadata
# =============================================================================
catalog_id: form-submission
catalog_version: "0.1"
last_updated: "05-08-26 06:21"
tier: 3
entry_kind: universal

# =============================================================================
# Entity-level definition
# =============================================================================
name: Form Submission
display_name: Form Submission
purpose: >
  A record of a website form being submitted by a visitor — capturing the
  field values they entered, the form they submitted, the page they
  submitted from, and the resulting CRM record (typically a Lead, Contact,
  or Constituent created or updated from the submission).

business_context: >
  Form Submission records are the bridge between web forms and the CRM
  data model. When a visitor fills out "Request a Demo" or "Subscribe to
  Newsletter" or "Donate Now," a Form Submission record captures what
  they submitted (field values), where they submitted from (page URL,
  referrer), and what CRM record got created or updated as a result. This
  serves three purposes: (1) data lineage — proves which form drove which
  CRM record's creation, useful for marketing-attribution and data-quality
  audits; (2) field-mapping flexibility — form fields don't have to map
  one-to-one with CRM fields, so the submission record preserves the
  original input even if mapping is imperfect; (3) duplicate-handling —
  the submission can be analyzed to decide whether to create a new
  contact or update an existing one. HubSpot is the system that elevates
  Form Submission to a first-class entity most prominently — Forms are
  managed in HubSpot, submissions are tracked, and HubSpot Forms are a
  major lead-capture mechanism. Other systems treat form submissions as
  upstream events that produce Contact / Lead records but don't preserve
  the submission itself as a queryable entity. When interviewing clients,
  surface "Form Submission" by asking whether they need to track the
  source form for each new contact / lead and whether they need to
  retain the original submission data separately from the CRM record.

data_model_role: log
typically_required: false
common_synonyms:
  - Form Entry
  - Webform Submission
  - Form Response
  - Inbound Form

# =============================================================================
# Cross-system equivalents
# =============================================================================
systems:
  - system: salesforce
    name: "Web-to-Lead capture (no first-class submission entity)"
    api_name: not_applicable
    is_standard: false
    notes: >
      Salesforce Web-to-Lead creates Lead records directly from form
      submissions but doesn't preserve a separate Form Submission
      record. Custom solutions (third-party form builders like Form
      Assembly, FormStack) often add their own submission entities.
    docs_url: https://help.salesforce.com/s/articleView?id=sf.setting_up_web-to-lead.htm

  - system: hubspot
    name: Form Submission
    api_name: form_submissions
    is_standard: true
    notes: >
      HubSpot Forms is a flagship feature — every form submission creates
      a Form Submission record with full field values, page context, and
      attribution. Forms can be embedded on HubSpot pages or any external
      site. Submissions trigger workflows (lead-routing, autoresponders).
    docs_url: https://developers.hubspot.com/docs/api-reference/marketing-marketing-events-v3

  - system: attio
    name: "Form Submission (via Forms feature)"
    api_name: forms
    is_standard: true
    notes: >
      Attio added a Forms feature in 2024-2025 that auto-creates Person /
      Company records from form submissions. Submissions are tracked in
      the workspace activity log.
    docs_url: https://attio.com/help/reference/managing-your-data/records/create-and-view-records

  - system: espocrm
    name: "Web-to-Lead (no first-class submission entity)"
    api_name: not_applicable
    is_standard: false
    notes: >
      EspoCRM has Web-to-Lead capture forms that create Lead records
      directly. No first-class Form Submission entity — submissions
      become Leads.
    docs_url: https://docs.espocrm.com/user-guide/web-to-lead/

  - system: civicrm
    name: "Profile / Webform submission (host CMS)"
    api_name: not_applicable
    is_standard: false
    notes: >
      CiviCRM uses Profiles as the form-builder mechanism, embedded in
      the host CMS. Submission tracking is delegated to the CMS
      (Webform module in Drupal, etc.). No first-class CiviCRM Form
      Submission entity.
    docs_url: https://docs.civicrm.org/user/en/latest/initial-set-up/profiles/

  - system: salesforce_npsp
    name: "Web-to-Lead / Donation form integrations (no first-class entity)"
    api_name: not_applicable
    is_standard: false
    notes: >
      Same as Salesforce. Most NPSP donation forms are integrated via
      third-party tools (Classy, Click & Pledge, FormAssembly, NPSP
      Online Donations) that create Opportunity records but don't
      preserve form submissions as queryable entities.
    docs_url: https://help.salesforce.com/s/articleView?id=sf.setting_up_web-to-lead.htm

  - system: bloomerang
    name: Form Submission (via Bloomerang Forms)
    api_name: not_in_rest_api_directly
    is_standard: true
    notes: >
      Bloomerang has a Forms feature for donation, event, and signup
      forms. Submissions create Constituent + Transaction records but
      aren't separately queryable as Form Submission entities through
      the REST API.
    docs_url: https://bloomerang.com/api/

# =============================================================================
# Attributes
# =============================================================================
attributes:
  - name: formId
    display_name: Form
    type: reference
    required: true
    reference_target: form-submission
    description: >
      Reference to the form that was submitted.
    usage: >
      Anchors the submission to its source form definition. Drives
      per-form analytics ("conversion rate of the Demo Request form").
    presence:
      salesforce: absent
      hubspot: standard
      attio: standard
      espocrm: absent
      civicrm: absent
      salesforce_npsp: absent
      bloomerang: standard

  - name: submittedAt
    display_name: Submitted At
    type: datetime
    required: true
    description: >
      Date and time the form was submitted.
    usage: >
      Anchors all timing analytics (conversion velocity, time-of-day
      patterns).
    presence:
      salesforce: absent
      hubspot: standard
      attio: standard
      espocrm: absent
      civicrm: absent
      salesforce_npsp: absent
      bloomerang: standard

  - name: pageUrl
    display_name: Page URL
    type: url
    required: false
    description: >
      URL of the page where the form was submitted.
    usage: >
      Drives "which page is converting best" reporting. For embeddable
      forms used on multiple pages, identifies which placement is
      converting.
    presence:
      salesforce: absent
      hubspot: standard
      attio: custom
      espocrm: absent
      civicrm: custom
      salesforce_npsp: absent
      bloomerang: custom

  - name: referrer
    display_name: Referrer
    type: url
    required: false
    description: >
      URL of the page that referred the visitor to the form page.
    usage: >
      Marketing-attribution input — was this conversion driven by a
      specific email, social post, or external link?
    presence:
      salesforce: absent
      hubspot: standard
      attio: custom
      espocrm: absent
      civicrm: absent
      salesforce_npsp: absent
      bloomerang: custom

  - name: ipAddress
    display_name: IP Address
    type: string
    required: false
    description: >
      IP address the submission came from.
    usage: >
      Spam-detection input, geolocation analytics, and abuse mitigation.
    presence:
      salesforce: absent
      hubspot: standard
      attio: custom
      espocrm: absent
      civicrm: custom
      salesforce_npsp: absent
      bloomerang: custom

  - name: contact
    display_name: Resulting Contact
    type: reference
    required: false
    reference_target: contact
    description: >
      The Contact record created or updated from this submission.
    usage: >
      Anchors data lineage — proves which form drove the contact's CRM
      creation.
    presence:
      salesforce: absent
      hubspot: standard
      attio: standard
      espocrm: absent
      civicrm: absent
      salesforce_npsp: absent
      bloomerang: standard

  - name: lead
    display_name: Resulting Lead
    type: reference
    required: false
    reference_target: lead
    description: >
      The Lead record created or updated from this submission (in
      systems with separate Lead).
    usage: >
      Same as resulting Contact, but for systems where form submissions
      typically produce Leads rather than Contacts.
    presence:
      salesforce: absent
      hubspot: standard
      attio: absent
      espocrm: absent
      civicrm: absent
      salesforce_npsp: absent
      bloomerang: absent

  - name: rawValues
    display_name: Submitted Values
    type: text
    required: true
    description: >
      JSON or structured representation of the form field values as
      submitted.
    usage: >
      Preserves the original submission for audit and re-processing if
      mapping changes. Lets analysts see what was actually entered (vs
      what made it onto the resulting CRM record).
    presence:
      salesforce: absent
      hubspot: standard
      attio: standard
      espocrm: absent
      civicrm: absent
      salesforce_npsp: absent
      bloomerang: custom

  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: >
      Same as submittedAt in most cases.
    usage: >
      Standard audit field.
    presence:
      salesforce: absent
      hubspot: standard
      attio: standard
      espocrm: absent
      civicrm: absent
      salesforce_npsp: absent
      bloomerang: standard

# =============================================================================
# Relationships to other entities
# =============================================================================
relationships:
  - target: contact
    cardinality: many-to-one
    role: child
    description: >
      A form submission typically produces / updates one Contact.
    presence:
      salesforce: absent
      hubspot: standard
      attio: standard
      espocrm: absent
      civicrm: absent
      salesforce_npsp: absent
      bloomerang: standard

  - target: lead
    cardinality: many-to-one
    role: child
    description: >
      A form submission may produce / update one Lead (in systems with
      Lead).
    presence:
      salesforce: absent
      hubspot: standard
      attio: absent
      espocrm: absent
      civicrm: absent
      salesforce_npsp: absent
      bloomerang: absent

