# Catalog metadata
# =============================================================================
catalog_id: quote
catalog_version: "0.1"
last_updated: "05-08-26 05:45"
tier: 2
entry_kind: universal

# =============================================================================
# Entity-level definition
# =============================================================================
name: Quote
display_name: Quote
purpose: >
  A formal proposal showing prices for products and services offered to a
  prospect. Generated against an Opportunity (or Deal) and sent to the
  customer for review and acceptance. Contains line items, pricing,
  discounts, terms, and validity dates.

business_context: >
  Quote records hold the formal pricing proposals that get sent to
  customers for sign-off. They sit between Opportunity (the deal in
  pursuit) and Order (the executed purchase). One Opportunity often has
  multiple Quotes — a Bronze / Silver / Gold tier presentation, or a
  proposal-with-and-without-add-ons comparison, or revised pricing after
  negotiation. The "primary" or "synced" Quote is the one whose pricing
  drives the Opportunity's Amount. Quotes carry their own line items
  (Quote Line Items in Salesforce, separate from Opportunity Line Items),
  customer-facing identifiers (Quote Number), expiration dates (after
  which the quote is invalid), terms and conditions, and approval status.
  In subscription / SaaS sales motions, Quotes capture subscription term,
  start date, billing frequency, and ramp pricing — the Salesforce CPQ
  product extends standard Quotes significantly to handle these. In
  nonprofit deployments Quotes are rare; they appear when nonprofits sell
  products (event tickets, merchandise, services) but most fundraising
  motions don't use Quotes. When interviewing clients, surface "Quote" by
  asking whether they need to generate formal pricing documents to send to
  customers, whether multiple pricing variations are quoted per
  opportunity, and whether quotes need approval workflows. If yes to any
  of these, the target backend's Quote support matters; if no, this
  entity is not needed.

data_model_role: document
typically_required: false
common_synonyms:
  - Proposal
  - Estimate
  - Bid

# =============================================================================
# Cross-system equivalents
# =============================================================================
systems:
  - system: salesforce
    name: Quote
    api_name: Quote
    is_standard: true
    notes: >
      Standard object available in API version 18.0+. Each Quote belongs
      to one Opportunity. Quote Line Items mirror Opportunity Line Items.
      The "Sync" flag designates which Quote drives the Opportunity's
      Amount. Salesforce CPQ extends standard Quotes for complex
      subscription pricing, configurable products, and approval
      workflows.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_quote.htm

  - system: hubspot
    name: Quote
    api_name: quotes
    is_standard: true
    notes: >
      Standard CRM object. HubSpot Quotes auto-generate from Deals with
      associated line items. Includes quote-template selection, e-signature
      integration (DocuSign / native HubSpot Sign), and customer-facing
      web preview links. Quote pricing flows back into the Deal amount
      when the Quote is accepted.
    docs_url: https://developers.hubspot.com/docs/reference/api/crm/objects/quotes

  - system: attio
    name: "Custom object (no standard Quote)"
    api_name: not_applicable
    is_standard: false
    notes: >
      Attio has no standard Quote entity. Customers who need quoting
      typically create a custom object linked to Deals. Attio's
      flexible-schema design supports this but requires manual setup.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects

  - system: espocrm
    name: Quote
    api_name: Quote
    is_standard: true
    notes: >
      Standard entity in the Sales Pack module. Includes quote number,
      account, opportunity, status, valid-until date, addresses, line
      items (via separate QuoteItem entity), totals (subtotal, discount,
      tax, grand total). Status enum includes Draft / Presented /
      Accepted / Rejected / Expired.
    docs_url: https://github.com/espocrm/espocrm/blob/master/application/Espo/Modules/Sales/Resources/metadata/entityDefs/Quote.json

  - system: civicrm
    name: "(no Quote concept)"
    api_name: not_applicable
    is_standard: false
    notes: >
      MAJOR ABSENCE. CiviCRM has no Quote entity. Pricing/quoting
      capabilities exist via Price Sets attached to events or contributions
      but those serve different purposes (registration pricing,
      multi-product donation forms) rather than formal sales proposals.
    docs_url: https://docs.civicrm.org/user/en/latest/

  - system: salesforce_npsp
    name: Quote
    api_name: Quote
    is_standard: true
    notes: >
      Same as Salesforce. Rarely used in nonprofit deployments — appears
      occasionally for nonprofits that sell products (publications, event
      packages, training services). Most NPSP deployments don't use the
      Quote object.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_quote.htm

  - system: bloomerang
    name: "(no Quote concept)"
    api_name: not_applicable
    is_standard: false
    notes: >
      MAJOR ABSENCE. Bloomerang has no Quote entity. Donation pledges and
      transactions are handled directly without a quoting step.
    docs_url: https://bloomerang.com/api/rest-api-v1/

# =============================================================================
# Attributes
# =============================================================================
attributes:
  - name: quoteName
    display_name: Quote Name
    type: string
    required: true
    max_length: 255
    description: >
      Display name of the quote.
    usage: >
      Used in lists and customer-facing documents. Often follows a template
      ("Acme - Annual Subscription - v2") and can include the quote
      number for clarity.
    presence:
      salesforce:
        status: standard
        api_name: Name
      hubspot:
        status: standard
        api_name: hs_title
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: name
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Name
      bloomerang:
        status: absent
  - name: quoteNumber
    display_name: Quote Number
    type: autonumber
    required: true
    description: >
      System-generated sequence number for the quote.
    usage: >
      Customer-facing identifier ("Quote #Q-2026-1234"). Used in customer
      communications, signed documents, and accounting cross-references.
      Salesforce uses Quote.QuoteNumber (auto-numbered); EspoCRM uses
      number (auto-incremented).
    presence:
      salesforce:
        status: standard
        api_name: QuoteNumber
      hubspot:
        status: standard
        api_name: hs_quote_number
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: number
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: QuoteNumber
      bloomerang:
        status: absent
  - name: opportunity
    display_name: Opportunity
    type: reference
    required: true
    reference_target: opportunity
    description: >
      The opportunity this quote is associated with.
    usage: >
      Anchors the quote to its parent deal. Required in most B2B systems —
      every quote needs an opportunity. Salesforce supports many quotes
      per opportunity with one designated as "primary" (synced).
    presence:
      salesforce:
        status: standard
        api_name: OpportunityId
      hubspot:
        status: standard
        api_name: hs_deal_id
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: opportunityId
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: OpportunityId
      bloomerang:
        status: absent
  - name: account
    display_name: Account
    type: reference
    required: true
    reference_target: account
    description: >
      The customer this quote is being prepared for.
    usage: >
      Drives customer-facing document fields (bill-to address, contact
      info, customer name on the document). Typically auto-populated
      from the opportunity's account.
    presence:
      salesforce:
        status: standard
        api_name: AccountId
      hubspot:
        status: standard
        api_name: account
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: accountId
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: AccountId
      bloomerang:
        status: absent
  - name: contact
    display_name: Contact
    type: reference
    required: false
    reference_target: contact
    description: >
      The primary contact at the customer who will review this quote.
    usage: >
      Drives customer-facing greeting, email-send recipient, and
      e-signature workflow routing. Critical for quote-acceptance
      automation — quotes get sent to a specific contact, not a generic
      account address.
    presence:
      salesforce:
        status: standard
        api_name: ContactId
      hubspot:
        status: standard
        api_name: hs_associated_contact_ids
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: contactId
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: ContactId
      bloomerang:
        status: absent
  - name: quoteStatus
    display_name: Quote Status
    type: enum
    required: true
    enum_values:
      - Draft
      - Needs Review
      - In Review
      - Approved
      - Presented
      - Accepted
      - Rejected
      - Expired
    description: >
      Lifecycle state of the quote.
    usage: >
      Drives the approval and customer-facing workflow. Internal-facing
      stages (Draft → In Review → Approved) gate visibility before the
      quote is sent. Customer-facing stages (Presented → Accepted /
      Rejected) track post-send response. Expired is set automatically
      when validUntil passes without acceptance.
    presence:
      salesforce:
        status: standard
        api_name: Status
      hubspot:
        status: standard
        api_name: hs_status
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: status
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Status
      bloomerang:
        status: absent
  - name: validUntil
    display_name: Valid Until / Expiration Date
    type: date
    required: false
    description: >
      Date after which the quote is no longer valid.
    usage: >
      Drives auto-expiration workflows and customer-facing urgency
      ("This quote expires on March 15"). Common values are 30, 60, or
      90 days from creation. Often configured as a default offset rather
      than entered manually per quote.
    presence:
      salesforce:
        status: standard
        api_name: ExpirationDate
      hubspot:
        status: standard
        api_name: hs_expiration_date
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: expirationDate
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: ExpirationDate
      bloomerang:
        status: absent
    common_synonyms:
      - expiration date
      - expires
      - expiry
      - good through
  - name: subtotal
    display_name: Subtotal
    type: currency
    required: false
    description: >
      Sum of line item totals before discounts and tax.
    usage: >
      Auto-calculated from line items in most systems. Drives discount
      calculation (discount applied to subtotal) and tax calculation
      (tax rate applied to subtotal minus discount).
    presence:
      salesforce:
        status: standard
        api_name: Subtotal
      hubspot:
        status: standard
        api_name: hs_subtotal
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: preDiscountedAmount
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Subtotal
      bloomerang:
        status: absent
  - name: discount
    display_name: Discount
    type: currency
    required: false
    description: >
      Total discount amount applied to the quote.
    usage: >
      Either entered as a fixed amount or calculated from a percentage.
      Drives margin-impact reports and approval rules (some orgs require
      manager approval for discounts above a threshold).
    presence:
      salesforce:
        status: standard
        api_name: Discount
      hubspot:
        status: standard
        api_name: hs_discount_total
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: discount
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Discount
      bloomerang:
        status: absent
  - name: tax
    display_name: Tax
    type: currency
    required: false
    description: >
      Tax amount applied to the quote.
    usage: >
      Auto-calculated from tax rate × (subtotal - discount) in most
      systems. Tax-rate sourcing varies — some integrate with Avalara or
      similar tax-calculation services; some use simple fixed rates per
      account.
    presence:
      salesforce:
        status: standard
        api_name: Tax
      hubspot:
        status: standard
        api_name: hs_tax_total
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: taxAmount
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Tax
      bloomerang:
        status: absent
  - name: grandTotal
    display_name: Grand Total
    type: currency
    required: false
    description: >
      Final total amount of the quote (subtotal - discount + tax).
    usage: >
      The headline number on the customer-facing quote document. Drives
      "synced quote" amount that flows back to the parent Opportunity.
      Auto-calculated in most systems.
    presence:
      salesforce:
        status: standard
        api_name: GrandTotal
      hubspot:
        status: standard
        api_name: hs_total_amount
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: grandTotalAmount
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: GrandTotal
      bloomerang:
        status: absent
    common_synonyms:
      - total
      - final total
      - all-in
      - total amount
  - name: billingAddress
    display_name: Billing Address
    type: address
    required: false
    description: >
      Address where the customer will receive billing for this quote if
      accepted.
    usage: >
      Captured at the quote level (rather than just account level) because
      multi-location customers may quote different sites. Auto-populated
      from the account but editable per-quote.
    presence:
      salesforce:
        status: standard
        api_name: BillingAddress
      hubspot:
        status: custom
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: billingAddress
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: BillingAddress
      bloomerang:
        status: absent
  - name: shippingAddress
    display_name: Shipping Address
    type: address
    required: false
    description: >
      Address where products will ship if the quote is accepted.
    usage: >
      Distinct from billing address when products ship to a different site
      than where invoices go. Often the same; users override when
      different.
    presence:
      salesforce:
        status: standard
        api_name: ShippingAddress
      hubspot:
        status: custom
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: shippingAddress
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: ShippingAddress
      bloomerang:
        status: absent
  - name: description
    display_name: Description
    type: text
    required: false
    description: >
      Free-form text shown on the customer-facing quote document.
    usage: >
      Cover-letter style copy that introduces the quote, summarizes the
      proposed solution, or includes terms-and-conditions language.
      Distinct from line item descriptions which describe specific
      products or services.
    presence:
      salesforce:
        status: standard
        api_name: Description
      hubspot:
        status: standard
        api_name: hs_terms
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: description
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Description
      bloomerang:
        status: absent
  - name: assignedUser
    display_name: Owner
    type: reference
    required: true
    reference_target: user
    description: >
      The user responsible for the quote (typically the sales rep on
      the parent opportunity).
    usage: >
      Drives "my quotes" filtering and approval routing. Quote ownership
      typically follows opportunity ownership.
    presence:
      salesforce:
        status: standard
        api_name: OwnerId
      hubspot:
        status: standard
        api_name: hubspot_owner_id
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: assignedUserId
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: OwnerId
      bloomerang:
        status: absent
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: >
      System-generated timestamp of when the quote was created.
    usage: >
      Drives valid-until calculation when valid-until is set as an offset.
      Used in quote-velocity reports (time from quote creation to
      acceptance).
    presence:
      salesforce:
        status: standard
        api_name: CreatedDate
      hubspot:
        status: standard
        api_name: createdate
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: createdAt
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: CreatedDate
      bloomerang:
        status: absent
relationships:
  - target: opportunity
    cardinality: many-to-one
    role: child
    description: >
      A quote belongs to one opportunity; an opportunity may have many
      quotes.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: account
    cardinality: many-to-one
    role: child
    description: >
      A quote is prepared for one account.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: contact
    cardinality: many-to-one
    role: child
    description: >
      A quote is prepared for / sent to a specific contact.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: user
    cardinality: many-to-one
    role: child
    description: >
      A quote is owned by a user (the sales rep).
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

