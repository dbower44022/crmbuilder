# =============================================================================
# Catalog metadata
# =============================================================================
catalog_id: product
catalog_version: "0.1"
last_updated: "05-08-26 06:24"
tier: 3
entry_kind: universal

# =============================================================================
# Entity-level definition
# =============================================================================
name: Product
display_name: Product
purpose: >
  A catalog entry describing a product or service the organization sells
  or offers. Has a name, code/SKU, description, family, base price, and
  active status. Distinct from Asset (an instance of a product owned by a
  specific customer).

business_context: >
  Product records are the master catalog. They define what the
  organization can sell or quote — each line on a quote, opportunity, or
  order references a Product to identify what's being transacted. The
  Product-vs-Asset distinction is the cleanest split: Product is "what
  we offer" (catalog); Asset is "what a customer has" (instance). Pricing
  modeling varies: Salesforce uses Product2 (catalog) + PriceBookEntry
  (price-list-specific pricing) so the same product can have different
  prices in different price books. HubSpot uses Products with a single
  Price property. EspoCRM has Product with unitPrice; pricing
  variations require Price Books. Nonprofit deployments use Products less
  often — appearing for organizations that sell event tickets,
  publications, training services, or merchandise. When interviewing
  clients, surface "Product" by asking what they sell or charge for: a
  catalog of standard products/services with consistent SKUs, custom
  one-off services priced per engagement, or no products at all
  (donation-only nonprofits). The presence of a meaningful product
  catalog signals a non-trivial commerce or transactional motion in the
  CRM.

data_model_role: anchor
typically_required: false
common_synonyms:
  - SKU
  - Catalog Item
  - Service
  - Offering

# =============================================================================
# Cross-system equivalents
# =============================================================================
systems:
  - system: salesforce
    name: Product2
    api_name: Product2
    is_standard: true
    notes: >
      Standard object. Salesforce uses Product2 (note the 2; the original
      Product object is deprecated). Includes Name, ProductCode (SKU),
      Description, Family (categorization), IsActive, IsArchived,
      QuantityUnitOfMeasure. Pricing lives in PriceBookEntry records
      (Product + PriceBook + UnitPrice tuples).
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_product2.htm

  - system: hubspot
    name: Product
    api_name: products
    is_standard: true
    notes: >
      Standard CRM object. Includes name, description, sku, price,
      hs_cost_of_goods_sold, term/billing-frequency for subscriptions.
      Simpler than Salesforce — single price field per product;
      multi-currency requires multiple Product records or custom logic.
    docs_url: https://developers.hubspot.com/docs/reference/api/crm/objects/products

  - system: attio
    name: "(no native Product; use custom object)"
    api_name: not_applicable
    is_standard: false
    notes: >
      Attio has no native Product entity. Customers needing product
      catalogs build a custom object.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/create-and-manage-custom-objects

  - system: espocrm
    name: Product
    api_name: Product
    is_standard: true
    notes: >
      Standard entity in Sales Pack module. Includes name, productCode,
      description, type (enum: Product / Service / Subscription),
      category, status (enum: Available / Out of Stock / Discontinued),
      unitPrice, listPrice, quantity, weight.
    docs_url: https://github.com/espocrm/espocrm/blob/master/application/Espo/Modules/Sales/Resources/metadata/entityDefs/Product.json

  - system: civicrm
    name: Premium / Price Field Value
    api_name: not_applicable
    is_standard: false
    notes: >
      CiviCRM has Premium (used for thank-you-gifts in donation context)
      and Price Sets (used for event registration pricing) but no
      general-purpose Product catalog. Sales-style product modeling
      requires custom entities.
    docs_url: https://docs.civicrm.org/user/en/latest/contributions/premiums/

  - system: salesforce_npsp
    name: Product2
    api_name: Product2
    is_standard: true
    notes: >
      Same Salesforce Product2. Used in nonprofit deployments that sell
      tickets, training services, publications, or merchandise.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_product2.htm

  - system: bloomerang
    name: "(no Product concept)"
    api_name: not_applicable
    is_standard: false
    notes: >
      Bloomerang has no Product catalog. Donation amounts are entered
      directly on Transactions; merchandise/event-fee modeling typically
      handled via custom fields or external systems.
    docs_url: https://bloomerang.com/api/rest-api-v1/

# =============================================================================
# Attributes
# =============================================================================
attributes:
  - name: productName
    display_name: Product Name
    type: string
    required: true
    max_length: 255
    description: >
      Display name of the product.
    usage: >
      Anchors search, list views, and quote line item display.
    presence:
      salesforce:
        status: standard
        api_name: Name
      hubspot:
        status: standard
        api_name: name
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: name
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Name
      bloomerang:
        status: absent
  - name: productCode
    display_name: Product Code / SKU
    type: string
    required: false
    max_length: 255
    description: >
      Unique stock-keeping-unit identifier for the product.
    usage: >
      Used in inventory cross-reference, ERP integration, and
      duplicate-detection on product import. Salesforce calls this
      ProductCode; HubSpot calls it sku.
    presence:
      salesforce:
        status: standard
        api_name: ProductCode
      hubspot:
        status: standard
        api_name: productcode
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: productCode
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: ProductCode
      bloomerang:
        status: absent
  - name: description
    display_name: Description
    type: text
    required: false
    description: >
      Free-form description of the product.
    usage: >
      Customer-facing copy for quotes, web catalogs, and proposals.
    presence:
      salesforce:
        status: standard
        api_name: Description
      hubspot:
        status: standard
        api_name: description
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: description
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Description
      bloomerang:
        status: absent
  - name: family
    display_name: Family / Category
    type: string
    required: false
    description: >
      Categorization grouping for the product.
    usage: >
      Drives reporting (revenue by product family), pricing-rule
      application, and customer-facing catalog navigation. Salesforce
      uses Family; EspoCRM uses Category (linked to ProductCategory entity).
    presence:
      salesforce:
        status: standard
        api_name: Family
      hubspot:
        status: custom
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: family
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Family
      bloomerang:
        status: absent
  - name: productType
    display_name: Product Type
    type: enum
    required: false
    enum_values:
      - Product
      - Service
      - Subscription
    description: >
      Whether this catalog entry is a physical product, a service, or a
      subscription.
    usage: >
      Drives accounting treatment, billing-frequency UI, and inventory
      tracking applicability (services don't have stock).
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: type
      civicrm:
        status: absent
      salesforce_npsp:
        status: custom
      bloomerang:
        status: absent
  - name: unitPrice
    display_name: Unit Price / Standard Price
    type: currency
    required: false
    description: >
      Default price per unit of the product.
    usage: >
      Anchors pricing on quote/order line items. Often overridable per
      transaction. Salesforce stores price in PriceBookEntry rather than
      directly on Product2 to support multiple price books; HubSpot and
      EspoCRM store price directly on Product.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: standard
        api_name: unitprice
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: unitPrice
      civicrm:
        status: absent
      salesforce_npsp:
        status: custom
      bloomerang:
        status: absent
  - name: cost
    display_name: Cost / Cost of Goods Sold
    type: currency
    required: false
    description: >
      Cost basis for the product (used for margin calculation).
    usage: >
      Drives gross-margin reports. HubSpot has dedicated
      hs_cost_of_goods_sold property. Salesforce typically requires a
      custom field.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: standard
        api_name: cost
      attio:
        status: absent
      espocrm:
        status: custom
      civicrm:
        status: absent
      salesforce_npsp:
        status: custom
      bloomerang:
        status: absent
  - name: isActive
    display_name: Active
    type: boolean
    required: true
    description: >
      Whether the product is currently active in the catalog.
    usage: >
      Inactive products hide from new-quote / new-order creation but
      remain visible on historical records. Salesforce uses IsActive;
      EspoCRM uses status (Available / Out of Stock / Discontinued).
    presence:
      salesforce:
        status: standard
        api_name: IsActive
      hubspot:
        status: standard
        api_name: isactive
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: isActive
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: IsActive
      bloomerang:
        status: absent
  - name: quantityUnitOfMeasure
    display_name: Quantity Unit of Measure
    type: enum
    required: false
    enum_values:
      - Each
      - Hour
      - Day
      - Month
      - Year
      - License
      - Seat
    description: >
      Unit of measure for the product (each, hour, license, etc.).
    usage: >
      Drives quote-line-item display ("8 Hours" rather than "8") and
      pricing calculations.
    presence:
      salesforce:
        status: standard
        api_name: QuantityUnitOfMeasure
      hubspot:
        status: custom
      attio:
        status: absent
      espocrm:
        status: custom
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: QuantityUnitOfMeasure
      bloomerang:
        status: absent
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: >
      System-generated timestamp.
    usage: >
      Audit field.
    presence:
      salesforce:
        status: standard
        api_name: CreatedDate
      hubspot:
        status: standard
        api_name: createdate
      attio:
        status: absent
      espocrm:
        status: standard
        api_name: createdAt
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: CreatedDate
      bloomerang:
        status: absent
relationships:
  - target: opportunity
    cardinality: many-to-many
    role: peer
    description: >
      A product appears on many opportunities as line items; an
      opportunity has many product line items.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: quote
    cardinality: many-to-many
    role: peer
    description: >
      A product appears on many quotes; a quote has many product line items.
    presence:
      salesforce: standard
      hubspot: standard
      attio: absent
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: asset
    cardinality: one-to-many
    role: parent
    description: >
      A product can have many asset instances (one per customer who owns it).
    presence:
      salesforce: standard
      hubspot: absent
      attio: absent
      espocrm: absent
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

