# =============================================================================
# Catalog metadata
# =============================================================================
catalog_id: opportunity
catalog_version: "0.1"
last_updated: "05-08-26 05:35"
tier: 2
entry_kind: universal

# =============================================================================
# Entity-level definition
# =============================================================================
name: Opportunity
display_name: Opportunity
purpose: >
  A potential sale or deal in progress, tracked through stages from initial
  qualification to close. The pipeline anchor of B2B CRMs — most sales
  reporting (forecast, pipeline, win rate, sales cycle, average deal size)
  derives from Opportunity records.

business_context: >
  Opportunity records hold pending revenue. Each opportunity represents one
  pursuit — one potential sale that the team is actively working to close.
  Opportunities have an amount (forecast revenue), a close date (when it's
  expected to close), a stage (where in the sales process it sits), and a
  probability (likelihood of closing). The combination of these fields
  drives every sales dashboard, every forecast, every pipeline review.
  Critical observation for nonprofit deployments: Salesforce NPSP repurposes
  the Opportunity entity to track Donations rather than sales — donation
  records use Opportunity as their underlying object with custom Record
  Types (Donation, Major Gift, Recurring Gift, Grant, In-Kind, Matching
  Gift, Membership). This is unusual; CiviCRM and Bloomerang treat
  donations as their own entity (Contribution / Transaction) rather than
  forcing them into a sales-pipeline shape. Attio and HubSpot use "Deal"
  rather than "Opportunity" but the concept is essentially the same.
  EspoCRM uses Opportunity. When interviewing clients, surface
  "Opportunity" by asking whether they need to track potential revenue
  through stages: yes for organizations selling products or services, also
  yes for nonprofits tracking grant pursuits or major gift cultivation
  through cultivation stages, generally no for organizations that only
  track donations after they happen (use Donation/Contribution/Transaction
  instead). Pipeline configuration matters: the stages, probabilities, and
  required fields per stage are typically the most-customized aspect of
  any Opportunity deployment.

data_model_role: anchor
typically_required: false
common_synonyms:
  - Deal
  - Pipeline
  - Pursuit
  - Sales Opportunity
  - Donation Opportunity (in NPSP)

# =============================================================================
# Cross-system equivalents
# =============================================================================
systems:
  - system: salesforce
    name: Opportunity
    api_name: Opportunity
    is_standard: true
    notes: >
      Foundational standard object. Opportunity has standard fields like
      Amount, CloseDate, StageName (picklist), Probability (numeric, often
      auto-derived from Stage), Type (New Business / Existing Business),
      LeadSource. Each opportunity belongs to one Account. Opportunity
      Products (line items) attach via OpportunityLineItem.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_opportunity.htm

  - system: hubspot
    name: Deal
    api_name: deals
    is_standard: true
    notes: >
      HubSpot uses "Deal" rather than "Opportunity" but the concept is
      identical. Standard properties: dealname, amount, closedate,
      dealstage, pipeline, dealtype, hubspot_owner_id. Deals support
      multiple pipelines (each with its own stages). dealstage values are
      configurable per pipeline.
    docs_url: https://developers.hubspot.com/docs/api-reference/crm-deals-v3/guide

  - system: attio
    name: Deal
    api_name: deals
    is_standard: true
    notes: >
      Standard object (must be enabled — not active by default in all
      workspaces). Designed around kanban-board pipeline visualization.
      Deals link to Companies and People via relationship attributes.
      Stages are configurable per workspace.
    docs_url: https://attio.com/help/reference/managing-your-data/objects/manage-standard-objects

  - system: espocrm
    name: Opportunity
    api_name: Opportunity
    is_standard: true
    notes: >
      Standard CRM-module entity. Includes name, amount, closeDate, stage
      (enum), probability (auto-derived from stage by default), leadSource,
      assignedUser. Stage enum ships with values like Prospecting,
      Qualification, Needs Analysis, Value Proposition, Id. Decision
      Makers, Perception Analysis, Proposal/Price Quote, Negotiation/
      Review, Closed Won, Closed Lost.
    docs_url: https://github.com/espocrm/espocrm/blob/master/application/Espo/Modules/Crm/Resources/metadata/entityDefs/Opportunity.json

  - system: civicrm
    name: "Contribution (closest analog) / Case (for cultivation)"
    api_name: not_applicable
    is_standard: false
    notes: >
      MAJOR DIVERGENCE. CiviCRM does not have a sales-pipeline Opportunity
      entity. Donations are tracked via Contribution records (which are
      already-completed, not pending). Cultivation pursuits are sometimes
      modeled via Case records, which have stages and assignments, but
      Case is purpose-built for support tickets rather than sales pipeline.
      Sales-style pipeline would require custom entity development.
    docs_url: https://docs.civicrm.org/user/en/latest/contributions/

  - system: salesforce_npsp
    name: "Opportunity (with Donation Record Types)"
    api_name: Opportunity
    is_standard: true
    notes: >
      Same Salesforce Opportunity object, but NPSP overlays multiple Record
      Types: Donation, Major Gift, Grant, In-Kind Gift, Matching Gift,
      Membership, Recurring Donation. Each Record Type has different page
      layouts and field visibility. NPSP uses Closed Won = donation
      received; Closed Lost = donation declined / lapsed. The entity
      itself is universal Opportunity; the subclass happens via
      Record Types.
    docs_url: https://trailhead.salesforce.com/content/learn/modules/nonprofit-success-pack-basics/organize-your-data-with-npsp

  - system: bloomerang
    name: "Transaction (closest analog) / Pledge (for committed-but-not-paid)"
    api_name: not_applicable
    is_standard: false
    notes: >
      MAJOR DIVERGENCE. Bloomerang does not have a sales-pipeline
      Opportunity entity. Donations are recorded as Transactions
      (already-paid) or Pledges (committed, not yet paid). Major-gift
      cultivation pursuits aren't first-class entities in Bloomerang —
      typically tracked via Custom Fields on the Constituent or via
      Interactions logging cultivation steps.
    docs_url: https://bloomerang.com/api/rest-api-v1/

# =============================================================================
# Attributes
# =============================================================================
attributes:
  - name: name
    display_name: Opportunity Name
    type: string
    required: true
    max_length: 255
    description: >
      Display name of the opportunity (e.g., "Acme Corp - Q2 Renewal").
    usage: >
      Used in lists, kanban boards, and reports. Naming conventions vary
      widely — some orgs use "Account - Product - Year" templates; some
      use freeform descriptions. Anchors search and pipeline-review
      conversations ("the Acme renewal opp").
    presence:
      salesforce:
        status: standard
        api_name: Name
      hubspot:
        status: standard
        api_name: dealname
      attio:
        status: standard
        api_name: name
      espocrm:
        status: standard
        api_name: name
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Name
      bloomerang:
        status: absent
  - name: account
    display_name: Account
    type: reference
    required: true
    reference_target: account
    description: >
      The Account / Company this opportunity is being sold to.
    usage: >
      Anchors the opportunity to its customer record. Required in most B2B
      models — every opportunity needs a buyer. NPSP loosens this for
      individual donations (which point at Household Accounts that may have
      auto-generated names). Drives account-rollup reporting (sum of all
      opportunities for one account).
    presence:
      salesforce:
        status: standard
        api_name: AccountId
      hubspot:
        status: standard
        api_name: associatedcompanyids
      attio:
        status: standard
        api_name: company
      espocrm:
        status: standard
        api_name: accountId
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: AccountId
      bloomerang:
        status: absent
  - name: amount
    display_name: Amount
    type: currency
    required: false
    description: >
      Forecast revenue value of the opportunity.
    usage: >
      The headline number. Drives forecast aggregation, weighted pipeline
      (Amount × Probability), territory-quota reports, and individual rep
      compensation calculations. NPSP uses this for donation amount when
      Opportunity tracks donations.
    presence:
      salesforce:
        status: standard
        api_name: Amount
      hubspot:
        status: standard
        api_name: amount
      attio:
        status: standard
        api_name: value
      espocrm:
        status: standard
        api_name: amount
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Amount
      bloomerang:
        status: absent
    common_synonyms:
      - deal size
      - value
      - opportunity value
      - deal amount
  - name: closeDate
    display_name: Close Date
    type: date
    required: true
    description: >
      Expected close date of the opportunity (or actual close date if
      already won/lost).
    usage: >
      Anchors all forecast reports — "what's expected to close in Q2,"
      "how much pipeline ends this month," "deals slipping past their
      close date." Required in most systems. HubSpot auto-sets this to
      end-of-current-month if not specified at creation.
    presence:
      salesforce:
        status: standard
        api_name: CloseDate
      hubspot:
        status: standard
        api_name: closedate
      attio:
        status: standard
        api_name: expected_close_date
      espocrm:
        status: standard
        api_name: closeDate
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: CloseDate
      bloomerang:
        status: absent
    common_synonyms:
      - expected close
      - target close
      - forecast close
  - name: stage
    display_name: Stage
    type: enum
    required: true
    enum_values:
      - Prospecting
      - Qualification
      - Needs Analysis
      - Value Proposition
      - Proposal
      - Negotiation
      - Closed Won
      - Closed Lost
    description: >
      Current pipeline stage of the opportunity.
    usage: >
      Drives every pipeline visualization — kanban boards organize columns
      by stage; funnel reports count opportunities by stage; conversion-
      rate reports measure stage-to-stage progression. Stage values are
      heavily customized per organization. See the separate Pipeline Stage
      catalog entry for stage-as-an-entity treatment.
    presence:
      salesforce:
        status: standard
        api_name: StageName
      hubspot:
        status: standard
        api_name: dealstage
      attio:
        status: standard
        api_name: stage
      espocrm:
        status: standard
        api_name: stage
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: StageName
      bloomerang:
        status: absent
    common_synonyms:
      - pipeline stage
      - phase
      - sales stage
  - name: probability
    display_name: Probability
    type: decimal
    required: false
    description: >
      Likelihood the opportunity will close, expressed as a percentage.
    usage: >
      Multiplied by Amount to produce weighted pipeline. Typically auto-
      derived from Stage (Prospecting = 10%, Qualification = 25%, etc.)
      but rep-overridable in some configurations. Salesforce auto-sets;
      HubSpot configures per stage in pipeline settings.
    presence:
      salesforce:
        status: standard
        api_name: Probability
      hubspot:
        status: standard
        api_name: hs_deal_stage_probability
      attio:
        status: custom
      espocrm:
        status: standard
        api_name: probability
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Probability
      bloomerang:
        status: absent
    common_synonyms:
      - likelihood
      - win probability
      - confidence
  - name: type
    display_name: Type
    type: enum
    required: false
    enum_values:
      - New Business
      - Existing Business
      - Renewal
      - Upgrade
      - Downgrade
    description: >
      Classification of the deal type.
    usage: >
      Drives new-vs-expansion reporting (critical for SaaS metrics: ARR,
      net new ARR, expansion ARR). Also feeds renewal-rate calculations.
      In NPSP this becomes Donation Type (with values like Cash, Stock,
      In-Kind, Matching Gift) via the Type or Record Type field.
    presence:
      salesforce:
        status: standard
        api_name: Type
      hubspot:
        status: standard
        api_name: dealtype
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Type
      bloomerang:
        status: absent
    common_synonyms:
      - deal type
      - opportunity type
      - business type
  - name: leadSource
    display_name: Lead Source
    type: enum
    required: false
    description: >
      Channel through which this opportunity originated.
    usage: >
      Carries forward from the source Lead during conversion, or set
      directly when the opportunity is created from a known account.
      Drives marketing-attribution analysis (which channels produce the
      most won revenue).
    presence:
      salesforce:
        status: standard
        api_name: LeadSource
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: standard
        api_name: leadSource
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: LeadSource
      bloomerang:
        status: absent
    common_synonyms:
      - source
      - channel
      - origin
  - name: description
    display_name: Description
    type: text
    required: false
    description: >
      Free-form description of the opportunity.
    usage: >
      Catch-all narrative for context that doesn't fit structured fields —
      deal strategy, key requirements, competitive landscape. Often
      duplicated by Notes attached to the opportunity.
    presence:
      salesforce:
        status: standard
        api_name: Description
      hubspot:
        status: standard
        api_name: description
      attio:
        status: standard
        api_name: description
      espocrm:
        status: standard
        api_name: description
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Description
      bloomerang:
        status: absent
  - name: nextStep
    display_name: Next Step
    type: string
    required: false
    max_length: 255
    description: >
      Brief description of the next planned action on this opportunity.
    usage: >
      Pipeline-review staple — sales managers scan this column to gauge
      whether reps have a credible path forward on each open deal. If
      Next Step is empty or stale, the deal is often flagged as at-risk.
    presence:
      salesforce:
        status: standard
        api_name: NextStep
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: custom
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: NextStep
      bloomerang:
        status: absent
    common_synonyms:
      - next action
      - next move
      - planned next step
  - name: assignedUser
    display_name: Owner
    type: reference
    required: true
    reference_target: user
    description: >
      The user who owns the opportunity (the responsible sales rep).
    usage: >
      Drives quota allocation, sales-rep compensation, "my pipeline"
      filtering, and forecast roll-up by manager. Critical for sales-org
      reporting; opportunity ownership is the primary attribute that
      determines whose number a deal counts toward.
    presence:
      salesforce:
        status: standard
        api_name: OwnerId
      hubspot:
        status: standard
        api_name: hubspot_owner_id
      attio:
        status: standard
        api_name: workspace_member_owner
      espocrm:
        status: standard
        api_name: assignedUserId
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: OwnerId
      bloomerang:
        status: absent
    common_synonyms:
      - owner
      - rep
      - AE
      - account executive
  - name: pipeline
    display_name: Pipeline
    type: reference
    required: false
    reference_target: pipeline-stage
    description: >
      The pipeline this opportunity belongs to (when multiple pipelines
      are configured).
    usage: >
      HubSpot and Salesforce support multiple pipelines per object — for
      example, separate New Business and Renewals pipelines, or separate
      Direct Sales and Channel Sales pipelines. Each pipeline has its own
      stages. Required when more than one pipeline exists.
    presence:
      salesforce:
        status: standard
        api_name: Pipeline__c
      hubspot:
        status: standard
        api_name: pipeline
      attio:
        status: standard
        api_name: stage
      espocrm:
        status: custom
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: Pipeline__c
      bloomerang:
        status: absent
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: >
      System-generated timestamp of when the opportunity was created.
    usage: >
      Drives sales-cycle calculations (close date minus created date) and
      cohort reporting (deals created in Q1 — how many closed?).
    presence:
      salesforce:
        status: standard
        api_name: CreatedDate
      hubspot:
        status: standard
        api_name: createdate
      attio:
        status: standard
        api_name: created_at
      espocrm:
        status: standard
        api_name: createdAt
      civicrm:
        status: absent
      salesforce_npsp:
        status: standard
        api_name: CreatedDate
      bloomerang:
        status: absent
relationships:
  - target: account
    cardinality: many-to-one
    role: child
    description: >
      An opportunity belongs to one account.
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: contact
    cardinality: many-to-many
    role: peer
    description: >
      An opportunity has one or more associated contacts (decision-makers,
      influencers, champions). Modeled via OpportunityContactRole junction
      records in Salesforce; via Associations in HubSpot.
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: custom
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: activity
    cardinality: one-to-many
    role: parent
    description: >
      An opportunity has many activities (calls, meetings, tasks) logged
      against it.
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

  - target: user
    cardinality: many-to-one
    role: child
    description: >
      An opportunity is owned by a user.
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: absent
      salesforce_npsp: standard
      bloomerang: absent

