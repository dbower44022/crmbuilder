catalog_id: document
catalog_version: "0.1"
last_updated: "05-09-26 11:35"
tier: 5
entry_kind: universal

name: Document
display_name: Document
purpose: >
  A file attachment (PDF, image, document, spreadsheet, video, etc.)
  stored in or linked from the CRM, typically associated with a parent
  record (Contact, Account, Opportunity, Case, Donation). Distinct from
  Note (free-text annotations) — Documents are first-class file objects
  with binary content, MIME types, and storage backends.

business_context: >
  Document records anchor file management in CRMs: signed contracts,
  proposals, presentations, ID documents, photos, screenshots, audit
  files, transcripts, recorded calls, and any other binary content that
  needs to live alongside structured data. Modern CRMs split file
  management from the rest of the data model into a dedicated content
  layer (Salesforce ContentVersion / ContentDocument; HubSpot Files;
  Attio attachments) — partly because file storage has different access
  patterns (large objects, lazy load, download URLs) than structured
  data, partly because version history matters for documents but not
  most other records. CiviCRM has Attachment via core File entity
  attached polymorphically. Bloomerang has Documents on Constituents.
  EspoCRM has Document (with version tracking). The key operational
  concerns are storage limits (most systems cap file size at 25-100MB),
  supported MIME types, virus scanning, and external-storage integrations
  (Google Drive, Dropbox, S3) that let the CRM reference a file without
  storing it directly. When interviewing clients, surface "Document" by
  asking what files they attach to records (signed forms, photos, IDs,
  contracts), how they currently store them, and whether they need
  version history or external-storage integration.

data_model_role: document
typically_required: false
common_synonyms:
  - File
  - Attachment
  - Asset
  - Content
  - Stored Document

systems:
  - system: salesforce
    name: "ContentDocument / ContentVersion"
    api_name: "ContentDocument, ContentVersion"
    is_standard: true
    notes: Modern Salesforce file framework. ContentDocument is the parent record; ContentVersion holds the actual binary content with versioning. ContentDocumentLink is the polymorphic junction to 
      records. Replaced legacy Attachment object.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_contentdocument.htm
  - system: hubspot
    name: Files
    api_name: files
    is_standard: true
    notes: HubSpot Files API for binary uploads. Files can be attached to records via Engagements (notes with attachments) or direct file association.
    docs_url: https://developers.hubspot.com/docs/api-reference/files-files
  - system: attio
    name: "Attachments / Files"
    api_name: attachments
    is_standard: true
    notes: Attio supports file attachments on records. Limited per-attachment metadata compared to dedicated document-management systems.
    docs_url: https://attio.com/help/reference/managing-your-data/records/file-attachments
  - system: espocrm
    name: "Document / Attachment"
    api_name: "Document, Attachment"
    is_standard: true
    notes: EspoCRM has both Attachment (per-field file uploads attached to other entities) and a Document entity (first-class document records with version tracking, linked accounts, status).
    docs_url: https://docs.espocrm.com/user-guide/documents/
  - system: civicrm
    name: "Attachment (via File entity)"
    api_name: Attachment
    is_standard: true
    notes: CiviCRM uses File entity polymorphically attached via entity_table + entity_id pattern. Files are stored in CiviCRM's custom upload directory.
    docs_url: https://docs.civicrm.org/user/en/latest/the-user-interface/notes-attachments/
  - system: salesforce_npsp
    name: "ContentDocument / ContentVersion"
    api_name: "ContentDocument, ContentVersion"
    is_standard: true
    notes: Same as Salesforce. Donor-facing documents (signed pledges, gift agreements, IRS letters) typically attached to Contacts or Donation Opportunities.
    docs_url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_contentdocument.htm
  - system: bloomerang
    name: Document
    api_name: Document
    is_standard: true
    notes: Bloomerang Documents attach to Constituents. Includes Description, FileName, MimeType, Size, UploadDate.
    docs_url: https://bloomerang.com/api/rest-api-v1/

attributes:
  - name: documentName
    display_name: Document Name
    type: string
    required: true
    max_length: 255
    description: Display name of the document.
    usage: Drives list-view legibility and search. Often defaults to the original filename but can be edited.
    presence:
      salesforce:
        status: standard
        api_name: Title
      hubspot:
        status: standard
        api_name: name
      attio:
        status: standard
        api_name: name
      espocrm:
        status: standard
        api_name: name
      civicrm:
        status: standard
        api_name: description
      salesforce_npsp:
        status: standard
        api_name: Title
      bloomerang:
        status: standard
        api_name: Description
  - name: fileName
    display_name: File Name
    type: string
    required: true
    max_length: 255
    description: Original filename of the uploaded file (with extension).
    usage: Distinct from display name; preserves the original upload filename for download. Drives MIME-type detection and extension-based handling.
    presence:
      salesforce:
        status: standard
        api_name: PathOnClient
      hubspot:
        status: standard
        api_name: name
      attio:
        status: standard
        api_name: file_name
      espocrm:
        status: standard
        api_name: name
      civicrm:
        status: standard
        api_name: file_name
      salesforce_npsp:
        status: standard
        api_name: PathOnClient
      bloomerang:
        status: standard
        api_name: FileName
    common_synonyms:
      - filename
      - name
      - file
  - name: mimeType
    display_name: MIME Type
    type: string
    required: false
    description: IANA MIME type of the file content.
    usage: Drives inline preview behavior (PDFs render inline, images display thumbnails) and download routing.
    presence:
      salesforce:
        status: standard
        api_name: FileType
      hubspot:
        status: standard
        api_name: type
      attio:
        status: standard
        api_name: mime_type
      espocrm:
        status: standard
        api_name: type
      civicrm:
        status: standard
        api_name: mime_type
      salesforce_npsp:
        status: standard
        api_name: FileType
      bloomerang:
        status: standard
        api_name: MimeType
    common_synonyms:
      - file type
      - content type
      - format
  - name: fileSize
    display_name: File Size (bytes)
    type: integer
    required: false
    description: Size of the file in bytes.
    usage: Drives storage-quota reporting, upload-progress UI, and large-file warning thresholds.
    presence:
      salesforce:
        status: standard
        api_name: ContentSize
      hubspot:
        status: standard
        api_name: size
      attio:
        status: standard
        api_name: size
      espocrm:
        status: standard
        api_name: size
      civicrm:
        status: standard
        api_name: file_size
      salesforce_npsp:
        status: standard
        api_name: ContentSize
      bloomerang:
        status: standard
        api_name: Size
    common_synonyms:
      - size
      - file size
      - bytes
  - name: description
    display_name: Description
    type: text
    required: false
    description: Optional description of the document.
    usage: Free-form context. Helps users find documents by content rather than filename. Often empty in practice.
    presence:
      salesforce:
        status: standard
        api_name: Description
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: standard
        api_name: description
      civicrm:
        status: standard
        api_name: description
      salesforce_npsp:
        status: standard
        api_name: Description
      bloomerang:
        status: standard
        api_name: Description
  - name: parent
    display_name: Related To
    type: reference
    required: false
    reference_target: account
    description: Polymorphic reference to the record this document is attached to (Contact, Account, Opportunity, Case, Donation, etc.).
    usage: Anchors the document to its parent record. Salesforce uses ContentDocumentLink junction; CiviCRM uses entity_table + entity_id; EspoCRM uses linkParent.
    presence:
      salesforce:
        status: standard
        api_name: LinkedEntityId
      hubspot:
        status: standard
        api_name: parent
      attio:
        status: standard
        api_name: parent
      espocrm:
        status: standard
        api_name: parentId
      civicrm:
        status: standard
        api_name: entity_id
      salesforce_npsp:
        status: standard
        api_name: LinkedEntityId
      bloomerang:
        status: standard
        api_name: Parent
  - name: assignedUser
    display_name: Owner
    type: reference
    required: true
    reference_target: user
    description: User who uploaded or owns the document.
    usage: Drives permissions and accountability. Salesforce ContentVersion has CreatedById; HubSpot Files have created_by_id.
    presence:
      salesforce:
        status: standard
        api_name: OwnerId
      hubspot:
        status: standard
        api_name: created_by
      attio:
        status: standard
        api_name: created_by
      espocrm:
        status: standard
        api_name: createdById
      civicrm:
        status: standard
        api_name: upload_date
      salesforce_npsp:
        status: standard
        api_name: OwnerId
      bloomerang:
        status: standard
        api_name: CreatedBy
  - name: documentStatus
    display_name: Document Status
    type: enum
    required: false
    enum_values:
      - Draft
      - In Review
      - Approved
      - Active
      - Expired
      - Archived
    description: Lifecycle state of the document.
    usage: Drives document-management workflows (review-and-approve cycles, expiration tracking). EspoCRM ships these enum values; most other systems require custom configuration.
    presence:
      salesforce:
        status: custom
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: standard
        api_name: status
      civicrm:
        status: custom
      salesforce_npsp:
        status: custom
      bloomerang:
        status: custom
  - name: version
    display_name: Version
    type: string
    required: false
    description: Version identifier (e.g., "1.0", "1.1", "Final").
    usage: Drives version-history tracking when documents are updated. Salesforce ContentVersion auto-increments; other systems require manual versioning.
    presence:
      salesforce:
        status: standard
        api_name: VersionNumber
      hubspot:
        status: custom
      attio:
        status: custom
      espocrm:
        status: standard
        api_name: publishVersion
      civicrm:
        status: custom
      salesforce_npsp:
        status: standard
        api_name: VersionNumber
      bloomerang:
        status: custom
  - name: createdAt
    display_name: Created Date
    type: datetime
    required: true
    description: System timestamp of upload.
    usage: Drives document-vintage reporting and storage-cohort analysis.
    presence:
      salesforce:
        status: standard
        api_name: CreatedDate
      hubspot:
        status: standard
        api_name: createdate
      attio:
        status: standard
        api_name: created_at
      espocrm:
        status: standard
        api_name: createdAt
      civicrm:
        status: standard
        api_name: created_date
      salesforce_npsp:
        status: standard
        api_name: CreatedDate
      bloomerang:
        status: standard
        api_name: CreatedDate
relationships:
  - target: account
    cardinality: many-to-one
    role: child
    description: A document may be attached to an account.
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: custom
  - target: contact
    cardinality: many-to-one
    role: child
    description: A document may be attached to a contact.
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard
  - target: user
    cardinality: many-to-one
    role: child
    description: A document is owned by a user (uploader).
    presence:
      salesforce: standard
      hubspot: standard
      attio: standard
      espocrm: standard
      civicrm: standard
      salesforce_npsp: standard
      bloomerang: standard

