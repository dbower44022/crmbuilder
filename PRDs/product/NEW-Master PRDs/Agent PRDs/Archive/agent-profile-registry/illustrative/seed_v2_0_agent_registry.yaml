# Propagation policy (r0.3): float pure guidance, pin execution/constraint
#   - instruction skills + advisory rules .... pinned_revision: null (float)
#   - tool skills (code-backed or not) ....... pinned_revision: "1.0.0" (pin)
#   - enforced / enforced_with_override rules. pinned_revision: "1.0.0" (pin)
# Taxonomy (r0.3): two skill kinds — instruction, tool. A tool is code-backed
#   when it carries a code_asset_ref; otherwise the harness handles it.
# NOTE: This roster is a DRAFT starting point — refine agent names, skills,
#       and rule bodies to match the actual CRM Builder agent design.
