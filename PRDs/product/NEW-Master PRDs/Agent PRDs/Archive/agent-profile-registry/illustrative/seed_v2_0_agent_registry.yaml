meta:
  seed_revision: "1.0.1"
  generated: "2026-05-31T17:30:00Z"
  author: "D. Bower / Claude"

# ---------------------------------------------------------------------
# SKILL CATALOG (shared, independently versioned)
# ---------------------------------------------------------------------
skills:
  - skill_id: validate-deployment-yaml
    name: "Validate Deployment YAML"
    description: "Validate a deployment YAML file for structural and semantic correctness against the target schema."
    kind: tool
    category: validation
    revision: "1.0.0"
    io_contract:
      input:
        type: object
        properties:
          yaml_path: { type: string }
        required: [yaml_path]
      output:
        type: object
        properties:
          valid: { type: boolean }
          errors: { type: array, items: { type: string } }

  - skill_id: diff-config
    name: "Diff Configuration"
    description: "Compute the difference between the current target-instance state and a desired YAML configuration."
    kind: tool
    category: planning
    revision: "1.0.0"
    io_contract:
      input:
        type: object
        properties:
          target: { type: string }
          yaml_path: { type: string }
        required: [target, yaml_path]
      output:
        type: object
        properties:
          additions: { type: array }
          modifications: { type: array }
          deletions: { type: array }
          destructive: { type: boolean }

  - skill_id: apply-yaml-config
    name: "Apply YAML Configuration"
    description: "Apply a validated YAML configuration to a target instance."
    kind: tool
    code_asset_ref: "crmbuilder.deploy.apply_config:apply"   # code-backed tool
    category: deployment
    revision: "1.0.0"
    io_contract:
      input:
        type: object
        properties:
          target: { type: string }
          yaml_path: { type: string }
          approval_flag: { type: boolean }
        required: [target, yaml_path]
      output:
        type: object
        properties:
          applied: { type: boolean }
          summary: { type: string }

  - skill_id: verify-backup
    name: "Verify Backup"
    description: "Verify that a recent, valid backup of the target instance exists before any mutating operation."
    kind: tool
    code_asset_ref: "crmbuilder.backup.verify:verify"   # code-backed tool
    category: safety
    revision: "1.0.0"
    io_contract:
      input:
        type: object
        properties:
          target: { type: string }
        required: [target]
      output:
        type: object
        properties:
          backup_verified: { type: boolean }
          backup_timestamp: { type: string }

  - skill_id: summarize-deployment-plan
    name: "Summarize Deployment Plan"
    description: "Guidance for presenting a deployment or migration plan to the operator in clear, reviewable terms before any action."
    kind: instruction
    category: communication
    revision: "1.0.0"
    # instruction skills carry no io_contract; body lives in description usage

# ---------------------------------------------------------------------
# GOVERNANCE RULE CATALOG (shared, independently versioned)
# ---------------------------------------------------------------------
governance_rules:
  - rule_id: no-destructive-migration-without-approval
    name: "No Destructive Migration Without Approval"
    rule_type: prohibition
    enforcement: enforced
    severity: critical
    body: "Destructive schema migrations require an explicit approval flag and a verified backup before execution."
    revision: "1.0.0"
    predicate:
      subject: schema_migration
      operation: destructive
      condition: "approval_flag != true OR backup_verified != true"
      effect: deny

  - rule_id: require-validation-before-apply
    name: "Require Validation Before Apply"
    rule_type: constraint
    enforcement: enforced
    severity: critical
    body: "A configuration may not be applied unless it has passed validation in this session."
    revision: "1.0.0"
    predicate:
      subject: deployment
      operation: apply
      condition: "validated != true"
      effect: deny

  - rule_id: escalate-on-prod-target
    name: "Escalate On Production Target"
    rule_type: escalation
    enforcement: enforced_with_override
    severity: critical
    body: "Any mutating operation against a production target must be escalated for human override before proceeding."
    revision: "1.0.0"
    predicate:
      subject: target
      operation: mutate
      condition: "environment == 'production'"
      effect: override

  - rule_id: prefer-idempotent-operations
    name: "Prefer Idempotent Operations"
    rule_type: constraint
    enforcement: advisory
    severity: warning
    body: "Prefer idempotent operations; design changes so re-running a deployment produces no unintended side effects."
    revision: "1.0.0"

  - rule_id: redact-secrets-in-output
    name: "Redact Secrets In Output"
    rule_type: prohibition
    enforcement: advisory
    severity: warning
    body: "Never echo credentials, tokens, connection strings, or other secrets in agent output or logs; redact them."
    revision: "1.0.0"

